body:
  text: 幔亭集卷六明徐熥撰五言律詩甲午赴京留別社中諸子瓠落甘南郭飄零又北征愁心悲逺道短髮戀微名別苦嫌情重時危幸槖輕勞歌聽已慣任作斷腸聲別陳惟秦勞歌君莫吟吟即淚沾襟若比前年別此情應更深夢能知道路交只戀山林何處還相憶天涯一片心溪行即事寄汝翔平夫客路空回首浮生未息機愁多難得醉夢短不成歸石勢流邊缺灘聲過後微翻因旅泊處轉憶舊漁磯泊黯淡灘登觀音寺古寺俯空灘溪深客到難浪疑南海湧山作普陀看幡影臨流濕鐘聲出谷寒禪心如止水元不礙風湍金鳯山逢許道人髙人隱洞天鳥道入雲煙且莫論真訣大都無世緣丹爐長自爇火候豈輕傳別去不留意相逢皆偶然漁梁道中懷葉志卿當年聨轡處已是七周星野店曾同宿流泉憶共聽殊音來往客愁思短長亭不盡懷鄉感因君增涕零七里灘夜泛嚴灘行未盡雨氣逼黃昏峽束天疑小溪深水不渾榜歌何處客燈影幾家村最是堪愁絶三聲半夜猿桐廬曉發挂帆山縣曉雲氣滿溪隂雖有風塵役能無丘壑心人煙依水近塔影墜江深所嘆垂綸者髙蹤不可尋紫陽洞石室奇如此全無斧鑿痕虛巖懸作屋曲竇巧成門避日晴猶濕屯雲晝自昏平生逰厯慣到此亦驚魂三茅觀尋許靈長不遇山色翠氤氲松關閉白雲禮星孤磬發受籙妙香焚夜靜天花落秋髙木葉聞無由尋許掾長揖問茅君寄懷黃道晦各送皆先別君留更一宵江頭兩分手相對各魂銷南望驛樓逺北看帆影遙折來亭畔桞此日定蕭條長貧家纍少有道世緣輕山許髙人占田歸別主耕老惟安落魄隱不愛虛名下榻憐吾弟秋來幾到城晚至毗陵榜人窮日力向晚到荆溪近驛舟航滿沿城燈火齊角聲悲斷續山色黯東西客子愁無寐昏雅莫亂啼句曲道中望茅山停車句曲望縹眇見仙家曠野分青靄遙天結紫霞山秋生異草溪午出胡麻欲證延年訣其如道路賒遊牛首山𢎞覺寺前身疑老衲所至愛禪林肯惜躋攀力偏宜清淨心山鍾吳地秀園布漢時金日午僧寮寂巖扉閉塔隂牛首祖堂尋雪浪禪師不遇雲氣掩禪栖山空鳥自啼塔隂依日轉鈴語墜風低白社虛牛首青山費馬蹄無由問真偈歸路夕陽西雞鳴寺贈印空上人不用覓三車心能轉法華問年忘嵗月留客借雲霞乞食朝行腳焚香夜結跏志公金骨在長日禮干花喜林天懋至得家書故人傳信至喜極却忘餐雖有平安字未開猶膽寒算程何日寄秉燭幾回看兩月思鄉淚今宵應暫乾盧子明張子明何性中胡彭舉林叔度小集客舍客中方落莫諸子偶來過有相皆丘壑無言非薜蘿紅塵窮巷少青眼異鄉多總是飄蓬者為歡能幾何瓦棺寺贈全上人禪房雲氣深一榻傍蕉隂不種生天果常懷出世心鷲峰修白業象教禮黃金何以精名理先師有道林同陸纂父郭聖僕雨夜集曹重甫客舍得涼字客居非蔣徑亦自過求羊緑酒人來貰黃花節後香敝裘霜氣肅殘燭雨聲涼漏盡欲為別秋宵苦不長送何性中還會稽之子竟落魄故人空斷魂煙霞歸舊隱風雨出關門紅葉足秋色白衣多淚痕看君年尚少莫即戀丘園送王獻子山人客粵西君行當象郡投宿盡蠻家椰暗黎村葉梅寒庾嶺花神符宵厭蠱人面晝防蛇若到南中日先尋勾漏砂送林吾宗南還時余將入燕相逢雖暫喜相別倍含情渡水雁孤影出關雞一聲愁從歸路減寒近故鄉輕所歎飄零者風霜向北平送林叔度之廬江尋劉使君憐君方倦逰嵗晚復依劉衰草逢霜死寒濤逐雪流淮南叢桂老江北荻花秋渡口一相送目窮天際頭題靜海寺慶良上人房入寺已髙舂禪關暮靄封潮喧臨水梵雲引過江鐘馴象諸天教盧龍近郭峰幾年湖海別此地又相逢靈谷寺一徑萬松通鍾山俯梵宫谷聲虛應掌塔影峻凌空不壞金身古無梁寶殿雄未忘生滅相長此泣遺弓咏雨中新草燒痕才轉緑含雨未萋萋且緩佳人鬭方聞玉勒嘶苔深看莫辨桞亞望初齊為語尋春者無令踏作泥不寐感懷示元直孤館聽寒漏燈殘夜未央雁聲悲帶雨蛩語急含霜旅夢醒難續鄉心醉暫忘念君初作客不敢説凄涼贈魏考叔所居雖近市苔鎖蓽門幽巾舄遵王制圖書應客求揮毫無俗韻下榻有名流滿壁滄洲在依稀顧虎頭別金陵人境元如夢兹逰真惘然一帆揚子月雙屐白門煙遇寺多留偈逢僧盡問禪獨餘千佛嶺待我再來緣懷王粹夫我逰當薊北君隱在牆東兩地魂俱斷中宵夢不同燭銷山店雨笳散戍樓風雪後無南雁鄉書何處通同溫允文史聲伯集張稚通清遠居分得留字此地本清遠主人情更幽遊多乘興至客不問名留坐卧半臨水往來都泛舟醉餘溪上別月色滿中流天聖寺髙閣對諸峰禪關入亂松斷碑留贔屭古殿錯蛟龍塵靜難侵佛林疏不礙鐘瀟湘圖滿壁彤管有遺蹤碧浪湖泛月同在杭扁舟過碧浪孤月出林端兔影搖波碎嬋姢落鏡寒湖光澄似練山色秀堪餐別後幾圓缺今宵才共看題顧學憲先生聞禽閣髙閣傍林阿林深衆鳥過飛當殘照急噪向晚晴多振翼同呼侣歸巢各認柯翟公門似水日日可張羅贈陳道源參軍冷曹堪傲性大雅見遺音衙只聽鶯放山多信馬尋一官同鮑照五字比陳琳俸薄難供客時捐賣賦金曉至甘露寺因憩觀音洞乘曉到香臺鐘殘僧夢回巖阿精舍隱石竇普門開初日躍林出罡風跨浪來披榛尋舊迹一半委蒼苔甲午汶上除夕旅館逢除夕空懷故國情荒村三戶寂土屋一燈明臘逐雞聲去春隨馬足生客中非守嵗自是夢難成懷張道輔婚嫁中年畢餘生老一區市聲窮巷寂山色小樓孤林密身堪隱田荒口僅糊詩僧同酒伴日日往來無賦得逍遙遊送塢子遠山人逍遙非避世只是愛清間泛月渡千澗隨雲過幾山遊同僧共往倦與鳥俱還蹤迹多湖海故園長閉關題許靈長快雪亭亭倚吳山麓春晴雪未乾色分江影白光入石門寒洞古藏猶濕牆隂銷欲殘應憐髙卧者日日映書看題吳象文抱膝軒越絶風流客栖遲一畝宫閉門人迹少趺坐世緣空簾向雪中捲徑從花裏通主人長抱膝或恐是隆中送張子環下第枉道之楚尋丁亨文法曹天涯同失路君豈不懷歸客久行囊罄家貧生計微同來知己散便道故人稀獨有荆南吏或能憐布衣暮出茌平宿二十里村店征車貪逺宿宿處更荒涼出郭才數里幾家成一鄉燈燃綿炬暗茶煮桞條香不待晨炊去主人無曉糧贈瑕丘灌園郭叟勝地近洙水主人同漢隂未忘為圃意偏稱耦耕心草色憐顔巷柏枝分孔林下車聊共語莫作鳯衰吟滋陽道中逢金陵秀峰和尚因訊雪浪耶溪秋園諸上人如何當此地亦得見名僧托盡他鄉鉢傳來幾代燈煙霞生有果雲水迹無憑問遍南朝寺因師住秣陵登雲龍山放鶴亭疊嶂隱香臺門當楚水開河流幡影去雲引磬聲來寺古龍猶伏亭空鶴不回因尋碑上字剔盡雨中苔舟中書懷一別變春秋相隨半是愁思鄉餐䪺減感舊淚空流金盡羞開篋途遙厭換舟非無山水興客久畏淹留豈是依人拙此行誰可依途窮勝事少身賤勢交稀客路儒無術關門吏有威時時戒童僕莫比晝遊歸將別幼孺離人元作惡况復是心知預灑臨岐淚各抄同賦詩分襟愁路促戀別願舟遲童僕追隨久猶能相向悲松陵舟中送幼孺入苕川兼柬在杭使君及苕中諸舊逰懷土情雖切他鄉且暫留去尋苕水吏獨作太湖逰顧影同看燭含啼各買舟我來慚父老不敢再依劉溪夜時與惟秦興公逰武夷往日逰都倦兹行心獨間片帆投月宿一笠戴雲還夜色沙邊水秋光煙外山旅懷長似此那解鬢毛斑中秋遇風雨寒溪秋色滿臨泛意如何髙枕亂流去挂帆千嶂過夢應通月窟槎已到星河不負煙霞想無妨風雨多同惟秦興公舟中夜坐臨流趺坐久夕露墜衣繁山色晚逾翠灘聲宵更喧林深燈避影雲重月虧痕不愛聞雞犬停舟莫近村贈惟秦平生隱不出出便為尋真世上風波免途中聞見新拋家無內顧學道有前因卻笑虛名客江湖勞此身曉發枕上榜歌起溪中行侣稀纜牽煙縷細帆挂月痕微曙逐雞聲盡濤驚客夢歸沿洄三五里猶未見朝暉贈黃君甫山人煙霞久已親無語到紅塵著姓同江夏逃名比富春長貧玄草客未老白雲身不脫吳鉤贈君家在劍津登接筍峰丹梯懸削壁鐵索纜縈紆魚貫嵓當面猿攀石礙趺氣同看月喘聲各入雲呼蜿蚺過龍脊茅房見一區陷石堂緣溪下復登山色翠層層洞以水流闢石從雲壓崩落花魂卧草空樹腹吞藤漸覺非人境風光近武陵贈安道人丹房占翠微靜極悟玄機玉液喉間咽金精肘後飛禮經隨衆慣揮麈見人稀豈是無家客三年不一歸贈江仲魚君家雖附郭多在武夷居有水皆移棹無山不結廬胸全藏洞壑交半混樵漁懷友秋風裏從今或到豫仲魚有秋風懷友吟懷顔廷愈流落有如此壯心終不酬文多為客難劍未報君讐失職辭戎幕移居近比丘世情容易變莫向灞亭逰送興公弟逰吳越獻書豫未遇彈鋏汝何依片刺投人拙諸侯禮士稀出門家纍斷為客衆愁歸不必羞貧賤詩名在布衣題畫菊贈黃博士印坤南山相對處籬下有餘芳開向三秋晚餐來五內香葉同顔不老花與髮俱黃嵗嵗金風起披圖一薦觴春夜同錢叔達陳惟秦齋中雨坐髙齋開亂竹孤燭坐潺湲世味隨年減浮生到夜間交應同白水語不離青山城市紅塵滿煙霞獨此間寄陳平夫聞説清溪上經年但索居詩因間轉廢交到老偏踈酒癖難全減雄心可便除燈前思舊好空檢往來書春日雨中喜惟秦至齋居耽閴寂猶厭鹿麋羣茶汲松泉煮香收桂屑焚避人宜晝雨來客損春雲不帶紅塵至寥寥獨見君過惟秦幽居數歇經村落到門紅日西桞隂牛獨寢草舍燕雙栖野緑雲千畝郊青雨一犂空林煙火起留客晚蒸藜同鄭吉甫過仁王寺懷徐仲和久客莆中燈火佛堂虛經行月上初草生逰子路松偃化人居春盡鶯花老天長蝶夢踈如何逢九鯉不寄半行書病一春餘幾日况復卧文園山色來欹枕鶯聲老閉門擁衾無早晚來札半寒溫漸覺詩籖減惟看藥褁存雨中屠田叔使君招集烏石山同錢叔達陳幼孺王粹夫曹能始興公弟分得深字選勝坐危岑山髙紫翠深受潮千澗滿翳雨半峰隂衣中春寒薄鐘過暮靄沈使君行役近猶不廢登臨送張孺願之漳南離亭桞正長匹馬向臨漳別路聞鶯語遙空起蜃光颶風吹海暗蠻雨洗天涼去去頻沽酒兹行是瘴鄉屠田叔雨中過酌草堂分得窮字誰謂諸侯貴來過一畝宫天低峰影逼雲耗雨聲窮殘溜虛簷滴新苔怪石蒙慚無池館勝不敢醉山公寄張成叔杯酒片時親都亭各問津玉河堤畔桞又見一回新月冷閩天夢花明越嶠春聞君廬墓側白兔向人馴悼殤子五日人間世千秋骨肉情未能留幻質空自試啼聲眷屬知何劫輪回又此生愁心安可慰婚嫁纍尤輕咏佛手柑兜羅軟似綿移種到人天妙相終成果清香不讓蓮交枝疑合掌屈指欲為拳肯向車中擲留將供法筵喜康元龍歸自靈武自逐征西府空驚兩鬢斑塵沙過隴水風雪度蕭關刁斗邊城暗烽煙戍壘間故園初下馬一劍在腰間挽周候官雙鳬何處飛父老泣沾衣舊客雲同散虛名露易晞關河孤櫬遠風雨旅魂歸他日過荒隴松楸大幾圍柬陳汝大愛君栖隱處一室白雲深古壁藤花亂空庭桐葉隂靜能銷世態老得遂間心自愧嵇生懶經年不入林送陳可棟還松溪相見復離羣一杯歌送君輕紅辭荔火寒翠夢松雲樹影緣山轉溪流向縣分蟬聲修竹裏明日不同聞送陳汝翔逰龍虎山布褐與黃冠遙尋正一壇靈符求玉印神鼎問金丹禮斗七燈焰降魔雙劍寒龍沙遺讖合計日待驂鸞送陳彥宗之永嘉皖城歸未久又復向東甌總為飢寒出不然何所求帆飛瘴雨濕衣觸火雲流縱是囊羞澀還須鴈宕逰送余印卿秀才還濉陽相違雖不遠相送亦應難寶劍脫為贈瑤琴何處彈行裝三伏雨孤棹百重灘想到家林日猶懷荔子丹送鄭震卿之吳越尋兄汝兄逰不返汝去逺相尋試問孤身客飄零何至今見時應慟哭語罷定傷心坐待離羣雁聯翩向故林送林應卿進士理梧州擁傳過藤峽開衙傍鬱林蒼梧寒岫翠青草瘴雲深蠻吏多夷禮猺民雜土音此鄉山水好公暇足登臨送張公魯還甬東知己難為別况逢搖落時斷猿吟樹慘羸馬過山遲夜月嚴陵瀨秋風賀監祠清狂懷小阮誰共竹林期答贈黃君甫家居延水濆劍佩七星文竹杖干山月荷衣五嶽雲迹多方外見名喜世間聞從此辭塵網飄飄鸞鶴羣寄朱善侯秀才雖然蓋未傾年少即聞名才似王文考狂如禰正平雞壇盟越國龍劍出豐城自有驚人語看君時一鳴哭王孔振客死瀘州飄零萬里客客死更誰依路遠訃音緩家貧弔者稀巴歌舁櫬曲橦布附身衣蜀道難如此遊魂歸不歸哭顧道行先生誰謂江干別竟成生死分梨園翻薤露苔館閟蘿雲地逺訃難定天髙哭不聞酬恩空一劍何敢挂孤墳送葉秀才還松溪兹行路幾重去矣不從容試問君歸興何如秋色濃香殘霜後菊濤響月邊松隔斷相思夢千峰與萬峰為親乞祿詩贈丁文統邑丞薄宦不謀身卑栖向海濱暫為黃綬客少慰白頭親退食稱觴便休衙問寢頻有人猶負米五斗莫嫌貧豈是愛微官因承祿養歡公厨充菽水海錯佐盤餐振藻宜花縣哦松傍藥欄浮沈元世路莫謂折腰難題陳幼孺招隱樓叢桂許誰攀經年不閉關池平吞月淺林靜受雲間草色春愁外禽聲午夢間開窗嵐翠滿疑對八公山石磴轉松隂髙樓面翠岑薜蘿春雨細橘柚暮煙深夜月喧林犬微風掠水禽一丘招隱處應慰白雲心偶成吟詠隨真性行藏聽自然因窮間半世託病謝諸緣乞字人催債修琴鋪索錢辛勤猶一事洗硯竹根邊題博古齋贈蔣子才寄迹多湖海逃名且市廛一區揚子宅四壁米家船玉辨荆山裏書收汲冡前耽奇同有癖相過定留連元日同閔壽卿錢叔達興公弟過定光菴訪樂上人避俗懶迎客齋心同結緣樹枝增一臘柏葉禁諸天法供更新水香爐宿舊煙空門無嵗月塵世自知年閔孝昭送其尊人隱武夷自歸廣陵賦此以送忍淚別嚴親長途劍衛身煙花歸路客風浪渡江人馬踏梅天雨鶯殘瓜步春從今閩海熟定省莫辭頻送父隱九曲辭歸天一涯他年同拔宅此日獨還家別夢縈芳草征帆過落花無勞慮甘旨嵓洞足煙霞再送曹能始此日鳴騶去當年戰勝歸故人供別酒關吏識行衣起草依丹禁含香覲紫微漢廷方貴少年少似君稀送林兆綸遊武夷飄飄鸞鶴羣去謁武夷君溪曲斜流月峯多亂占雲石牀深草色玉簡翳苔文半夜天壇上一聲清磬聞送張叔麟別駕歸永嘉言別淚潸然况君非少年殘鶯孤店雨羸馬斷橋煙劍已分雷煥刀猶佩吕虔故山鄰雁宕莫惜繫書傳同吳元瀚興公弟暮過神光菴薜蘿深處入一徑自逶迤待月嫌林翳看雲怯石危巖隂燈影晦山靜磬聲遲雖有重來約重來知幾時同閔壽卿桞陳父吳元瀚興公弟避暑仁王寺因憩天秀巖結夏依禪窟松關閉寂寥摩崖猜古篆相地徙團瓢赤日過林盡紅塵到寺銷清涼元有境人自愛炎敲題吳元瀚小像披緇還戴笠􅍦自坐崚嶒有相元虛妄無言即上乘形將同木稿心已似波澄不是舊相識翻疑何處僧同蕭二丈林子真興公弟微上人定上人過遇公轉華菴因與山僧熟祗園來往頻一時無俗客半日有間人巖樹雲邊暮池花水畔春掃除嫌太潔翻覺此身塵西禪寺野曠煙光薄林深暑氣微亂蟬鳴覺路一犬護禪扉花竹通諸徑旃檀大幾圍雲房吟卧久直到晚涼歸夏日偶成柬惟秦何方堪避暑勝地覔清幽坐選雲邊石吟尋水畔樓偏宜山友共唯許野僧留一日一丘壑安間直到秋夏日園居柬履吉山靜晚涼初僧寮寂不如礙雲嫌竹密受月愛藤疏茶熟焚香飲詩成洗硯書惟君知此况願數過吾廬懷元直客金陵經年客白門書札見寒溫共作幾回夢各銷無限魂聽鶯桃葉渡嘶馬杏花村欲識思君淚請看衣上痕送陳廣文棄官還溫陵白首厭微官滄江戀釣竿隱耽初服貴老怯舊氊寒緑酒枌榆社清齋苜蓿盤好將平子賦時對刺桐看送白經厯入覲遷客朝天去王程不可留誰知飛鞚日政及賜環秋殘雪燕山路微霜濟水舟從來白司馬未合老江州秋日偶成山翠夕陽天齋居息衆緣倦啼將暮鳥哀咽過秋蟬榻靜喧松雨窗疏納竹煙微吟多信步行到蓼花邊送錢叔達還吳興住傷流落久去惜別離難衣上三年淚尊前片刻歡西風楊桞岸夜雨蓼花灘山水含孤調從今何處彈過惟秦響山堂習隱栖南畝躬耕受一廛激流崩野岸鑿井割鄰泉蟾黽逰絲困鳬鷖亂葦眠考槃吾有志敢吝買山錢經廢寺寶殿莽蕭蕭殘僧宿敝寮壁餘昏後畫樹絶挂時瓢碑毁龜趺損梁荒鼠族驕聽經知識少馴虎度危橋送王獻子還袁州相逢當夏首相別忽秋殘逆旅淹留久空囊去住難蘆飛鴻外白楓落馬頭丹已乏綈袍贈霜風今又寒寄題鄧國弼貯青亭煙霞處處深紫翠滿遙岑夜靜松分籟天涼竹送隂野麏隨獨往山鳥答間吟古木蒼蒼色居人指鄧林題余伯明龍沙遺讖相逢證九還一竅指玄關道契鴻濛外神逰鶴馭間丹砂延緑髮白日駐紅顔試問龍沙會豫名列幾班涪州張節婦涪水澄如練還同節婦心柏舟吟自苦湘竹淚何深矢志終箕帚留顔見藳砧貞魂應不朽褒寵有綸音方山嚴孝子苦節甘辭祿幽栖瀨水邊為憂親白髮非薄宦青氊名列髙賢傳山留處士阡遺孤垂老日猶廢蓼莪篇芊江雪夜留別社中諸子嵗晏強為客時危怯離家孤身衝雨雪雙淚別煙霞前路天難盡故山雲易遮半生于役苦贏得鬢將華不寐展轉懷鄉國愁心夜更繁猿聲煙外峽漁火水邊村屢醒無完夢頻啼有亂痕草年嬰世網銷盡幾多魂嵢峽道中即事臘盡天猶暖林深翠未凋石多盤谷口路半出山腰雲色愁當岫灘聲怒過橋郵亭看尚逺落日見歸樵閨情淚盡閨中燭腸回錦上文蛾眉羞寫月鸞鬢罷梳雲枕怯羅衾冷香孤綺閣薰空牀本無寐况復夜蛩聞度分水關鳥道盤雲際停車怨隴頭封疆分異域關路割雙流地盡辭閩嶠山窮見楚州多情故鄉水嗚咽為含愁吳江哭顧道行先生圖報慙無地哭聲空震天恩私諸子外知遇十年前殘篋玄經祕儀牀絳帳懸舊題詩滿壁一讀一潸然送塢子遠還京口時塢有喪子之戚相逢俱失意相送奈愁何老去雄心減春來歸夢多舊山懷北固新淚滴西河世路已如此空為勞者歌望月有懷和陸纂父一別經圓缺三秋望轉明蛾眉今夕影鸞鏡舊時情貌逐清輝減愁隨素魄生關山千里隔何處照盈盈送蔡千户襲職還吳興龍韜堪報主燕頷定封侯挂印還鄉里揮鞭出御樓歸途尋越絶行槖佩吳鉤戎馬東南急憑君借筯籌都門逢湛如和尚金陵留偈別燕市忽相逢不托侯門鉢間聞禁苑鐘經文翻北藏禪理悟南宗行腳他鄉久空房偃舊松訪楊山甫相過即留連因君卜築偏香銷爐有燼茶熟竈生煙採得藝驅蠧栽將桞借蟬門前時載酒來叩子雲玄同陸纂父暮酌程康伯花下得枝字幽齋當薄暮移酌傍花枝選樹鶯窺酒穿林蝶罥絲月低流影緩風細度香遲不憚頻來此交歡無幾時同陸纂父山人楊山甫保御集程康伯典客衙齋看芍藥異種分仙禁嬌姿冠衆芳當階翻絳艷傍砌發濃香鄭國佳人贈吳宫西子妝畫欄春色好不用説維揚曾人倩雨中過酌故人休沐暇窮巷過吟鞭散帙鉤簾坐尋詩解帶眠馬蹄淹暮雨鶯語亂春煙自與壚頭熟不愁無酒錢周叔宗郁孟野俞羡長李長白黎慎甫雨集分得微霽如絲看乍歇庭際尚蕭森已覺收殘靄翻疑結薄隂晚山消夕暈好鳥間新音徙倚花林暮斜陽生逺岑題曹能始計部潞河公署園亭司農開別墅一徑滿煙霞與鶴同臨水隨蜂共放衙榆飄沿徑莢榴發傍牆花自足園池樂無煩到習家送金季黃山人遊五嶽年來婚嫁畢五嶽寄間心勝地隨緣住名山到處尋孤笻青嶂老雙屐白雲深去矣辭塵網髙蹤比向禽潞河別曹能始悲歌燕市築歸興潞河船作客有何意還山仍種田窮猿投散木飢鶻倦遙天以我空囊故憐君損俸錢流落誰如我艱危况別君渡淮三伏雨瞻闕萬重雲殺氣旌旗滿哀聲鼓角聞臨岐雙涕淚不獨為離羣昔年同獻賦此日尚沉淪我有恓皇淚君憐棄置身黃塵歸路客白髮倚門親不盡消魂意哀歌難重陳久已歌黃鳥還勞賦白駒心雄猶短劍目斷更長途去住總歸客行藏空腐儒故園關百慮何敢畏馳驅潞河驛別周叔宗經時俱作客此地且盤桓去路黃塵滿征衣白日寒吳歌聊自和燕月暫同看因悔長安陌蹉跎未盡歡出都門留別茅平仲周思敬朱汝修吳孝甫張孺宗趙凡夫鍾山甫韓兆之吳載伯阮步文張曰肩諸君違時空獻策落魄出燕南戀闕情無極離人思不堪緑楊鶯睍睆青草馬驂驔總是飄蓬客何時又盍簮濟上歸興已如此歸帆尚濟州沙汀蘆受月江岸蓼迎秋不盡閩天逺無情汶水流敢辭留滯苦其奈倚門憂太白酒樓太白久不返酒樓猶未傾當年聊一醉千載仰髙名隔岸圍山色憑欄到水聲風流無賀監過客若為情王粹夫客淮上先歸相尋不值詩以懷之我來淮水上君已解歸舟逆旅無長策天涯總薄逰早辭征路苦先見故園秋漂毋祠前過因之雙淚流夜宿焦山贈道林上人鷲嶺傍龍宫慈帆但信風懸燈孤嶂裏洗衲亂流中山靜雲歸錫湖平月印空道林名不沗禪理似支公晚過惠山舍筏尋蘭若斜陽古殿開竹煙深似雨松瀑響如雷水逐鐘聲去雲從塔影來清泉隨意取裝得滿船回王百谷招集南有堂故人三載別此日一尊同菴度旃檀雨池涼蘋蓼風暮蟬歸樹急殘暑入林窮座客多湖海鄉心因暫空題姚叔乂玄散齋幽齋栖委巷蕭散寄髙吟筆底青山債尊前白髮心俗緣間漸減玄理老彌深三徑蓬蒿滿唯容二仲尋同沈稚咸過寒山寺訪旭公曲岸暫維舟精廬訪比邱鐘聲聞半夜杯影見中流榻倚干花晚房開萬竹秋相看成一笑疑是虎溪逰贈劉會卿保御但得筋骸健何妨鬢髮蒼詩成開白社書就祕青囊世事間能遣機心老易忘時時留客醉絲竹滿髙堂贈沈公繩久已稱三絶真如顧虎頭杜門間自得於世淡無求丘壑胸中相瀟湘筆底秋沈郎腰細盡盤礴未能休哭鹽官斯學上人微塵元世界師已厭微塵滿月初圓果浮雲易了身曇花天外散金骨塔中新不作無生想聞之應損神常山道中來時逢朔雪歸路又秋風客計慚羸馬鄉心逐去鴻喜看閩地近漸見越山窮想到家林日籬花開幾叢經舊逰懷康元龍西陵分別後蹤迹各飄零又見楓林赤依然酒㡢青關河仍舊路風雪憶郵亭獨坐孤燈下踈砧未可聽鵝湖晚行一徑入莓苔前峰夕照催飢烏繞樹去乳犢出林來山色自然秀野花無意開村村足幽趣差得少遲回車盤驛征途秋草遍客子倦知還嵗晚繅車急年荒水碓間峰巒青絡繹溪澗緑回環落日蒼茫外何山是故山歸次建溪聞鄭君大訃詩以哭之忽爾傳君死猶疑訃未真哀來魂欲斷痛定淚沾巾泉路何其近皇天太不仁髙陽修舊社應少白頭人送我荷亭上相看惜解携生離猶唧唧死別重凄凄世不容豪俠天疑愛滑稽魂兮招不返歌罷數行啼正擬還家日對君懷抱開如何千萬語總作一聲哀淚不到泉壤書難通夜臺或君靈爽在知我已歸來交逰君最長矍鑠有誰羣對酒杯邀月看山屐躡雲貧猶開白社老不厭紅裙何意經年別歸來便哭君秋日載酒同陳汝翔黃伯寵惟起惟揚二弟訪王玉生郊居緑酒因君載青山與客同畫成真道子隱去即龎公丘壑村村合桑林巷巷通坐來香不斷窗外木犀風冬夜袁無競過酌鐘聲排小閣燈影墜孤尊竹淨雲隂薄花踈霜氣繁卑喧雖近市幽僻亦深村坐久兒童睡山風自掩門陪屠田叔使君遊仁王寺同康元龍袁無競興公弟分得回字鐘磬近香臺鳴騶半路回莊嚴菩薩界善信宰官來合掌緣同結攢眉禁暫開山僧能愛客蓮漏不頻催送黃若木還莆執手向城隅送君歸鯉湖風濤危渡峽雨雪倦登途遣日携書卷消寒問酒壚不須嗟伏櫪千里待名駒髙賢祠成答屠使君廟貌壯千秋英靈託一丘藻蘋無俗客香火總名流白骨化已久清魂吟未休預知百嵗後同得此中遊八代斯文振全閩雅道尊精靈同不滅顯晦未須論權自操吾黨名非藉子孫泱泱東海上真可霸中原新祠勞仰止神理定非遙五世應難斬千秋永不祧像從詩外想魂向賦中招後死吾徒在遺風未寂寥爼豆隆殊典山林更有光詩真傳在世沒果祭于鄉身後榮如此生前困不妨當年冠蓋者誰敢望宫牆囦溪十里橋與屠田叔泣別從來軒冕淚不滴芰荷衣獨有今朝別使君先淚揮地偏愁會隔天濶恐書稀望望車塵逺人人哽咽歸惟秦冬夜偶至擁爐對酌率爾成咏音從空谷聽興似剡溪乘榾柮殘爐火松膋半壁燈俗情談後減詩草別來增濁酒堪消夜渾忘朔氣凝有感傳聞關白死海氣絶氛腥間諜防真偽悲歡雜涕零王春回雨露天怒息雷霆時事難髙枕端居莫謂寧餒虎橫行甚村氓骨半枯猛應憑倀鬼威或假妖狐白晝常當道清時敢負嵎官兵虛搏擊雞犬反驚呼久雨防時歉囊空米價騰子錢殘嵗急官賦隔年徴薄劣明時棄疏慵末俗憎處籬同斥鷃未敢望鵾鵬贈本淨上人信心歸淨土行腳到閩天度衆時開講降魔夜不眠聞鐘能悟性補衲恐妨禪何日參猊座焚香聽白蓮題林明府先輩挽詩卷後鄉録留名姓遺圖見影神鳴琴瀔水曲歸櫬贑江濱哭墓門生老傳家嗣子貧卷中哀挽客存者更何人慰陳平夫憐君多難日知己亦銷魂已歎如懸磬何堪復鼓盆舊情思挽鹿新恨聽啼猿為問牛衣上添將淚幾痕與黃道晦夜坐話舊零落田園後還嗟世事更眼昏妨夜讀身老廢春耕稻麥虧豐嵗虀鹽淡此生相看燈影裏無限舊時情嵗暮戲題詩稿後本以牢騷著多因幽憤成雌黃招衆口青紫誤今生落落無窮意遙遙不朽名萬言難卒嵗掩卷獨傷情水明樓贈陳仕卿日日來相訪愛君幽意長畫題隨客命詩債逼人償聽雨坐蕉徑放雲開竹房入林無小阮終少七賢狂賦得繫臂紗送陸姬紅汗沾猶濕纒綿玉釧知暗香生皓腕微暈隱豐肌疑作同心結看如續命絲守宫今褪盡情重枕郎時題普通寺山城已在山寺更翠微間磴路危因石杉松密護關鶯聲無意巧雲影自然間徐步經行久桐花滿地斑贈黃思衡廣文意氣貧難減文章老更工身間貪佛日官冷稱儒風夫子推楊震經生重馬融劍鋒銷未盡耿耿尚如虹懷惟秦客粵計程當入粵蹤迹竟何如馬度栟櫚密鶯啼簟竹疏定回天外夢誰寄嶺南書寂寂蠻村路知應念索居幔亭集卷六
