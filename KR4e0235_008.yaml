body:
  text: 幔亭集巻八明徐熥撰七言律詩冶城懷古千里山河霽色開清秋臨眺獨徘徊虹橋隠隠龍江繞雁塔雙雙雉堞迴落日寒潮螺女渡冷烟衰草越王臺當年覇業俱塵土愁聴荒原鳥雀哀冶城日落亂啼鴉城上烏烏起暮笳四野桑麻八閩郡千村烟火萬人家無諸古殿傷青草南宋行都想翠華人事已非湖水在年年風雨長蒹葭垂虹橋別顧學憲先生垂虹橋畔水悠悠無數青山起暮愁桐葉戰風驚逺夢蘆花含月隠孤舟吳江露下丹楓冷震澤雲寒白雁秋此去風帆何處泊相思明日隔滄洲夜聞吳女誦經佳人何意悟禪那夜誦金經數百過窈窕相中疑大士妖浮聲裏半彌陀還於女伴歌吟懶自與尼師結拜多謾道西隣歸彼岸此生無計渡恒河擬咸陽懷古咸陽禾黍正離離人代興亡豈有期廢殿秋風秦劍㦸荒山夜雨漢旌旗茂陵空灑千行淚渭水長流萬古悲何處登臨最惆悵樂遊原上日斜時愛妾換馬如燕如龍戸外嘶行雲行雨意悽悽青蛾永別黄金屋赤兎新飜碧玉蹄雖有飛騰空冀北更無歌舞出樓西他時紫陌相逢處望見銀鞍不住啼雙眉顰蹙四蹄飜皂櫪無聲被不温憔悴難忘當日寵悲鳴猶戀主人恩强隨夜月登妝閣愁逐秋風出塞垣金埒玉樓遙騁望幾多汗血幾啼痕夏日靈山堂避暑灌木隂中共倚欄飛來蒼翠落簷端滿林花雨諸天近六月松風一座寒鳥入亂雲飜影滅蟬當斜日送聲殘相逢正有淹留興其奈踈鐘報夜闌越王臺懷古山河如故霸圖休臺下空江水自流嵗久莓苔生廟壁日斜葭菼滿汀洲旌旗影滅秋風冷劍㦸聲沉暮雨愁莫道釣龍人已逺精靈還向夜深遊寄長溪史使君徳明少年作郡到長溪五馬時從桞外嘶官舍鳥啼春寂寂公庭吏散草萋萋山城夜月聞弦誦瘴海秋風絶鼓鼙日向習家池上醉兒童爭唱白銅鞮送林熙工陳汝翔陳伯孺潮上人遊武夷津亭落木已紛紛無那離情對夕曛極浦風烟隨鳥盡寒潭秋色與僧分蘭舟獨載千峰月竹杖同扶九曲雲此日江蘺正堪采為余遙薦武夷君秋日陳汝大載酒林氏水亭滿天秋色雁邊遙載酒芳園暑氣消桞外鳴蟬寒度雨竹間小浦暗通潮半林緑樹迷危堞一帶蒼山隔斷橋此地相逢不沉醉更於何處避塵囂送老卒還鄉少小從軍出玉門蕭蕭白髮返丘園塞垣此別休回首舊路重經更斷魂殘槖只餘孤劍在故鄉知有幾家存古來征戍生還少何必封侯是主恩經古戰塲蕭條殘壘不勝悲此地曾經幾亂離恨血尚餘春草裏游魂多出夕陽時瀟瀟寒雨聞刁斗漠漠隂雲見羽旗滿路干戈愁轉戰胡笳休向馬頭吹贈顔廷愉將軍姓名曾冠少年塲逆旅相逢意慨慷能以三都雄藝苑還將一劍倚扶桑燕臺擊有荆軻筑粤國游無陸賈裝為愛琅邪門下士如君詞賦獨升堂詩名久已動長安此日仍登上將壇投筆恥為秦博士横戈今作漢材官常拚一命酬知己不愛千金贈所驩莫道書生無逺畧東封函谷有泥丸秋日居法雲寺喜瀚上人見訪門掩蒼苔一徑幽白雲應為逺公留踈鐘隠隠諸天暮殘葉蕭蕭滿地秋竹院又逢今日話芝山猶憶舊時遊此中傳偈多禪侣何必浮杯到沃州秋夜同顔廷愉黎廷彬二將軍王元直秀才觀微上人興公舍弟集鄧道鳴閫帥行署賦得紫薇夜漏同用花字虚堂良㑹寂無譁忽聴譙樓鼓亂撾響入招提隨斷磬聲傳睥睨雜悲笳共占此地星文聚莫問中宵斗柄斜滴盡銅壺天似水月光初轉紫薇花顔廷愉旅館夜集聞歌越王城裏起西風旅館相看興不窮詞客交情聯縞帶美人幽恨寄絲桐當筵夜静燈花緑隔寺秋深落葉紅此去豈愁逢醉尉踏歌齊向月明中陳亷訪先生七十初度投簮久矣老滄洲共説神仙是隠侯衣剪烟霞輕豸繡家營雲水比莵裘數莖瑤草千年緑九月黄花一徑秋不用尋仙訪真訣姓名元已注丹丘送陳道育遊吳西風蕭瑟不勝愁無奈同心賦逺遊一帶青山吳苑暮滿林黄葉太湖秋離魂𣺌𣺌隨鴻斷鄉淚潺潺逐水流况是天涯搖落後豈堪為客獨登樓得李伯實太學書知其移家金陵却寄天涯久別正銷魂忽爾開緘見涙痕東粤梅花留去客南朝芳草待王孫春風八口依京國夜月千山夢故園徃事傷心君莫問臺城烟桞易黄昏同王元直讀書法雲寺賦贈精廬髙傍玉蟬峰采葛歌成意更濃把臂共揮花下麈連牀同聴佛前鐘覆棋憐爾如王粲倒屣何人是蔡邕白首交期誰得似寺門遙指嵗寒松送林叔度遊支提寺何時蹤跡別壺公嵗晩看山過霍童客路杖藜殘雪裏人家雞犬亂雲中鐘聞下界諸天近寺隠深林一徑通遙想空門多勝事半龕明月幾僧同贈別康孟擔一丘栖隠近何僊不異龎公在漢年名混布衣堪傲世齋供繡佛可逃禪尊前有客同浮白身後誰人識太𤣥此別相思勞夢寐壺山雲樹鯉湖烟送陳元凱明經北上兼覲省津亭落葉㸃衣斑斗酒臨岐動別顔江上流澌前嶺雪馬頭晴樹隔淮山征途嵗晩鴻聲斷上苑春深草色閒此去趨庭驩不淺可無飛夢到鄉關江干分手動悲歌迢逓關山嵗杪過獨夜懷人魂夢逺中年知己別離多車驅微月寒登隴馬踏殘氷曉渡河若遇長安舊相識為言生計久蹉跎送葉進卿太史還朝星軺萬里上長安嵗晩關河雪欲殘劍珮晨趨金闕霽絲綸夜草玉堂寒千條御桞鳴鞭過五色宫雲拄笏看幸有同心在霄漢清時無用賦猗蘭陳汝大六十初度年少曾窺寳笈文老來髙臥謝塵氛吟邊野興隨青草世外餘生付白雲大藥已傳龍虎秘閒身應混鹿麋羣桑弧正及黄花節一度花開一壽君送人之邊萬里横戈賦逺征天涯去住不勝情隔河獵火秋調馬古戍狼烟夜列營沙磧春深無草緑邊城亂後少人行客中知有還鄉夢莫聴孤笳月下聲漠漠黄塵匹馬孤馬頭今去向飛狐望鄉臺畔無青草敇勒城頭有白烏滿路寒霜朝倚劍一天明月夜吹蘆單于莫近隂山獵南國書生正棄繻無題和李義山香燼金猊燭散風月沉西嶺水流東雲迷洛浦人何處桞暗章臺路不通逺岫似凝眉上翠守宫猶染臂間紅凄凉徃事休重省十載游蹤嘆轉蓬為雨為雲無定蹤半衾幽恨數聲鐘絃於離緖同時斷墨與啼痕一様濃無復芳心含荳蔻空將薄命委芙蓉西隣只在髙樓畔似隔天台路幾重擬劉晨阮肇入天台效曹唐歴盡千山與萬山白雲飛處見松關路從碧澗通仙竇夢絶紅塵出世間花落洞中春寂寂日斜溪上水潺潺哀呼四壁多猿鳥迷却來蹤不可還劉阮洞中遇仙子路入天台境寂寥空中吹送白雲謠桃花片片流丹壑瑤草青青映翠翹五色烟霞迷鶴夢數聲環珮隔虹橋人生莫道仙凢別携手春風是此宵仙子送劉阮出洞雞犬聲中羽袖分桃花折贈寄殷勤愁來玉液誰同飲別後瑤笙忍獨聞蹤跡但隨溪上水仙凢只隔洞前雲從今萬刼仍千刼惆悵無縁再遇君仙子洞中憶劉郎佳期誰信此生休夢斷巫山幾度秋瑤草似憐人逺去桃花仍逐水東流紅塵夜月空留枕紫府春風獨倚樓只恐重來迷處所洞門深鎖碧苔幽劉阮再至天台不復見仙子重到仙源路轉深舊遊蹤跡已銷沉千年山水自朝暮四壁烟霞成古今不見胡麻流別澗獨聞幽鳥噪空林早知一別無尋處應悔當時出洞心蕚緑華將歸九疑留別許真人縹緲雲軿駕彩霓半天遙聴玉麟嘶身歸紫府難為別目斷紅塵不住啼新啟離筵鋪鳯髓重封真誥印龍泥黄金條脱空留贈九㸃青山望已迷玉女杜蘭香下嫁張碩黄金釵股紫金鈿忽駕鸞車降碧烟百尺虹橋天上路萬條花燭世間縁雲璈曲妙調龍琯露液杯濃啟鳯筵却笑裴郎仙分淺一雙玉杵種多年張碩重寄杜蘭香𣺌𣺌靈蹤去不還空勞珍重碧雲鬟人間無路通瑤闕夢裏何因見玉顔蘭露半銷香冉冉花風初度珮珊珊欲將一札傳青鳥知住蓬萊第幾山織女寄牛郎臨流幾度待金颷天帝無情恨鵲橋玉宇微茫空隔水銀河清淺不通潮心隨鳯駕思靈匹涙逐龍梭上錦綃難得歡娛容易別年年腸斷可憐宵甲午迎春家家簫鼓響何頻海國驚看物候新自有東風吹綵勝不愁微雨灑紅塵土牛未送山中臘寳馬先行嵗裏春三十三齡容易過蹉跎又是隔年人嵗暮感懷年來蹤跡嘆蹉跎獨向衡門戀薜蘿前路虚名青鬢少先人遺業白雲多匆匆短晷愁中盡冉冉浮生夢裏過時事凄凉應莫問空山相對意如何甲午元日平明曙色亂春烟獨對東風意惘然蓂葉乍開堯砌上椒花先獻佛燈前忽聞爆竹迎新嵗媿飲屠蘇後少年莫道清霜隨臘盡只愁飛入鬢毛邊贈鄧道鳴都閫千騎如雲瘴海間一天明月照刀環營門晝靜笙歌沸部曲秋髙劍㦸閒樂奏金鐃新破敵名標銅柱舊平蠻玉關他日功成後猶見將軍鬢未斑送林貞發之漢陽兼寄陳仲敬明府江干折桞正春初閩楚相看萬里餘滿路愁雲過七澤一天明月弔三閭帆飛漢水鶯聲早書到衡陽鴈影踈為語神明河上宰故人生計已樵漁王相如文學千里來訪詩以贈別少年名姓滿詞塲千里相尋問草堂博物每披周石鼓摛文能賦魯靈光九龍夜吼門前水疋馬秋歸嶺外霜收得秘書盈萬巻王家事業本青箱送歐陽霖仲歸鄉梁獄書成淚未乾天涯流落畏途難杼投已信曾參語袍贈誰憐范叔寒逆旅相逢愁咄咄故鄉歸去路漫漫布衣正好彈長鋏何必逢人變鶡冠送周公子還金谿彭蠡西歸去棹長東風江上送周郎數聲忍顧歌驪曲三月惟齎養鶴糧寄逺桞應攀驛路思親花每夢河陽家山况與豐城近別後遙看劍氣光送徐半刺之官淮陽東風吹送片帆輕江北江南萬里程隋桞似迎行客過淮流難比使君清尚懷太姥看山夢新就鹽官煮海名盤裏水晶堪餉客幾時重見故人情甲午端陽即事滿市貧民盡譟呼誰家尊酒汎菖蒲漢廷久已饑方朔楚澤何人弔左徒殘喘厭看長命縷空囊安用辟兵符愁來試上孤城望幾處炊烟幾處無將發芋江別惟起惟揚二弟霜落烏啼半上潮江頭那忍解蘭橈已悲去路關山逺况復歸期嵗月遙衰鬢依人愁冉冉荒年為客槖蕭蕭他時兩地同相憶記得離筵是此宵飲胡元瑞蘿月軒停棹來尋瀔水陽半窻蘿月坐飛觴堦前鶴跡留苔淺秋後蟬聲出樹凉客路蒹葭寒細雨他鄉碪杵度微霜布帆東下江流急滿目西風別恨長寄別幼孺次來韻故國青山又逺違懷人空有夢魂飛猿當暮雨聲偏慘鴈到秋風影尚稀一夜思鄉華髮變中年為客壯心微竹林此日無多侣莫向山中厭布衣寄贈屠長卿儀部姓名曾註玉皇家吸盡遙天五色霞一㸃真陽封土釜六時神水轉河車黄冠長日居蓬島紫氣中宵隔若耶莫道相逢期太晩于今佳䜟有龍沙一區長傍鑑湖邊坐對三花九品蓮家散黄金惟塑佛詩成白雪半游仙栖禪净室雲堪臥馭氣遙空電可鞭他日從君無別語祗應同證大因縁題公朗寳函樓危樓百尺梵王居禪誦聲髙晩磬初一榻秋雲松火冷半窻殘月竹隂疎鷲峰花雨諸天外猊座金身六代餘多少塵勞都遣盡獨留詩癖未全除寄懷瀚公逆旅裁書問道安故園明月幾廻看身閒對客題詩易嵗儉逢人乞米難風動空山孤錫響霜深禪榻衲衣寒知師不作天涯夢長夜忘眠坐戒壇松陵舟中西風吹袂失炎蒸落日波光似鏡澄囊裏錢餘縁戒酒途中舟緩為尋僧孤村近浦船為市古寺臨江塔有燈一帶人烟何處所榜歌遙指是松陵吳閶弔髙季廸太史吳門燈火正黄昏讀罷遺編濕涙痕五字幾人傳故業一杯何處弔吟魂秋風茂苑留荒草暮雨寒山泣斷猿欲向居人問封土衣冠未必塟家園旅次石頭岸石頭城下水微茫回首鄉關驛路長𤓰歩烟波連斷靄秦淮雲樹隔斜陽秋髙落木迷村舍夜静寒潮到女牆客裏愁心已如此一聞南雁更凄凉金陵懷古白門京闕舊山川朱雀烏衣夕照邊百代荒陵崩夜雨六朝遺殿鎖秋烟胭脂嵗久銷宫井苔蘚春深繡御筵徃事凄凉無限涙傷心最是建文年客中感秋呈王徳載盧子明桞陳甫諸公他鄉為客長離憂一夜新寒感敝裘對酒正當桑落後思家偏向雁來秋白門月冷碪初斷淮水霜深葉自流不是天涯有知己萍踪那得久淹留送張孺愿還四明為兒娶婦離情黯淡白門西何處雲山是㑹稽作客暫辭桃葉渡思鄉多夢若耶溪寒蘆夜雨鴻初斷衰桞殘陽馬倦嘶待汝尚平婚嫁畢五湖明月共招携送胡彭舉之衡陽愁折衰楊過御堤吳門遙望楚雲低髙峰見月秋廻鴈野店逢霜曉聴雞九𣲖江流湓浦外一天帆影洞庭西知君作客年來慣不畏猿聲日夜啼葛震父招遊雨花臺同張康侯姚佩卿諸子髙臺千尺俯烟霞却望當年舊帝家百雉都城仍踞虎六朝宫樹半栖鴉雲邊淮水連天逺林際鍾山帶郭斜獨有空門不銷歇至今猶落講壇花送陸纂父山人還洞庭別業他鄉相見又離羣滿目西風落葉聞二水空洲孤棹逺三吳秋色一江分白衣出郭金陵雨緑酒看山震澤雲從此游蹤各南北月明無處不思君同吳翁晉姚叔乂諸子集陳公衡衙齋南朝仙吏擅風流四海論交半敝裘粉署鳥啼花外雨白門鴉散桞邊秋故宫雲氣銷長樂近郭湖光起莫愁馬踏夜分歸路晩踈鐘遙動景陽樓贈李茂承太學雲間才子氣翩翩偶爾相逢入洛年半夜孤帆三泖月一秋雙屐六朝烟匣中紫氣頻看劍筆底青山不賣錢同是天涯流落客何妨長醉酒罏邊隔簾美人環珮聲聞見不真多情綽約徃來身只縁竹緯垂千縷似對菱花隔一塵繡帶暗飄紋外影秋波潜送隙中春重重錦浪生羅襪彷彿雲間遇洛神同梅季豹林叔度碧峯寺訪如愚上人行盡空林到沃洲滿林黄葉上方秋松遮古殿半山翠竹隠空房三徑幽寳蓋影飄依佛座曇花香散拂經樓年來綺語方除障不敢題詩贈惠休同閔壽卿王獻子二山人集王徳載都䕶溪閣同得蕭字尊酒憑虚破寂寥秣陵雲物晩蕭蕭窻開逺岫常邀月閣枕寒溪共聴潮萬里風烟天外盡滿林秋色雁邊遙主人久傍牆東隠不向西山更射鵰馬姬館贈梅子馬寳劍逢人脱贈輕平生肝膽片言傾千秋白社工文客半世青樓薄倖名枕上楊花今日淚渡頭桃葉舊時情囊中不管黄金盡猶買嬌歌夜夜聲壽雪浪禪師九月九日五十初度祗林遙見白毫光髮祝多年尚未蒼菩薩應期生下土聖人此日出西方堦前記臘松長在座上拈花菊正香一自九龍仍吐水從今浴佛説重陽金陵故宫先朝遺殿閉塵埃零落空勞過客哀五夜銅壺乾罷滴六宫金鎖澁難開翠華去後全無影羅綺焚餘尚有灰弓劍盡埋烟雨冷椒房一半上蒼苔重陽後顧世卿招㳺清凉寺翠微亭虚亭髙與翠微連尚有黄花照法筵下界梵音中夜磬半空帆影隔江船馬行十里松隂月人藉孤峰草色烟我本倦游多感慨老僧休説六朝年陳彦莊侍御招遊清凉寺同向空門結白蓮琳宫遙隠帝城邊閉關僧是他方衲題壁人多異代賢江北江南千里月山前山後萬家烟座間自有霜威肅避暑何須説往年送何伯達太學還鯉湖嵗晩扁舟發水濆勞勞亭下歎離羣一行鴈影斜陽見幾處砧聲半夜聞作客厭看吳苑月思親飜望秣陵雲他時九漈勞魂夢跨鯉仙人正是君燕子磯蘆荻蕭蕭逺水平沉江鐵鎖尚留名半空鸛鶴飛來影千載黿鼉化去精石占中流危截浪雲侵殘壘暝吞城山僧似惜游人別猶送踈林磬一聲觀浦口珠泉一泓如練净無塵幻出明珠顆顆新疑是鮫宫逢賈客難於金谷換佳人夜光不説昆明水照乗何須合浦濱生滅由來歸泡沫欲將靈跡問波神訪梅禹金秦淮客舍舟過長干問客星風流不用嘆飄零一秋桃葉居淮水十月梅花夢敬亭遊徧南朝多寳寺繙殘西竺幾函經贈君欲折藏鴉桞滿目隋堤何處青謝司理招遊道塲山碧樹香臺一徑紆滿林幽鳥避前驅重重翠巘看蒼弁𣺌𣺌層波見太湖鐘送餘聲過下界雲留殘影挂浮屠畫船載月歸來晩十里烟光澹欲無謁孫山人太初墓兼懷鄭吏部繼之道塲山下見荒阡欲弔吟魂一愴然寂寂梨花寒食雨蕭蕭蒿草夕陽烟空林夜静聞猿嘯斷碣年深借鹿眠若把梅亭比苕水千秋黄土總堪憐閨情深閨長日望刀環錦被香銷繡幙閒豈有夢魂通暮峽更無眉黛畫春山情牽夜月孤蛩泣目斷秋風一鴈還不是狂夫恩意淺由來薄命怨朱顔同强善長包蒙吉計仲嘉徐子晉斯學上人集寳林寺鏡公房時䝉吉來自東甌仲嘉歸自燕趙吳市飄零感嵗華偶携瓢笠到僧家孤雲静結人天果朔氣寒生佛座花作客畏聞燕地雪逢君先問赤城霞山中欲別各留偈送過虎溪將日斜為王百谷悼亡不顧房帷十載恩竊將靈藥月中奔楚臺有枕難通夢漢殿無香可返魂夜静鴛鴦虚錦帳晝長鸚鵡喚璚軒小星三五沉何處垂老青衫濕淚痕虎邱寺千頃寒雲隠上方半天明月照廻廊玉鳬化去山精滅金虎銷殘寳氣荒塔影虚空藏舍利泉聲日夜淬干將霸圖零落浮圖在不拜吳王拜法王贈彭城蘇姬蘇小門前繫紫騮隔簾相見尚含羞青蛾暫結花間約緑蟻能忘客裏愁一片輕寒銷枕簟半窻明月上箜篌從今若過彭城路不説張家燕子樓初春徳州道中有懷故園落日平原朔氣凝征途迢逓倦難勝風生沙捲殘年雪春至河銷半渡氷古戍黄昏喧斷角遠村寒夜見孤燈鶯花自愛家林好裘馬何心向五陵易水懷古一笑秦庭事已空蕭蕭寒氣動悲風飛霜枉購千金匕貫日猶懸百丈虹公子歌殘衣變白田光死去血流紅薊門零落咸陽火易水年年只向東同許靈長太學張去華山人陳幼孺曹能始二孝亷集鄧汝髙計部署中賦得長安新桞送張成叔太學還四明東風二月薊門過新桞青青拂御河淺緑乍分眉上黛柔條難任笛中歌幾時葉滿章臺路有日花飛太液波同是一枝堤畔種無如此地別離多下第後書懷自是揚雲白未𤣥不才那敢怨蒼天回看故國八千里誤戴儒冠十七年貧倚詩書元失計窮知文字信無權雄心銷盡囊如水流落依人面可憐一領青衫萬斛塵溝隍十口計全貧關河偏阻空囊客童僕潜歸得意人雲路豈能容野性帝鄉元不住閒身長安浪説春光好未見丘園非是春南還留別許靈長張叔弢馮咸甫鄧泰素文夢珠柯起之諸子日落燕關馬去遲一尊相對總相悲豈堪客路銷魂處正值皇都失意時此去惡分燈下影重來愁益鬢邊絲與君俱是飄零者空説加餐贈別離謁孔林洙泗瀠廻兩𣲖分泰山龍䕶素王墳傳經已化三千士執贄難逢七十君室築空塲生蔓草樹殘荒隴起寒雲一抔馬鬛勤瞻拜欲向春風薦魯芹燕子樓舊日懽情委逝波空樓燈影恨如何一天夜月閒簫管十載春風罷綺羅松栢鎖烟愁思苦牡丹含雨淚痕多香銷粉歇歌塵散忍見雙雙燕子過書懷嵗月蹉跎黯自驚此身雖在鬢毛更江湖故舊無消息童稚交遊半死生喜信空門縁漸老厭聞徃事為多情客中最是愁人處獨夜殘燈風雨聲聞人仲璣卜居西湖詩以寄之卜築南屏第幾峰烟霞長日伴遊蹤橋頭桞色湖心月郭外潮聲寺裏鐘數載宦情同失馬千秋絶技羨雕龍蘭橈竹杖頻來往十里荷花九里松女冠還俗愁戴黄冠老此身芳心難禁黛眉顰且抛王母當年約去了蕭郎宿世因斗帳自今開甲乙星壇誰復守庚申幾回却笑巫山女雲雨空為夢裏人戯嘲鄭四效長慶體落落江湖無定跡匆匆相見闔廬城離鄉已是五六載道舊曾無三兩聲杯水覆堂難再返浮雲出岫便無情故人浪説工詞賦只恐登樓賦未成登延平𤣥妙觀𤣥都俯瞰碧溪濆上帝髙居接五雲入院經聲朝斗拜繞壇香氣降真焚龍精䕶法豐城劍鳥篆書符玉洞文月滿松關天籟寂飄颻笙鶴半空聞登芝山善見塔百轉清溪繞梵宫千尋丹磴勢盤空曇花亂散諸天雨橋板斜飛一線虹塔影層層青嶂外鐘聲隠隠白雲中憑闌不敢輕呼吸帝座溟濛近可通謁馬仙姬廟元君仙籍出扶風廟食千年建水東滿院松杉巢鸛鶴四時香火卜羆熊青天紫氣生靈幄白日紅雲䕶寢宫幾度憑虚朝上帝手抛霞帔幻成虹初至武夷道縁為重世縁輕總屬閒遊豈計程九曲仙班邀鶴馭半空天樂奏鸞笙經旬絶粒抛煙火到處行歌變姓名多少函中遺蜕在不知若箇是前生萬年宫萬年宫殿魏王居瑤草琪花滿玉除壇下餘腥猶漢代岩頭遺蜕是秦初客從雲水求丹訣帝遣風雷䕶簡書我亦曾孫今再世夢中親御紫鸞車宿冲祐觀風燈零落夜鐘殘數巻𤣥經掩不看藥採刀圭還玉液火留文武養金丹瑤池月滿鸞笙杳石榻雲深蝶夢寒斷盡世縁須及早肯將白髮戴黄冠宿接筍峰道院絶壁懸厓入杳冥丹房長借白雲扃地分六曲成三島臺聳千層禮七星暮靄晴飛岩瀑翠秋烟寒隠石燈青一聲獨鶴醒殘夢臥聴黄庭半部經宿雲窩贈陳司馬清溪九曲即蓬壺何用遙尋五嶽圖幽壑半開新净室秘書還看舊隂符鵷鸞班裏多年別雞犬雲中幾日驅重住雲窩縁不偶前身或恐是丹樞天游觀髙臺獨上翠千重吹散嵐烟有鐵龍地種三花元漢畤門扃五粒是秦封雲邊螺髻層層結雨後蛾眉㸃㸃濃倚徧危闌遙極目九環衣帶束芙蓉宿鼓子峰道院芒鞋厯徧翠微巔脩竹隂中別有天洞隠黄冠皆净侣巖封白骨盡飛僊石當隙處精廬搆路到窮時棧道懸夜静焚香同禮拜步虚聲散一爐烟游水簾洞時久不雨飛沫稍微賦得一首素練氷綃一夜收潺湲何處見龍湫鮫人海底餘殘淚玉女峰前上半鉤自有𤣥珠藏赤水不須瓊液咽重樓一瓢欲挽銀河㵼倒挂青天作瀑流尋和叔道士不遇暫去朝元出翠微紅塵何處染綃衣鸞傳紫府書頻至鶴帶青城箭未歸六甲風雷壇下守半空日月鼎中飛石函留得龍沙䜟莫道蓬壺㑹面稀武夷溪口送惟起弟度關竹杖芒鞋厯翠岑蒯緱忽動逺遊心離魂已與千峰斷別恨空如九曲深秪有飄蓬懷白璧全無大藥化黄金山中散盡賓雲曲淚落西風半夜砧青山遊侣散紛紛况復臨岐逺送君兩地鴈鴻難顧影一時鸞鶴總離羣人從杜若洲邊去路在桃花洞口分明發登髙各惆悵鵝湖斜日幔亭雲武夷送吳元瀚還莆日日看山住翠微虹橋宴罷各將歸幾時再買重遊櫂三載方還舊釣磯囊槖只携丹訣去夢魂猶帶白雲飛別君不用綈袍贈玉女新裁五色衣再送元瀚次來韻一尊同向蓼花灘露下丹楓落葉殘身泛孤舟愁弟逺淚揮雙袖別君難凄凉戍角秋霜曉明滅漁燈夜雨寒此去入林尋舊隠髙齋新長幾琅玕陳惟秦為其先人營塟久居永南山寄訊春事飄零倍憶君滿庭紅雨落紛紛鰲峰已作三秋別馬鬛新成四尺墳花下幾廻虚朗月竹中長日賦停雲北邙正有松楸感烏鳥聲聲不可聞訪薛煉師思齊桃花千樹繞江干花裏幽居日考槃曲徑開時供鹿臥方書抄就借人看一春草緑蓬門靜半夜雲生藥杵寒聞説延年有真訣相逢先乞九還丹壽李司理曾將詞賦冠明廷斷獄年來動引經徳比于公髙漢室名同小陸起華亭壽筵猶獻長生縷海國爭看執法星何必西巖采三秀郡齋瑤草自青青鶴吹飄颻下九天共看良吏是神仙朝來拄笏心如水夏至懸弧日似年函谷他時生紫氣長庚此夜應青蓮遙知臥理還多暇注得叅同有幾篇送王懋宣先生之泰順垂楊影裏亂啼鶯朝發都亭一騎輕黯淡蘼蕪尋去路微茫烟樹見孤城他鄉春色悲花落旅館愁心寄月明白髮蕭蕭猶作客臨岐分手更關情宿鄧汝髙竹林山莊羣峰迴合樹蒼蒼一徑雲隂散夏凉荒坂牛羊歸暮靄比鄰鵝鴨睡斜陽竹當踈檻常流翠花落清溪不斷香晏坐山中屏塵慮今宵如宿輞川莊春日居法雲蘭若移來書舍傍琳宫隔斷紅塵路不通游屐半閒新雨後法幢髙挂亂雲中夜深松偃疎簾月春盡花飛晩磬風謾謂空門人跡少相尋日日有支公登臨正及看花期青草葳蕤歩屧宜雨翳鯨音過院冷風傳鶯語出林遲閒尋緇錫談三昧偶伴黄冠禮六時自是山中堪避俗更無踪跡世人知古路蒼蒼入鷲峰烟霞隔斷徃來蹤時將真訣燈前課每與遊僧竹下逢滿架瑤函藏貝葉逺林山色絢芙蓉閉門晏坐塵縁息又聴雲堂起暮鐘滿徑蒼苔過客稀踈鐘纔動暝烟飛輕敲竹院殘僧返亂落松花一鶴歸夜靜石燈分佛火春寒山罽借禪衣上方萬籟聞俱寂但有經聲出翠微送王少文藁塟西郊蕭蕭孤櫬出郊關執紼空餘涕淚潸滿目松楸西郭路半天風雨北邙山函中白骨孤雲裏世上紅塵一夢間除却千年華表鶴更於何處望君還秋夜汝髙振狂伯孺過宿山齋時汝髙將赴闕西風搖落正秋天相對空山意惘然竹裏孤燈消氷夜鏡中華髮感流年寒蛩古砌啼凉月小犬疎林吠暝烟只恐心期隔霄漢豈能長向白雲眠擬積雨輞川莊經旬梅雨自沉沉灌木蕭森起夕隂泉過斷橋歸別澗鐘傳古寺出空林閉門習靜山中樂晏坐焚香物外心終日更無車馬客時從花塢聴鳴禽擬長沙過賈誼宅憐君謫宦楚江來門外湘波日夜迴廢井年深生亂草古牆春盡長荒苔猿聲似訴孤臣恨馬首空勞過客哀此地無須嘆寥落長安甲第亦成灰他鄉遷客恨悠悠此日長沙宅尚留寂莫空梁栖鳥雀蕭條古院閉松楸幾年宦况同雲薄一去君恩共水流欲採江蘺傷往事半天風雨洞庭秋無題數聲殘漏滿簾霜青鳥銜箋事𣺌茫剖贈半規蒼玉玦分將百合紫羅囊空傳垂手尊前舞新結愁眉鏡裏粧一枕游仙終是夢桃花春色誤劉郎無縁飜悔意相關雲雨巫陽一夢間獨撫朱弦琴哽咽背流紅淚燭潺湲新分半玦終難合舊贈明珠未忍還縱使章臺零落後長條猶自望君攀錦衾羅帳淚潸然淡月微霜夜可憐嚙臂尚思當日約同心空結片時縁瓶沉古井渾身碎珠孕靈淵幾箇圓一別天台成隔世桃花流水自年年一寸湘筠淚滿枝百年幽恨是幽期朱絃忽斷鸞難續錦字私傳鳥不知新唾花痕沾廣袖舊分香氣散重帷此生欲了尋春約須及清隂未緑時劍化雌雄玉匣空寒潮東逝信誰通金生蓮歩雙纒白釧約氷肌一線紅事去懽娛幷作怨縁乖魂夢也難同芳菲零亂春光晩滿地臙脂半夜風蘭心迷蝶桞藏鴉綺閣銀燈照九華百尺藍橋通歩障幾重巫峽隔窻紗魂銷翠帶胸前草腸斷青銅影裏花落盡深紅春色晩肯容劉阮更思家鏡中雙鬢綰如鴉廣袖新看染石華曉起靚妝消翠靨晝眠香汗浸紅紗半溝膩水堪流葉一尺雕欄不障花總為多情眉黛蹙怪他人説是西家愁見流蘇百結同繡幃寒夜一邊空幾痕斑淚孤生竹十指朱絲半死桐在野鴛鴦虚桃被出山鸚鵡怨樊籠臂紗不解纒綿意長䕶嫣紅舊守宫歸期無定數難占鳯蠟燒殘夜未厭幾㸃金徽桃後譜半邊銅鏡嫁時匳紅銷榴帶絲空結朱褪櫻唇酒不沾夢醒碧紗窻外月梅花踈影滿雕簷玉殞珠沉思悄然明中流淚暗相憐常圖蛺蝶花樓下記刺鴛鴦繡幙前祗有夢魂能結雨曾無心膽似非煙朱顔皓齒歸黄土脉脉空尋再世縁烈女吟湘水難同此恨深幽閨長詠栢舟吟半生夜雨常悲鶴六禮春風未委禽瑟斷朱絃因廢軫燭銷紅淚見灰心寢門一訣千年怨魂夢無由識藁砧秋日陳汝大鄧汝髙陳振狂陳子卿陳幼孺袁無竸興公弟集緑玉齋時余與子卿幼孺下第歸自長安汝髙將使浙中興公將游白下竹林文酒暫盤桓聚散無期後㑹難燈下幾人分去住尊前雙淚帶悲歡傷心此別魂俱斷落魄初歸夢未安他日東行占太史客星遙傍使星看送林觀察備兵金衢使節翩翩浙水過東山那許久蹉跎一門劍履閩中少百將櫜鞬越絶多露布星馳官負弩霜臺月滿士横戈九重正爾資籌算無暇尋仙訪爛柯贈車子仁郡侯含來鷄舌尚氤氲新握麟符到海濆案了簿書心似水門投詞賦客如雲市中騎竹迎童子池上揮鞭醉使君敝刺即今羞自獻敢言名姓舊相聞寄譚忠卿比部清時才子賦懷沙抗䟽歸來髮未華粉署一官淹組綬青衫雙淚怨琵琶杼投慈母縁憂國環賜明君定起家却愛衡門當庾嶺相思不用寄梅花送陳永奉游金陵千里行裝半醁醽渡江君去莫教醒馬經小小佳人墓舟過勞勞送客亭揚子風髙潮自白隋堤秋盡桞無青後庭遺曲桓伊笛都向秦淮月下聴壽大司馬吳公班綴鵷鸞爵上公鼎烹龍虎貌還童鐵冠曾執三湘憲銅柱猶存五嶺功曳處履聲為赤舄懸來弧影是彤弓渭濱未許長垂釣聞説君王正夢熊進賢冠換七星冠篋裏隂符不再看上帝久頒書玉檢先皇曾賜露金盤白䝉頭上應還黑赤在心中已是丹借得方平壺十二更於今夕獻瑤壇送薛君大秀才遊武林司馬南游正少年可堪人去雁來前孤舟白擁蘆藏月兩岸青殘桞散煙帆外客星灘七里湖中佛日竺三天射潮不用錢王弩但有觀濤賦幾篇送鄧汝髙户曹督餉之浙粉署含香又幾年轉輸今識鄼侯賢還家樹不言温室行部山應訪冷泉玉麈夜揮天竺月畫船秋放太湖烟江南水旱憂非細願悉民艱䟽御前送孫四之金陵一時詞客嘆飄蓬無數離尊半日同買笑好留錢子母防身須仗劍雌雄鹿麋夜走三吳苑狐兎秋悲六代宫建業城邊堪飲水孫郎名自起江東古田極樂寺曉起聴盡蓮華刻漏長山深嵐翠滿繩牀鳥啼松嶂聲聲月僧踏楓林歩歩霜座上落花天外雨佛前沈水定中香此生總是空門客到處皈依有法王過鄭樵林山人市隠堂一丘髙卧久忘機雙屐行歌徧翠微綸挂夕陽春釣罷笠携殘雪晩樵歸松窻月冷烟霞夢菊徑雲生薜荔衣不用鑿坏深避世山城車馬往來稀幔亭集巻八
