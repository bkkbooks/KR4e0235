body:
  text: 幔亭集卷十四明徐熥撰七言絶句閩中元夕曲滿城簫鼓沸春風爆竹聲喧鳯蠟融三十萬家齊上彩一時燈影照天紅家家同結過街棚夾路花燈列火城來往香車渾似晝不知身在月中行閩山廟裡賽靈神水陸珍羞滿案陳最愛鮮紅盤上果荔枝如錦色猶新珠璣髙噴火龍紅滿架銀花一線通忽到半空聞霹靂灞陵橋斷紫煙中紫騮嘶向月明間漏盡銅龍尚未還何處鳯笙聲嫋嫋松棚髙結舞鰲山烽煙久息海無波紫陌紅樓樂事多燈下數聲郎子鼓兒童爭唱八仙歌花箋五色製燈聨榜向街頭境社前緩步巡簷看一過就中都説太平年無數紅妝去復回竹林仙境起香埃低聲偷向神前祝願早熊羆入夢來朱門處處月光流金鼓喧天夜不休堂下裝成獅子吼一雙爭戲綵絲毬妖姬三五珮闌珊踏碎香塵月影寒忽聽流星天上起共停蓮步轉頭看彤襜髙揭露妖嬌月色燈光映翠翹年少路傍虛送目良家女伴轉三橋風流公子正髫年腰帶千文萬厯錢浪買梨花三百朵一時光照鼓樓前誰家白晳少年郎蜀錦吳綾别樣妝半醉半醒騎馬過最堪魂斷是龍陽市上新燈巧樣張玻璃一片白於霜夜長滿注瓶中水幾隊遊魚逐火光流蘇綃帕綴雙懸百對華燈火樹燃五帝行宫初出境家家香火送神錢慶城燈燭夜輝煌照見豐碑字幾行此是先朝湯沐邑年年歌舞祭閩王前代繁華説福州滿城蘭若挂燈毬于今一盞長明火勝事銷沉幾百秋月影遲遲蠟炬銷殘燈同約大家饒從今處處成遺俗飽看燈光十二宵西湖十景竹枝詞六橋煙棹柳外春煙午未消煙深何處認郎橈小鬟不用頻相問已約桃花第五橋三竺晚霞霞光片片映香臺花下紅妝笑靨開預卜明朝天色好願郎遊騎得重來九里松風虬龍千尺翠煙凝九里濤聲浪幾層油壁青驄堤上過同心猶記結西陵孤山梅月梅花十畝映湖塘歷亂幽魂處處香淡月一輪疏影見青銅鏡裡壽陽妝桃溪花雨桃溪春色武陵同落盡殘英陳陳風暗出袖中花一片問郎何似夜來紅石屋晴雲石屋雲開淡復濃青山微露半芙蓉一時遊女紅妝濕身在髙唐第幾峰綵鷁紅妝湖心歌管遏春雲水底榴花六幅裙轉過蘇堤歡不見停橈齊上嶽王墳錦塘春柳三月尋春到錦塘青青垂柳一絲長折來戲作同心結不是同心不贈郎龍泓潄玉驪珠不動小龍眠井水無波玉鏡鮮携手與郎同一照忽驚花發並頭蓮鷲嶺觀曦啼罷天雞曙色微鷲峰髙處見朝暉傍人不用歌行露夜與郎遊尚未歸山居雜興雨後空山剝啄無滿階苔色繡氍毹開門忽訝新痕破知是雙雙過鶴雛呼童洗硯寫黃庭手自摩挲舊日銘漸露滿池鸜鵒眼猶餘殘繡上金星桐陰如蓋午風涼沉水香消白晝長觸手殘編隨意看一時書卷亂堆牀幾年心與世緣疏獨有雕蟲癖未除賦就一篇詩得意人來喜向扇頭書為耽禪悅久皈依飯貯山瓢施鳥飢總是道人機事息近前飲啄不驚飛林深無數鳥爭啼獨立花間自品題畢竟流鶯聲第一畫樓東畔柳陰西雲邉松影挂斜陽上下禽聲到竹牀半醉半醒開斗帳微風吹送玉蘭香閉却重門竹影疏日長間疊架頭書放生不守空王戒故蹴方鞋殺蠧魚萬竿新竹傍簷牙八面青山一帶遮斬却當門三四箇隔雲峯影露蓮花一夜霜風葉滿庭黃花三徑盡飄零山房不放秋光去猶折殘枝插膽瓶新裁斗帳白生綃百種竒花五色描鳯蠟低懸通夜照有人雙度可憐宵金爐殘火宿沉擅萬緑陰中擁合歡啼鳥一聲秋夢覺侍兒剛進小龍團美人蕉下立紅裙磨得玄精滿硯雲按寫江南桃葉曲指尖香粉印羅紋小詞間製曼聲歌寫出春閨幽恨多懶把九宫翻别譜花間占得憶秦娥碧紗窗冷晝常關丘壑移來枕簟間几上石屏嵐翠滴分明一片點蒼山何事柴門午未開落花依舊滿蒼苔只緣欲了分題債暫禁山童報客來遊武夷發白龍江荷衣草屫竹笻輕路入丹山謁上清不是離家無别恨出門先斷世間情五雲遙望赤松家八月同乘碧漢槎自有仙童親接引不須沿路問胡麻塵世蹉跎三十春欲將雲水了間身清溪無數船來往能去尋仙有幾人參駕雲中白鹿車萬年宫裡薦乾魚江頭有客來相送不唱離歌唱步虛陳振狂擬遊武夷舟次囦溪興盡而返戲嘲自是青山欠夙因且將蹤迹寄紅塵幔亭指日重開宴遍問曽孫少一人尋仙元不屬凡身空負桃花洞裡春豈是漁郎多别恨玄都只待有緣人咫尺仙凡路遂分悲君猶自戀人羣待豫九轉丹成後未度他人首度君何事塵心未肯灰尋真中路忽辭回思君不奏賓雲曲只唱人間曲可哀過劍津神物飛騰自有靈至今風雨帶餘腥道人欲喚龍魂醒再合雌雄鑄七星村中晚步數家茅屋小溪東衰草寒煙夕照中門掩千峰山犬吠一籬秋色豆花紅青山回合抱清溪村徑陰陰鳥自啼落盡疏林秋色晚水流楓葉過橋西懷仙館九曲溪流枕上聽白雲遮斷數峰青金雞呌罷山天曉鶴在松間夢未醒懷仙館憶汝翔熙工伯孺因覔伯孺所畫煙雨圖不得此地曽聞控鶴來三人同禮七星臺一溪煙雨知何處滿壁丹青翳緑苔聽劉隱虛道人談玄指揮如意坐雲根總是清虛世外言談到繽紛花似雨曽無一語及傍門贈羽士絶壑凌空鳥道懸竹房松火亂秋煙道人不問丹梯險禁步青山二十年竹杖遊方幾化龍知君雲水本無蹤今朝長揖下山去他日相尋何處峰小桃源呈吳元瀚陳惟秦江仲魚山轉溪回一徑斜半栽桑柘半桃花何年共結茅茨隱添得人煙三兩家武夷十咏玉女峰五色苔花當繡襦朝雲暮雨鎖模糊清溪照出蛾眉影錯認湖中大小姑架壑船壑裡藏舟經幾春溪頭何用嘆迷津世人自愛風波險豈是神仙不渡人仙掌峰頂門開處即玄關白日青天去不還多少幻形俱脫化獨留仙掌在人間換骨巖可憐人世似蜉蝣誰識真還借假修不學換心求換骨青山依舊葬骷髏大王峯危峰蒼翠插雲中爐裡丹砂色尚紅此地大王曽羽化至今猶自起雄風徐仙巖碧嶂千尋骨一函當年曽此脫塵凡重來忽記前身果笑指飛升舊日巖金雞洞紅塵容易使人迷流水無情日又西大夢紛紛誰自覺空勞仙洞報金雞幔亭峰一曲賔雲酒一巵共乘鸞鶴醉歸遲至今五色霞千片猶似當年結彩時投龍洞空有輝煌玉簡書莫疑雲氣不重噓神龍本是飛騰物肯向千年洞裡居虹橋板一從仙樂散丹霄千載長虹亘未消待得丹成生羽翼手攀日月過虹橋遊仙曲萬里遙天片月明玉皇開宴會蓬瀛瓊漿飲盡歸玄府鶴背瑶笙四五聲形容如鶴蛻如蟬一夕凌虛去杳然隔斷紅塵三萬里閬風吹上大羅天蘂珠宫殿玉宸君身上霞衣五色文不用驂鸞過碧海鳯簫聲裡駕紅雲雲裡騎龍訪列仙羽衣霞佩去翩躚不知一枕邯鄲夢遊遍神州幾洞天踏碎煙霞謁帝鄉空中鸞鶴自回翔腰間帶有降魔劍一道精光燭混茫偶别玄都玉笥班却藏名姓到人間須臾跳入壺中去白日青天何處還桃花澗訪吕山人長日青山歌采芝人間甲子不曽知却嫌住近桃花澗花落花開見歲時紫陽書院水自茫茫山自青荒祠千載寄精靈道人已作黃冠客不著儒衣拜考亭玄都觀尋道士不遇洞門寂寂鎖煙霞此是玄都道士家雞犬無聲丹竈冷深溪流出碧桃花别虛道人與師分别亦關情不記形容記姓名聞説還童有真訣白頭人又是前生懷鄭君大幾人白首困塵氛垂老看山獨有君莫道年髙筋力少芒鞋曽踏一梯雲同元瀚惟秦雨宿舟中懷惟起弟細雨扁舟泊近村三人同卧亦銷魂誰憐此夜孤身客山店殘燈獨掩門西蜀竹枝詞杜鵑啼上海棠枝赤甲山前月落遲斗帳夜寒春夢醒笛聲吹過竹郎祠春暮感懷春光將老杏花殘猶自驚心帶淚看記得去年今日裡布衣羸馬出長安清明有感人間春色太無情不管音容隔死生滿地梨花墳上雨一畨零落又清明郊行日暮空林野鳥歌新墳古冢滿山阿不知白骨埋多少依舊青山四面多為屠田叔題王玉生山水册青山如黛草萋萋古寺殘鐘隔逺溪客散長亭天色晚兩行煙柳灞橋西蒼茫緑野接江天漁父中流獨扣舷何處月明堪繫纜樹陰西畔小橋邉二客來尋草閣幽况逢鄰舍酒新篘主人日暮歸來晚帶有青蚨在杖頭間來約客訪煙霞行到橋邉日已斜尚隔寺門三五里且將瓢笠宿山家山中日暮起西風隔嶺霞生石壁紅對坐共憐秋色好數株松影半林楓崚嶒孤塔影中流萬頃江天一色秋恍似金山髙處望片帆無數出瓜洲蘭槳搖搖下急灘滿天風雪正漫漫莫嫌野店村醪薄消盡深溪一夜寒千尋瀑布響空林數尺危橋出樹陰欲向溪南訪真隱飛花滿路白雲深枕上偶成山館雲寒枕簟清隔窗殘月不分明黃鶯未醒人先醒卧聽枝頭第一聲九仙觀晚步獨携雙屐訪煙霞畫閣朱闌夕照斜清磬一聲山院寂流鶯啼過木棉花夏日瀚上人過訪緑陰深處響新蟬移得蒲團柳影邉數曲碁殘天未暮更燒山茗結清緣聽錢叔達彈琴時叔達將歸吳興竹院微風動晚涼氷絃花裡按宫商憑君莫作思歸引一曲哀聲易斷腸山園雜興信步荒園日幾回秋風吹老壁間苔澆花正怪兒童懶忽見松陰片雨來雨夜讀伯孺詩草空齋寒夜雨聲聲細讀君詩欲四更十載悲歡燈影裡同遊風景最關情秋日山行行盡空山日未斜隔林煙火見人家澗邉小犢眠衰草風動滿園蕎麥花感舊秋光依舊滿房櫳鏡裡鉛華漸不同去歲今宵卿憶否錦衾香暖燭搖紅哭林逸人水明樓上看明月共對氷盤品荔枝今日譜成君不見年年腸斷荔枝時昔年遺我青精飯藥氣浮空滿筯雲風雨空山寒食節一盂何日薦孤墳記得方山昔日遊逢君瀨水苦相留從今若過方山路不忍重維瀨水舟憐君易簀垂亡日值我囊書逺别秋欲哭靈幃山水隔空將雙淚寄人流將赴京作北望幽燕欲斷魂留連未忍别家園直須三徑秋光老開盡黃花始出門題諸友送行卷後七年三上春官日各賦詩篇送我行今日蠧魚生滿紙主人依舊一儒生興田驛讀鄧汝髙題壁詩故人半載天涯隔得見題名勝夢思今日經過驛亭裡再三吟咏壁間詩路經武夷以公車期逼不得重遊溪口别壽卿和叔二道友當日仙槎九曲乘竒峰五百恣攀登此行苦為虛名纍一宿煙霞也不能何事人間最可哀朔風零雨向燕臺白雲隔斷清溪口不許紅塵客再來張去華席上聽妓燕姬二八欲傾城學得江南子夜聲莫遣歌喉頻宛轉留將今夕喚卿卿落第後戲作楊柳如絲草似茵輕羅小袖白綸巾紫騮嘶向平康路妬殺春風得意人南旺湖泛月蘭舟乘月下黃河一片清光漾碧波宛似江南湖上景分明惟欠采蓮歌别梁玉何物臨岐繫所思佳人偷指緑煙絲重來試看門前樹留得青青有幾枝彭城夜泊書事十年此地幾經過數點漁燈起棹歌今夜滿天喧鼓角隔江帆影戰船多舟中望雲龍山有懷陳幼孺雲龍山下泛歸舟對景空懷昔日遊聚散無期俱是夢黃河依舊向東流逢從征歸卒逺望邊城戰氣寒王師十萬半凋殘但能留得生還骨莫問金瘡血未乾脫却從征舊戰袍夢中猶記醉蒲萄從今愁説沙場事路上逢人賣寶刀同謝于楚袁小修汪肇邵詹淑正李季宣陳從訓集謝在杭席上贈伎相逢流落總天涯暫借清尊醉狹邪坐有逐臣心正苦月中休用泣琵琶揚子橋别馬季聲秋風搖落滿征帆揚子橋邉酒半酣一棹蕪城君獨往月明今夜我江南金閶别李二天涯搖落正深秋一别親知雙淚流不但思家心獨苦斷腸今日是蘇州舟夜即事金閶亭下解蘭橈一水吳江去漸遙秋夢纒綿渾不醒月明齊上度僧橋枕前雙淚落天涯半是思君半憶家起坐不知風露冷一汀斜月照蘆花弔關盼盼十年三度過彭城燕子樓空月自明欲弔香魂尋舊冢斷碑無主不知名吳門戲寄陳伯孺一望蘋花十頃秋闔閭城下久停舟除將訪道尋僧外半為真娘住虎丘無題和徐茂吳司理繡閣重重鎖翠娥春風簾幕度微波紅牙一拍芳心亂腸斷江南子夜歌年少誰家傅粉郎舞裙歌扇斷人腸當筵一道微風起吹出羅衣賈女香獨離幽閣影隨身紅拂楊家是麗人自有繞梁聲宛轉不愁羅襪步生塵劈開金鎖出重門學得文君半夜奔但愛風流人似玉不知年少是梨園含羞含態步遲遲南北峯頭月落時此處留儂儂已住從今莫唱惱儂詞金縷歌成恨幾重看君樂府演臨卭場中多少憐香意今夜歡娛盡屬儂響遏行雲是此聲况看人似玉壺清蛾眉不惜從君死只為當時一笑情生前憔悴死含寃半臂猶看帶血痕我亦多情病司馬不知何處弔香魂葛陽道中插棘編籬小徑斜數聲雞犬出山家褰帷最愛秋光好一路墻陰木槿花青樓曲沉香亭畔敞雲屏一樹垂楊拂地青暫繫紫騮歡莫去盤中新有五侯鯖帝城三月雪全消新柳如絲學舞腰何處女郎齊度曲桃花春水赤欄橋金屋誰家罷管絃博山沉水尚留煙夜深月到流蘇帳照見鴛鴦作對眠燕子樓中午漏遲荼䕷花影上簾時含嬌自起開妝閣學取西山畫黛眉既别田叔歸過囦關公署悵然有懷關外車聲不可聞溪邉公署閉寒雲從今來往囦溪路定憶風流屠使君髙閣三層傍水開詩人多在此銜杯從今磴道空危絶若箇詩人得上來題江仲魚小像五色靈芝五粒松往來長躡白雲蹤畫師未許君丘壑不寫清溪一片峯題遇上人小影清溪流水漾松花獨倚孤松不結跏安得添余丘壑相林中同吃趙州茶題羅太學青雨軒小小軒窗匝密林山鳩啼晝亂雲深飛來雨氣青如染半帶松陰半竹陰題伯孺兄弟臨池小隱幽居疑是子雲亭水繞柴門晝不扃獨卧西堂清夢逺春風池上草青青題美人孤鳯樓上簫聲久不吹梧桐花下立多時此身豈少雙飛翼不到成雙不肯騎題美人對局緑雲妝罷下朱樓間向春風結伴遊携得楸枰連袂去花間同賭玉搔頭題宋畫宫扇樓船航海事飄零無數蛾眉恨血腥團扇獨留宫樹影六陵何處見冬青鑾輿東下指臨安北望中原路渺漫寫得殘山兼剩水只留團扇與人看團扇當年巧樣裁宣和殿上幾徘徊丹青絹素俱零落獨有蛾眉怨未灰題滕王閣圖髙閣崚嶒章水邉曽從南浦繫歸船披圖忽訝身如夢回首春風二十年題畫鴝鵒不向枝頭説是非性靈雖巧已忘機夢魂只傍垂楊宿未可輕從濟水飛題畫翡翠長喙如朱翠羽齊寒蘆聊借一枝栖越裳久已無人貢好向林中自在啼題興公扇面小景寄懷惟秦萬仞髙峰列翠屏寒雲流白樹流青恍疑九曲同遊日對坐溪邉鐵笛亭題薛素畫蘭朱鳥窗前翠黛殘間將幽恨寄齊紈薛家閨秀稱雙絶洪度花箋素素蘭空説湘江九畹春殘枝憔悴不堪紉深林豈是幽香少半採天涯寄逺人題薛姬畫芭蕉名冠青樓有幾春琉璃硯匣自隨身相思不寄崔徽筆但寫紅蕉當美人題陳伯孺墨梅庾嶺曽看雪萬枝生綃今見墨淋漓江南多少思歸客莫向天涯笛裡吹題興公晝山水古木蕭蕭蔭溪曲滿山蒼翠飛林麓扶笻行過小橋西隱隱書聲出茅屋山色蒼茫煙水深小舟撑出緑溪陰一竿獨釣中流影誰識悠悠隱者心題顧世卿畫緋梅一枝玉質襯紅妝月裡妖嬈雪裡香莫向天台山下種恐將春色誤劉郎題雪簫畫蘭齊紈開處便氤氲移得天香澧水濆自有佳人留楚珮不須重説馬湘君題劉道子畫果五指低垂綴一柯名園佳果似兜羅生來自有黃金相欲向阿難頂上摩右佛手柑嶺南荔子似閩中寫出纍纍錦一叢記得髙涼當日事兩株斜映小窗紅右荔枝題葛玄方朱竹丹鉛隨意寫生綃幻出空林絳玉簫五月十三曽一醉至今紅暈不能消題伯孺桃源圖落盡桃花閉洞門重來無處覔仙源于今又隔千餘歲知是秦人幾代孫題幼孺所藏薛濤小像濯錦江邉一麗人千秋傳得鏡中身自慚不及髙千里未識花容真未真半幅丹青異代情誰人題作校書名寫生不用桃花紙兩頰芙蓉暈自生題櫻桃黃鳥櫻桃顆顆爛如霞曽獻炎方産內家寄語金衣舊公子不須銜出上陽花題公洛所藏伯孺畫小景滿目溪山筆下成山邉山外有溪聲憑君欲領溪山趣但向緑榕橋上行題畫杏花一枝春色露名園幻出花神半醉魂猶記白門橋下路紫騮嘶過酒家村題杏花戲贈幼孺半幅胭脂濕未乾誰將春色寄毫端山窗無事間相對猶勝慈恩寺裡看題伯孺山水訪寺尋僧亦是忙賞春猶覺少壺觴總緣家近溪橋上來往不知山路長伯孺作溪樓聽雨圖見貽詩以酬之獨掩柴門客到稀臨池生紙墨花飛主人莫道無相贈風雨溪山盡帶歸題畫士女琴操二十年來舊管絃幾家車馬閙門前誰知萬劫青樓恨盡在西湖一語禪樂昌公主菱花初剖鏡分鸞十載長持半面看約得幽期正月望人間天上共團圞文君豈為新緣勝舊緣却因詞賦暗相憐世人不解心中事只説蛾眉愛七絃盼盼劍履塵埋已十春教成歌舞不隨身泉臺得早重相見深感多情白舍人秦弱蘭莫笑郵亭一夜春此身元已落風塵韓家亦有如花女枕畔衣裳著向人聶勝瓊解將紈素卸花鈿誰識新歡是舊緣從此相思千點淚不須和雨到窗前楚娘入宫元不愛蛾眉來是歡娛去是悲不有新詞消盡妬此身依舊路傍枝曹妙清比玉芳名號雪齋更無春色入幽懷橫琴獨坐香閨晚欲把新詩和鐵崖題雙文小像鸞箋半幅為傳神畫裡相逢夢裡親安得人間綵灰酒鶯鶯夜夜似真真題畫芍藥送張叔麟相送愁吟芍藥詩丹青聊贈插瓶枝披圖不盡銷魂意何必垂楊綰别離舊歲與伯孺諸子泛舟白沙分賦野航恰受兩三人之句余已賦排律一章兹伯孺復出玉生所作扇頭前景因重賦絶句題其上己亥二月三日去歲仲冬齊泛艇戲將聨句效城南眼前風景猶如昨又過春光二月三題雜畫緑樹千重水一灣白雲飛去鳥飛還莫疑此地無人住若箇山人肯住山同搖蘭槳月如霜江水江煙共渺茫滿樹松花風落盡前船香似後船香獨撫孤琴意自間滄浪一曲水雲間磯頭向晚不歸去為愛前溪雨後山羣峯雪後玉嶙峋無數梅花滿路春竹杖芒鞋過橋去山中髙卧更何人相逢同息樹邉身總是桃源洞裡人月照疏林天漸晚曽無一語到紅塵已分為漁老此身歸來月下捲絲綸此中自是堪逃世却笑嚴陵釣富春半溪流水一孤桐對坐山中俗慮空所惜知音今漸逺不堪極目送歸鴻題郭熙畫册行盡空林到水窮隔江雲樹逺溟濛柳隂坐待斜陽渡剩看殘山一抹紅題吕紀雙雞雛五德初生彩質竒花冠金距是何時他年定起劉琨舞莫謂雌雄未可知水明樓聽雨答二孺莫怪溪樓冒雨來萍蹤無定老相催縱今歲歲來相訪百歲曽無六十回五月十三日從羅山堂分得黃金間碧玉竹栽植小園戲作栽竹須乘醉日栽移將竒種出香臺貧家莫道無珍玩多少黃金碧玉來種蠟梅五出寒香淡淡黃羅浮仙子幻新妝開時記取休輕折留與蜂兒補蜜房山齋獨坐懷惟秦客粵清客相過更有誰間心惟許白雲知山房多少思君意半在焚香煮茗時香閨七弔詩余觀古今閨秀或有流落風塵匹耦非類或有委身文士終爽宿盟者每親彤管輒興哀無情之地爰賦短章招其魂氣名曰香閨七弔用附𡨕感之誼蘇小小油壁青驄久寂寥西陵松柏雨瀟瀟夢中解唱黃金縷脈脈春情總未消薛濤雲箋倣佛見羅裙縹眇歌聲去不聞千樹桃花零落盡不知何處弔孤墳霍小玉誰將薄幸負娉婷怨魄啼魂喚不醒我有多情雙眼淚一回開卷一回零崔鶯鶯淚光如瑩臂銷紅一夕幽期月影中千載重關蕭寺靜更無環珮響輕風非煙一片春情暗寄郎碧苔箋與錦香囊此身拚為情郎死不向秋風怨北邙李易安銷殘金石怨雙蛾紅粉由來薄命多一縷香魂飛不散月明時聽曼聲歌朱淑真朱粉慵調倦理妝知音難遇有情郎可憐一片西湖月只向深閨照斷腸己亥夏杪客居玉田旅次寡歡情鍾艷骨孤燈𡨕想今夕何年同病相憐惟我幼孺録而寄之庶其和余幔亭集卷十四
