body:
  text: 幔亭集目録别集類五明巻一古樂府巻二五言古詩巻三七言古詩巻四五言聲詩巻五五言律詩巻六五言律詩巻七七言律詩巻八七言律詩巻九七言律詩巻十五言排律巻十一五言絶句迴環讀四十首巻十二六言絶句巻十三七言絶句巻十四七言絶句巻十五詩餘臣等謹案幔亭詩集十五巻明徐熥撰熥字惟和閩縣人萬厯戊子舉人熥負才淹蹇肆力詩章圭臬唐人而不為決裂餖飣之習巻首有張獻翼序稱其調匪偏長體必兼擅力返古則盡滌時趨所以推許者甚至又謝肇淛謂其才情聲調足以伯仲髙季迪微憾古體不及朱彛尊靜志居詩話亦謂其七言絶原本王江寧多情至語詳閲是集固非盡出標榜當明季詩道冗雜之時亦可謂蟬蜕穢濁者矣閩中詩人自林鴻王䝉諸人以後即推鄭繼之為冠熥生平喜稱繼之而卒年僅三十九與繼之正同亦一異也集為其弟􅎾所鐫􅎾字興公亦以淹貫見稱所撰有筆精榕隂新檢諸書俱别著録云乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀幔亭集原序詩豈易言哉求其成一家言良不易易況備諸體稱大家乎盖工近體者或弱扵古風長七言者或短扵五字即王孟二氏盛唐名家一以清婉稱近體一以風骨雄古風且各擅所長況其他乎予友徐惟和氏永寧令名父之子也授𤣥肖諸童烏属草方之文考少即抵掌而談秦漢奮力以挽風騷非晉魏之音絶口不談非六籍之書屏目不視盖病乎世之決裂以為體餖飣以為詞故音非朱絃詞非黄絹寧棄去不屑就也弱冠嘗循例計偕登臺展驥都人欽遲朝列虛左詩歌本之古選興寄備乎開元彬彬然名家矣每停橈見過輙下榻信宿凢三眎予詩初見之已無杜徳機矣再見之其善者機耶别去三易寒暑乃出㡢亭集二帙予執簡嘆曰其衡氣機矣夫當其興寄扵山川發憤於嵗月周爰扵驅馳宣情於羇旅由樂府而逮五七言古由近體而至五七言絶調匪偏長體必兼善力追古則盡滌時趨可謂頭頭是道重重發光矣又一字之工聞竒而傾耳片言之巧覩縟而躍心紙價騰湧扵都門簫譜浸淫扵禁掖雕章綺合藻思羅開行且上書鳯鳴解褐鴻漸探其襟抱將扶摇宇内豈區區搶榆所可控而笑哉閩中一時諸子昆弟咸追述大雅取裁風人作者響臻同好景附真足馳騁海内而惟和則獨步當時矣予嵗方遲暮筆硯都燒徒有輟翰毁草烏能述匠心之源究作者之概乎因不愛其敝帚而答其請之意長洲張獻翼序
