body:
  text: 幔亭集卷十二明徐熥撰六言絶句舟中雜言白雲一片兩片翠微千重萬重孤客尚餘短劍青山何處疎鐘處處桃花欲笑枝枝柳葉含顰白璧卞和泣楚黑貂季子歸秦雲外疎星㸃㸃沙邉小艇雙雙一曲孤琴有譜數聲長笛無腔雲際鷓鴣格磔花前蝴蝶蹁躚隔岸野橋跨水空山古墓犁田題伯孺畫小景天際孤舟帶雨沙邉竹杖穿雲村落半藏宿莽危亭獨瞰江濆戊子除夕飲顧道行先生諧賞園游子驚聞爆竹髙堂誰薦椒花諧賞園中地主姑蘇城外天涯白鴈久無家信青袍虚度年光自覺夢中是客何言醉處為鄉題畫寄閔壽卿溪路一曲二曲人烟三家兩家野飯唯供澗藻山衣自緝園麻草閣雲生雲滅柴門風閉風開峰影溪中流去瀑聲天外飛來山居四時詞樓外桃飄紅雨階前苔繡青氊燕影差池似剪鶯聲睍睆如絃亂蟬爭噪髙柳倦鳥獨棲古篁新茗半甌睡起枯碁一局斜陽天末金風薦爽夜深玉露生寒黄菊含苞欲吐芙蓉褪粉將殘墻北梅枝破玉地中葭管飛灰爐燼呼童續火雪深邀客銜杯漁江北清波細浪溪南暮雨西風短笛黄蘆花外扁舟紅蓼叢中樵歴盡白雲千嶂挑歸黄葉一肩但願瓶中有粟不愁厨下無烟耕暮雲芳壠十畝春雨寒郊一犂水上挿秧穉子田頭持饁山妻牧處處平原緑草村村荒坂斜陽自信坐牛背穏誰知騎馬蹄忙幔亭集卷十二
