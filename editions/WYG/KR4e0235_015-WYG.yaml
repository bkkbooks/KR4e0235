body:
  text: 幔亭集卷十五明徐熥撰詩餘閨情賣花聲逺信阻青禽幽怨難禁寒更孤枕半邉衾鐵馬聲殘金鴨冷月在花隂雙靨淚痕深濕透羅襟當初誰信有于今衣帯漸寛腰漸減空結同心秋思南柯子柳葉含愁黛菱花照淚妝些兒閒事惱人腸不忍燈前重憶解羅襠鐵馬嘶風𦂳銅龍咽漏長夢魂隨月到伊傍無奈醒來依舊惡思量春思㸃絳唇金谷香飄綠楊枝囀鶯聲巧殘紅輕掃滿徑胭脂遶蜂蝶無情苦被東風惱春歸早佳期漸杳鏡裡鉛華老感舊傳言玉女淚眼朦朧滴損桃花雙頰起傍朱闌聽東風啼鴂舊歡如夢隔斷雲山干叠恨柳嗔花怨蜂愁蝶沉水香酣倚薫籠腸萬結綠波春草記去年離别那忍春歸又見梨梢飛雪褪盡鉛華鏡中妝靨春怨賣花聲春雨夜瀟瀟目斷藍橋夢中猶憶翠雲翹覺後淚痕空自濕無限魂銷瘦損沈郎腰虚度良宵何時金屋貯妖嬈燈下凝眸羞不語同解羅綃春情蘇幙遮篆烟微燈燄小羅帳香酣一夜春多少鐘漏沉沉人悄悄含醉含醒夢只巫山繞枕雲濃梁月皎笑語叮嚀此意休忘了無那隣雞聲太早顧影倉皇莫待紗窻曉别意柳梢青鶯語聲吞蛾眉黛蹙總是銷魂銀燭光沉蘭閨夜永月滿離尊羅衣空濕啼痕腸斷處秋風暮猿潞水寒氷燕山殘雪誰與温存旅况卜筭子深閨白露寒古驛丹楓暮鴈呌蘆花四五聲衰草天涯路不見相思人空見相思樹剩水殘山無限程立馬斜陽渡閨情阮郎歸愁雲殘雪滿燕關深閨頻倚欄鏡中誰與畫春山啼痕損玉顔憎畫舸怨雕鞍郎行何日還湘江千古淚潺潺誰留竹上斑閨怨阮郎歸琴調别鶴鏡分鸞孤燈清夜闌龍鍾雙袖不曽乾無人空暗彈紅袖褪翠眉殘肌消玉釧寛燕山莫道客衣單閨中寒更寒春怨如夢令一夜風狂雨妬孤枕寒燈難度杜宇太無情苦喚東君歸去春暮春暮飛絮落花無數閨思憶秦娥遊人别幾囘夢斷花間月花間月關山兩地一般圓缺青樓鴈盡音書絶可憐空帯同心結同心結燈前偷看寸心都折青樓曲少年遊綠雲梳罷碧紗窻裡方自按箜篌青衣報道才郎到也忙歩上妝樓酒沽􅌬醁杯傳鸚鵡花下逓相酬檀板輕敲清歌未闋月上簾鈎寄逺訴衷情近孤燈細雨枕畔淚痕無數幽期難託琴心愁緒怕傳尺素暗想香肌艷質放誕風流腸斷朱絃暮天台路遥在桃花深處芳閨冷落只恐青春誤憑誰訴而今佳會蹉跎後日相逢無據早遂藍橋遇荔枝浪淘沙夏日山居荔枝正熟偶憶歐陽永叔浪淘沙詞風韻佳絶遂按調效顰歌以佐酒本欲為十八娘傳神反不堪六一公作僕矣髙樹錦蒸霞朱實清華一丸寒玉裹紅紗萬顆纍纍閩海上不數三巴西域枉乗槎馬乳休誇剖開瓊液碎丹砂異品即今誰第一猶説江家丹實滿林馣耀日紅酣由來佳品壓江南漢苑楊梅應避色盧橘香慙沁齒有餘甘玉液中涵釵頭一朶美人簪記得樂天曽有句映我緋衫樹樹火連空綠葉芃芃朱顔妖麗玉肌豐傳説琅邪王少女十八娘紅分摘滿筠籠錦繡成叢半林香氣度微風却笑杜陵詩句好只憶瀘戎驛騎走紅塵一笑華清炎方何用獻朱櫻天寳梨園新度曲小部音聲鼙鼓動西京妃子心驚梨花魂斷不勝情翠袖紅繒俱是夢水綠山青十里錦雲鄉傅粉凝妝紅裙爭看綠衣郎黑闕稍頭朱柿小玳瑁丁香延壽品非常尤勝陳江繡鞋一種記閩娘風送瑞堂香百歩結綠硫黄一品狀元紅金線金鍾麝囊吹散桂林風黄玉紫瓊真勝畫江綠叢叢雙髻翠雲鬆蘭壽香濃綠珠魂在玉堂東五嶺三巴無此種獨擅閩中白玉瑩肌膚輕襯羅襦鳯凰岡上錦千株任是崇龜工墨妙香味難圖百果更誰如羞殺楊盧品題猶説蔡君謨蠲渴延年還補髓一罐醍醐庭靜午風凉荔子盈筐小姬纎手解羅囊玉腕氷肌相掩映百歩聞香含笑問檀郎何似儂妝紅顔薄命總堪傷因憶驪山當日事閒説明皇幔亭集卷十五
