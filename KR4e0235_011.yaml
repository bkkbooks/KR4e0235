body:
  text: 幔亭集卷十一明徐熥撰五言絶句子夜歌牽絲嫌幹斷求藕恨泥深風吹菡萏折那得見蓮心籬外種都梁籬內種黃蘗雖是愛他香籬心苦難說芙蓉面可憐卷施心不死紅豆落深坑到底相思子錦帳覆雕牀銀鈎宛相向何時得見郎鈎起合歡帳亂却曲中心只為音徽誤郎來續舊絃知移何鴈柱採桑飼春繭葉稀蠶不飽一繭著歡衣與歡綿太少春歌羅衾與角枕展轉有誰憐妾身不如柳一日尚三眠夏歌朱夏日何長采蓮向南浦妾心未剝蓮只在房中苦秋歌秋風吹江湄采芳寄相憶妾貌如芙蓉朝昏幾變色冬歌寒威動房帷悲風起羅薦妾恨井中氷結時君不見少年行駿馬千金買銀鞍錦障泥未諳邊塞苦日日玉樓嘶秋怨何處飛紅葉深宫不見秋可憐雙眼淚空對御溝流怨詞一從閉深宫不復徴歌舞房中今夜聲是妾當年譜魏宫怨掩袂髙臺上春風散綺羅西陵望不見明月照漳河昭君怨掩淚拋長袖從今歌舞稀肯將邊地月來照漢宫衣玉階怨殘露侵羅袂深宫漏正長螢光隨月影㸃㸃過昭陽别離曲牽衣贈一言君還能聽否但看上林花莫折章臺柳洞房曲檀郎意憨癡留燈照綽約郎嫌羅帳深儂嫌羅帳薄新嫁娘薄帷鑒明月宛轉憐嬌態郎來解羅襠含羞掩裙帶古意低聲猶掩袖未許小鬟知料應無别語只是說相思海燕故雙栖池花自連理解却紅羅襦知君憐下體巫陽生繡户春色滿雕牀揉將花瓣碎分得口脂香懷髙凉李大别夢縈千里愁心隔五湖亂山風雨裡相憶一燈孤寄劉季德落日催歸馬離心寄酒尊一從分手後風雨閉柴門聞鴈忽起蘆花渚哀聲入亂雲空閨多戍婦莫遣夜深聞自遣遁跡在空山生涯寄場圃柴門到者稀滿地梨花雨送張叔韜關門風雨多相送日云暮今宵山館中夢繞秦川路逢雪宿華嚴閣佛火懸青嶂鐘聲下翠微蕭蕭風雪夜猶有一僧歸山館地僻稀來往空山日正長晚凉新睡覺古木自斜陽哭曽大知音成死别痛絶壁間琴不盡西州感衡門芳草深山中散步入空林斜陽滿山麓四顧寂無人蟬聲出修竹薄暮匹馬黃沙路蕭蕭欲斷魂天涯多少恨况乃近黃昏馬上去國八千里堪嗟行路難馬頭天欲盡猶不見長安警急聞說臨洮府今年沒敵塵願圗恢復䇿不必議和親逢俠者了不知名姓偶遇長安市片語忽相投歡然結生死江行雜咏小徑隱叢薄危橋跨斷雲前林多少樹霜葉落紛紛江濶帆影遲夜久砧聲歇深嶂歸暮雲寒波漾明月暝色沉孤嶼殘雲冷釣艭一聲長笛響秋意滿空江返照有餘景西風無限情暮蟬與孤鴈處處送秋聲對雨寒窗一夜雨山色幾重青㑹得靜中意焚香看道經客中除夕聞鐘客路當除夕凄凉倍憶家鐘聲何太急斷送舊年華為客他鄉暮鐘聲出曉雲可憐今歲裡只此一回聞送王玉生作客生涯薄依人去住難春光無限好空向異鄉看江上再送汝髙相送江樓暮風烟黯自愁君行是得意不敢淚雙流客中寒食去歲燕山道今朝劍水濵如何兩寒食俱作異鄉人除夜芝山寺訪瀚公故院知何處他山度歲華空門無去住有佛即為家寄王震甫三年巴蜀客萬里故人心若比瞿塘水思君應更深懷鄭性之别去無消息相思空斷魂中原多俠客誰是孟嘗門錦溪八景為林熙吉題團青島春風吹錦溪秀色盤孤島花落滿蒼苔莫遣家童掃積翠臺振衣陟髙臺嵐光翠欲滴半夜春雨來飛泉瀉石壁五雲岡髙岡有五石石石皆生雲晏坐松根下前林正夕曛七星塢怪石眠芳蘚危橋傍草亭寥寥人境外花塢帶春星遷鶯林曉步遷鶯林鶯聲何睍睆把酒坐垂楊不覺歸來晚宿猿洞峴山竒境饒古洞藏幽谷雲深不可尋但借𤣥猿宿蘿徑門山中石作門迫窄不可步回首望藤蘿迷却來時路松風壑風生松壑中濤聲聒人耳中有緑髮翁長伴赤松子過能仁寺東郭西天近禪宫古廟鄰從今朝暮裡鐘鼓一何頻題畫日落溪水寒林疏秋色老柴門閉白雲滿樹丹楓老森森灌木隂渺渺澄江靜一棹獨垂綸中流釣山影振衣危峰巔扶桑日初起柳色破青烟桃花帶流水江上漫成遊人戀故鄉每恨離家逺如何石尤風又嘆舟行晚西寺尋公朗上人因同宿小舟尋僧入招提斜陽下疏木只恐隔關門同到舟中宿記夢夢與雙親别牽衣兩淚垂不知成永隔猶道暫相離送吳翁晉還吳興如何布衣至依舊布衣歸且向苕溪曲三年守釣磯失劍恩讐俱未報失去競何心難將延陵劍不及少原簪得劍神物合雄雌歸來事太竒精光猶未滅㑹有報恩時漂母祠落落千金報悠悠國士心從今慚漂母不敢過淮隂歸渡揚子江歸來風波平去日風波作世路非風波來往風波惡吳門逢鄭四幾載天涯别逢君空自悲知無桑梓念不敢問歸期將至武夷莫謂仙源近舟回路幾重他山苦相蔽不見大王峰咏殘燈空房心膽怯燈影半將殘攬衣頻起剔揚彩伴更闌山行口占題建溪驛壁客路當殘歲凄然正憶家山童不解事停馬折梅花題塢子逺扇面山水長松䕃逺山虛亭倚危石何來客杖藜曳破秋雲碧題梅花畫扇春信江南早凄然念故鄉忽看紈扇影轉憶壽陽妝吕梁洪吕梁洪下水已變作安流安流雖自好只是滯歸舟題沈從先扇面畫蘭國香零落久幽谷忽成叢移向齊紈上期君臭味同題公朗扇上畫梅紈扇寫寒梅懷袖微香發山僧骨相清對之雙幽絶回文詩回環讀四十首緑波回斷港青嶂蔭孤村谷蘿開亂莽汀浪浸疏園芋江驛樓口占送王元直重游金陵掩淚懷前事送君無限悲經過多舊處何處更相思夜月烏衣巷秋風燕子磯山川仍似昔只是舊人非幔亭集卷十一
