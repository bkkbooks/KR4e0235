body:
  text: 幔亭集巻三明徐熥撰七言古詩帝京篇文皇定鼎都燕薊三輔黃圖誇壯麗九重宫闕何嵯峨百二山河咸拱衛五鳳髙樓逼太清六龍御宇泰階平曈曨曉日升金闕縹緲紅雲擁玉京玉京金闕倚天開隱隱鑾輿複道來雲迷翠幰依龍衮露滴金莖泛羽杯平明長樂鐘聲響九天日月開僊仗豸史臺中曉聽烏虎賁階下朝鞭象月照彤墀環珮齊風生青瑣旌旗颺髙臺突兀比章華上苑紆廻同博望我家京洛何煌煌山河錦繡軼隋唐斷髪文身俱稽顙雕題黒齒盡梯航三載公車計偕吏嚴樂鄒枚乘傳至黃紙承恩金馬門緑衣錫宴慈恩寺勅賜當街上五花金鞭絡繹更堪誇市中春色濃如錦身上宫袍爛似霞粧臺舞榭層雲裏粉白蛾黃兼皓齒怙寵翻令女伴憎承歡却得天顔喜更有中涓美少年朱顔白晳珥貂蟬當筵解唱霓裳曲出直常揮碧玉鞭一代豪華稱戚里回天轉日誰能比薄暮酣歌閶闔門平明取醉新豐市繁華三五上元燈蜀錦吳綾結作棚任從玉漏催銀燭不顧銀河轉玉繩馬上佳人金絡索筵前公子玉壺氷懸得華燈燈七寳搆成綺閣閣千層中宵露冷羅衣濕姣童兩兩當筵立夜永寜愁鳳腦殘寵移豈顧龍陽泣侯家繡柱玉盤龍朝朝鼎食奏歌鐘翠翹金鳳三千隊畫閣雕闌十二重繡枕春宵開菡萏羅幃夜月絢芙蓉五侯七貴豪華客油壁香車過栁陌花前調笑片時春百萬黃金輕一擲春風日日恣遨逰北里南隣樂未休玉顔到處堪廻轍珠箔誰家不上鈎青錢多買醉紅袖暗藏􅍐投來青玉案費盡錦纒頭蹁躚紅袖人如玉豔舞嬌歌歡不足琥珀深杯醉玉樓珊瑚寶樹羅金谷灼灼桃花兩頰紅娟娟栁葉雙眉緑愁縈弱水逺重重夢繞巫山髙六六王孫公子好逰閒往來射獵向西山驅將鷹犬垂鞭去射得狌狸帶箭還九衢三市相迤邐車塵白日連天起六郡良家盡錦衣四方賈客多紈綺錦衣紈綺競豪奢結俠追歡意氣賖論交半是蕭朱輩托命多於趙李家華堂宴會春風繞一𣲖弦歌聲嫋嫋香氣頻聞寶鴨薰漏聲忘却銅龍曉春來春去自年年聽盡笙歌與管絃但知芳草春風滿誰識鶯花歳序遷自古奢華豈能久轉眼紅顔成白首往日堂前羅異花于今門外生衰栁世事悠悠未可知桑田滄海須臾期金張許史今何處冨貴驕奢空爾為聽鶯曲條風淡蕩春將半倚欄忽聽鶯聲亂隔竹綿蠻别様啼遶林睍睆相呼喚相喚相呼不住聲聲聲偏動冶逰情王孫載酒青樓醉美女尋芳紫陌行青樓紫陌春風徧一種嬌聲千萬變彷彿秦筝出谷聞依稀羌笛隨風囀秦筝羌笛韻悠揚幾處歡娛幾斷腸閨中少婦悲征戍路上行人憶故鄉故鄉𣺌何許鶯聲何太苦征戍隔遼陽聞鶯空自傷鶯來鶯去自年年聽此啼聲倍可憐百年愁鬢聲中改九十春光舌上遷莫嘆韶華如轉轂愛鶯且賦聽鶯曲但得長聞栁外聲何辭頻進杯中醁送逺曲津亭下葉紛如雨客子逺㳺何處所悠悠一别無還期相對悲啼不能語此去山中經幾萬勸君惟有加餐飯須臾分手各東西猶聽前林征馬嘶别離曲絲韁白馬黃金勒僕御門前苦促逼叮嚀握手蹔躊蹰欲住須臾竟不得心知此别無還期猶問君歸是幾時心知此别書難寄猶問征鴻何日至為君整轡君上鞍頻頻勒馬回頭看無情馬足如飛電路轉橋回君不見歸來妝閣雙淚垂此身誤嫁逰俠兒寄衣曲流黃機上鴛鴦錦明滅疎燈照孤枕空閨冷月自娟娟絶塞金風何凜凜起視明河漏已殘沙塲遥望路漫漫羅幃錦帳人何在毳幙氊裘地更寒手剔殘燈取刀尺製得征衣寄征客去年寄去無回音此日無由識寛窄寛窄如今未可知幾回欲剪又遲疑金刀未下腸先斷弱線初縫淚自垂淚垂㸃㸃俱成血汚在征衣不能滅殷勤為拭衣上痕恐令孤客添愁絶掩淚裁衣逺寄将妾身不及此衣裳衣裳猶得親君體賤妾空居天一方汲井曲銀床斜壓梧桐井牽動殘絲五色綆臂捲羅綃寶釧髙波凝玉乳金瓶冷沈沈鴨緑浸鴉黃轆轤一聲愁斷腸碎光揺動闌干濕草根滴露隂蛩泣秋夜曲畫幕含春度清吹髙燒絳蠟金盤膩銅龍滴露夜聲沈老兎崩雲秋影墜銀筝斷續檀槽語紫霧迷濛罩金縷蟬衫麟帶委羅屏枕花濕透巫峰雨牽絲曉井啼烏急寒螿弔月香蘭泣紅光漸射菱花臺又拂嬌蛾寫春碧老將行老夫元是良家子少年流落戎行裏能將一劍淨烟塵幾入重圍身不死纍纍金印肘間懸塞上馳驅五十年已羨功勲載盟府久看姓字書燕然一朝謝病歸巖壑門外蕭條可羅雀身經百戰未龍鍾猶向人前誇矍鑠寳劍年多鋒鍔銷櫪中老驥鳴蕭蕭戎衣掛壁成塵土舊日紅旗顔色凋一自投閒經幾載請纓壯志還應在遥望沙場願裹屍猶思銅柱標炎海鋒鏑今年去備邊連營烽火通甘泉多少材官俱束手無人賈勇能登先將軍聞此氣勃勃目眥裂盡冠衝髪便往投書獻至尊雄心誓欲探虎窟據鞍顧盼出轅門埀老還堪報主恩但令此去清沙漠不管金鎗臂上痕北邙行洛陽城外邙山麓舊鬼哀呼新鬼哭黃昏髑髏作人語白晝烏鳶攫人肉新墳古塜爭嵯峨世間人少北邙多北邙山中松柏樹聽盡車前薤露歌人生處世多辛苦賢愚貴賤同抔土不如歸去學還丹丹成白日生羽翰結交行酌君金兕觥聽我結交行今人結交只結面三杯濁酒傾生平酒酣拔劍多意氣死生患難毋相棄出門酒醒各東西此情便已生同異結交難重可悲人情反覆誰能知笑談各已藏矛㦸對面眞如隔九疑君不見陳餘與張耳當年刎頸徒爲爾又不見鮑叔與夷吾千載相知能有幾仇隙多生謔浪間睚眦起在刀錐裏翟公賓客竟如何一旦門前張雀羅田文座上客常滿一朝失勢皆分散結交行難重陳世途處處皆荆榛今朝相對且飲酒明日悠悠行路人猛虎行樵採當荒郊林臯猛虎聲咆哮欲往避之日在崦嵫曠野啼䲭鴞四顧徬徨而股栗猛虎張頤展爪撲人食余告虎吁嗟麟兮不食生物踐生草爾虎白額斑貍而黒文貌豈不如麟胡為不仁而撲我猛虎前致詞我虎居深村飢來啗牛羊牛羊啗不足方思啗人肉人居城市與人伍撲食同類何可數誰言虎猛能咥人世人之猛過於虎俠客行兩人市中相耳語欲報深讐誰敢去壯士聞之氣鬱陶平生俠烈同荆髙髪上指冠淚如雨借問君讐在何許一劍朝辭都市傍素車直指邯鄲路刺殺讐人函首歸争看頸血猶沾衣主人欲奉千金報問以姓名終不告辭君躍馬出都門君但報讐毋報恩去婦詞紅妝洗盡顔憔悴一片愁心幾行淚良人重色輕别離舊日恩情頓相棄含悲含怨出深閨宛轉躊躇更慘悽枝頭菡萏分連理枕上鴛鴦散並棲鴛鴦菡萏歸何處十載綢繆今别去往事翻同墜井瓶餘生却類飄風絮憶昔當年初嫁君明璫翠袖紅羅裙帳開綺閣連宵月夢遶巫山一段雲荏苒光隂如轉轂人情日久多飜覆薄命從來怨玉顔嬌姿一旦辭金屋萬轉千廻不下堂悲啼那忍别姑嫜君恩似水終難返妾意如膠詎敢忘心知别去難重見手把君衣苦留戀此生無計入君家芳魂願化孤飛燕築城詞丁夫抱杵城頭築朱顔少婦城邊哭哭聲未絶城已崩無數丁夫遭殺戮殺戮丁夫就此埋半為黃土半人骸長城未畢山東亂四海紛紛歸楚漢吁嗟吕政胡為乎亡秦乃在廢扶蘇古戰塲漢家將軍猛如虎手執長殳腰大斧白首從征恨數竒可憐性命輕如羽鼔聲死兮弓絶弦狼奔䑕竄無行伍良家百萬試鋒鋩枯骨如山委黃土燐火星星㸃白楊黃雲漠漠依邊樹千載猶聞戰血腥夜深不禁啼猿苦魑魅山魈當路號哀聲長亂黃昏雨逰魂難返玉門闗怨魄年年成杜宇古别離君身如車輪去去無廻轍妾淚如井泉涓涓滴不竭歡愛能幾時傷哉此離别蕭蕭征馬向人嘶欲别未别心慘悽深閨不識天涯路但向門前看馬蹄送君試折長隄栁立馬躊蹰豈能久明年栁發今年枝還記今年送别時征婦怨今年賊陷臨洮府殺死官軍何可數征夫塞外骨成山少婦閨中淚如雨死生消息總難知欲往招魂又自疑機中幾度聞嘶馬又恐夫歸投杼下廢居歌東隣敗屋西隣鎖殘栁蕭蕭燃鬼火昔日繁華今日衰空堂白晝居狐狸子孫流落不知處歳久荒凉誰敢住井涸池枯竈絶烟寒螿四壁啼秋雨當時宅中歌舞人于今已化北邙塵古怨當時初嫁君貌比楊花好今日與君離貌比楊花老楊衰能再榮妾貌終枯槁君如記妾舊容華但看明年楊白花緑珠詩盤龍洞口雙蛾翠玉唾流香脂粉膩三斛明珠艷質歸千重錦障秋波媚玉笛聲寒響斷雲凰釵蛟佩舞明君光生鳳蠟春厨煖香屑龍鑪夜閣熏曲曲鶯喉歌懊惱紅顔不向青銅老寳砌苔痕蝕百花名園梓澤生秋草一死難酬衛尉恩鬢雲斜墜玉鈎翻碧莎黃土碎香骨朱樓白日啼妖魂澗中金水流嗚咽半寸珊瑚千㸃血麝氣春凝栁絮風珮聲夜泣梨花月代閨人答輕薄少年妾本燕趙姿委身事君子憶昔深閨私語時指天誓日同生死一朝執㦸赴長安彼此恩情隔萬山經年去住無消息何處留連不肯還聞君日日耽㳺冶蹴踘鬬雞兼走馬醉裏常抛金彈丸狂來碎却珊瑚把自矜豪俊又繁華百萬黃金散狹邪昨宵趙女顔如玉今日燕姬色似花如花似玉争歌舞歡娛豈識淒涼苦樓上朝朝望白雲枕邊夜夜啼紅雨流年青鬢嘆蹉跎冷落深閨可奈何捲簾忽聽鶯聲老又是春光一度過王震甫以王叔明山水見貽答謝王生嗜古元成癖古今圖畫如山積壁上時時烟霧飛案頭隱隱生泉石吾聞勝國有王蒙丹青綽有巨然風幽溪細路已盤曲烟嵐樹木何菁葱此圖珍秘幾年所廉者不求貪不與知余夙有卧逰情一旦披圖便相許奚奴捧送神飛翻山齋賞鑒忘朝餐焚香再拜謝君賜照乘明珠未是恩題賓月樓空江秋笛二巻後余偶得前輩陳伯煒鄭孟宣家藏二巻皆洪永中海内名公之筆剥落者過半矣然殘金斷璧自足為寶乃合裝一巻而作此歌㸑下有焦桐柯亭有枯竹何期得遇蔡中郎一取為琴一為笛中郎已死知音稀每有竒物誰能知汨沒泥沙棄水火令人往往心傷悲國初至今二百載其人與骨今安在二圖淪落在人間墨跡依稀猶未改吾鄉陳伯煒鄭浮丘兩人前輩稱風流坐賔樓上三更月吹笛空江萬籟秋名公詩句題應徧畫圖瀟洒尤堪羨恍若笛聲江上聞尚疑月色樓頭見當年棄置廢簏中蠧魚蝕盡塵埃蒙余偶得之發大呌心顔怡悦開雙瞳吁嗟乎竒物顯晦自有數豈但柯亭之竹嶧山桐贈歌者習家池上春晝長主人愛客飛羽觴梨園子弟紛成行少年白晳稱陳郎何晏之粉荀令香技掩秦青音遶梁翩翩廣袖能廻翔脩眉髙髻内家粧月中一曲舞霓裳輕敲檀板按宫商頓令四座生輝光蘇州刺史空斷腸奈何與子非一鄉安得相從樂未央人生及時須徜徉莫令兩鬢生秋霜題王崑仲畫障寒流瀰瀰㵼石壁嚴霜剥樹枯榦瘠鬼斧劚石江滸蹲怒蛟吹水奔濤逆鼪鼯狐魅晝攫人叢林灌木無行跡我覽生綃毛骨寒披索枯腸動吟魄采真篇送林叔度逰鴈宕壺山烟客持𤣥籙凌辰御氣僊山麓星冠七葉芙蓉顔螭衣霞佩仙家服辭家將作采真逰鴈宕山中訪靈族踏斷遙空一線虹歴徧洞天三十六雲為御兮風為車駕青虬兮叅白鹿蓬瀛弱水豈㣲茫圓嶠方壺堪借宿祇從縣圃饌瑶芝不向人間希辟榖知君名姓注仙班聊贈雲璈歌一曲送柯秀才還莆逢君何太遲别君何太早朝發越王城暮指壺公道壺公山色凌青天雲霧蒼茫暗玉鞭匣裏祇存馮子鋏杖頭猶挂阮生錢餘錢歸去堪沽酒醉後新詩三百首賦才元不讓三都何恤紛紛譏覆瓿人生知己古稱稀此去何人薦陸機秋風已就圖南翮看汝扶揺天際飛述逰篇去年仲冬束行李掩淚辭親赴燕市今年五月將中旬方能税駕歸田里中間辛苦難具陳萬里風波愁殺人從來痛定纔思痛回看往事徒沾巾閩溪山水何太惡水似瞿塘山劍閣仙霞嶺上氣不平黯淡灘頭膽將落浙中水淺易膠舟蒼頭牽纜如傴僂一日才行十數里舲前兀坐空百憂歳除才到雲陽下縣官正閉奔牛壩停舟三日不得行關吏相逢便相咤揚子長江天際流江豚吹浪神鼉浮長年捩舵神色喪可憐身世同輕漚黃河之水名九曲由來舟檝愁傾覆石尤風急水奔騰隔江少婦將兒哭北方景物更荒涼滿目黃沙古戰塲瘦馬驅馳髀肉損酸風射眸肢體僵馳馬衝寒過涿鹿四郊倐忽飛滕六千山萬徑少人行暮抵良鄉無處宿長安上策不見収百金用盡存貂裘難從北闕操齊瑟猶戴南冠學楚囚男兒致身苦不早驅車復出長安道風景蕭條倍去時塵土侵人顔易老三吳兩浙競繁華此際令人轉憶家歸家幼子牽衣泣鬢衰面黒咸咨嗟奔走天涯過半載嵗月無情不相待人生得志在丘園何必飄零寄湖海行路難空悲酸世情反覆同波瀾有璞莫向王庭獻有鋏莫向侯門彈笑殺劉蕡空不第且將髙臥學袁安石溪歌贈林隱君南劍有溪名君竹脩竹蒼蒼溪水緑中有幽人號石溪誅茅壘石溪之曲溪流日夜聲潺湲幽人嘯傲石溪間石可枕兮溪可潄富貴浮雲眞等閒幽人今年八十幾足跡何嘗到城市白岩嘯月遇崆峒青嶂眠雲夢黃綺憐余本是武陵人欲向溪頭一問津桃花好逐溪流出世上如今不是秦瞻鳯歌為張叔弢賦叔弢父號鳳山鳳山者長溪之山也嘗繪圖以當臥逰及父卒而圖亦失去者二十載叔弢後復得之攜入燕吳楚越間求名公長者紀其事以致追輓之意濫及小子熥熥不敢辭也為作瞻鳳歌長溪山水竒鳳山幻靈境重岡疊嶂自廻環萬壑千巗相掩映中有畸人號鳳山時時長嘯此山間彩雲明滅元堪覩梧竹蕭森更可攀一朝跨鳳歸仙府丹崖翠壁空塵土遼鶴千年去不歸慈烏夜半啼聲苦篋裏惟存一畫圖忽然飛去胡為乎延津無處重尋劍合浦何期更得珠帝憫諸孤懷怨慕五丁曽遣相呵䕶神物由來不久湮珠還劍合仍相遇張生得此喜還悲陟岵興歌淚滿頤幾廻欲擬招魂賦到處曽求薤露詩此物遺亡二十載迄今精爽還應在千仞猶疑覽徳輝九苞彷彿増文采諸子山中日夜號鳳山依舊倚天髙不須人世悲麟喪還羨君家有鳳毛王生行王生少負耽竒癖落魄風塵人不識祗從湖海恣遨逰羞向人前嗟厄塞胸中神識一何竒儒雅風流應在茲篆隸由來追史籀時時復作無聲詩城西一室大如斗室中竒物無不有花鳥圖書可自娛樽罍彛鼎傳來久賞鑒能同張茂先翩翩意氣更堪憐胡琴劈碎寜論價古劍酬人不計錢與余傾蓋稱莫逆問竒肯過揚雄宅竹裏酣歌任往來花間嘯傲忘朝夕朝夕相從酒一樽交情如此君毋諼但能博物復飲酒世事悠悠安足論赤巖吟為大田令謝君賦劍潭之東多石壁四面巉岏如火赤開闢至今千萬年巖前蓊鬱皆蓬藋上有嵯峨萬仞之丹梯下有潺湲千頃波流碧山魈罔兩盤其中虎豹豺狼據為宅任是樵蘇日往來豈識岩中有竒蹟岩中竒蹟人不知可憐空使山靈悲誰能鑿破混沌竅攀蘿附葛相追隨謝君本是探竒客年少鳴琴宰巖邑毎學盧敖汗漫逰登臨折盡東山屐披蓁燃炬入岩中猛獸山妖都辟易萬年靈秘一朝開懸岩絶壁何竒哉一聲長嘯翠㣲頂頓使延平潭裏白日生風雷搆將臺榭連雲起浮屠屹立層霄裏獨向岩前望九垓百二關河如黒子吾聞神州三十六洞天此赤巖兮胡為乎不傳徐生披圖學宗生案頭隱隱生雲烟願得借君一葦過劍浦題詩刻石岩之巔岩巔墨蹟永不毁鄒嶧之碑廼可擬吁嗟乎山川顯晦自有時世間何物無知已賦得易水寒送人逰燕燕山嵯峨易水流北風吹水聲颼颼荆卿驅車不顧返仗劍欲報燕丹讐可憐燕恥猶未雪壯士𠂻腸空激烈千年往事水猶寒蕭蕭壯髪能衝冠憐君故是荆卿比翩翩俠氣橫燕市擊筑還過易水濵一聲長嘯悲風起過鄧汝髙别墅一區别墅東山曲幾片青山隱茅屋門前埀栁覆清溪屋後長松亞脩竹寂寂衡門無俗喧主人留客烹雞豚衣冠朴素禮眞率依稀如入桃花源彈棋擊劍復飲酒世上浮名竟何有君今蹤跡已青雲我也棲遲甘白首與君相對歡且悲人生會合能幾時恐君作吏風塵去此地開尊更有誰寄閔夀卿山人去歳逢君浮玉山江風颯颯吹離顔今歳重過揚子渡烟波咫尺難相遇鐵甕城頭一喚君江聲洶湧那能聞寸心强對南徐月雙眼徒瞻北固雲此生應嘆交歡淺日日思君長展轉幾回飛夢到君傍江水茫茫空斷腸破鏡行為陳大賦美人有寶鏡價值千黃金曾與郎君同照影又與郎君同照心一朝分散如萍梗此心雖同不見影金刀剖處鸞鳳分十年蹤跡不相聞可憐兩人持一片此生何處重相見勸君對此休自悲神物會合終有時冬夜同汝翔振狂在杭集汝大山齋玉衡指東露華冷朔飈暗度梧桐井張檠亂謔開雙頤銅龍咽漏宵將丙僕御執炙兼進巵筋力跛倚神俱疲客眸耿耿若巖電搜腸嘔肝斷鬚髭五人同騁談天口隔墉魑魅踉蹌走揮手出門天宇昏沿衢木柵懸燈守嚴霜砭肌心惻悽轆轤聲斷金井西解衣匍匐登牀睡四隣咿喔啼天雞贈胡外史錢塘風景眞竒絶呉山蒼翠湖光白山川靈秀萃何人之子飄然自髙格生來蹤跡壓塵埃湖海狂逰亦壯哉振衣頻陟雲龍頂仗劍曾登戲馬臺燕秦楚越行皆徧又泛扁舟過海甸九鯉湖邊信短笻武夷山上開華宴逰興年來尚未央温陵劍水復清漳三秋石鼓簪黃菊五月楓亭摘荔香羨君懷抱何瀟灑知君不是悠悠者世路由來遇合難風塵莫怨知音寡伊余癖性好遨逰與子交驩幾度秋春風竹外頻來往夜月花間遞唱酬唱酬來往情偏好漫把交情同草草囊裏無錢休嘆嗟尊中有酒須傾倒胡生胡生何太竒余每談詩君解頤自堪意氣稱吾黨不但前身是畫師贈王少文王生今年纔十幾籍籍香名滿人耳已詫文章㵼大河更誇神骨澄秋水目下三行腹五車志如鴻鵠書龍蛇遨逰竟日車多果爛漫千言筆有花羨子襟懷何卓犖羨子髙談何嶽嶽五色爭看鸑鷟文片言能折充宗角日來相見即相歡同心臭味如金蘭髙才豈復論長吉年少還應陋子安莫笑相逢頻倒屣如此寜馨誰可擬堪嘆茫茫宇宙間眼中之人惟有爾九日懷惟起弟客吳去年九月客吳門憶汝淒涼欲斷魂今年汝作吳門客一望關河千里隔我家兄弟大參商歳歳年年俱異鄉夢廻閩海風塵逺目極吳門匹練長秋風颯颯秋光老登髙望逺傷懷抱天涯逰子滯還期籬下黃花為誰好蜀道難送王震甫之臨卭省刺史兄蜀道本是蠶叢域古來元不通中國秦帝金牛計太竒五丁費盡開山力鬼斧神功山為開懸崖絶壁真竒哉灧澦瞿塘水勢猛波流日夜聲喧豗中有畏途稱劍閣羊腸鳥道山形惡天梯石棧度偏難鬼見為愁蛇為却猿狖呼羣接臂行山魈野魅作人聲愁雲慘淡日無色行人此際難為情蜀道之難已如此臨卭險惡尤無比風俗由來似吐番州城半遶平羌水君家伯氏賢大夫五馬蹀躞専城居幾度經過九折阪寜為叱馭無廻車閩蜀山川何隔越尋兄萬里堪愁絶匕首長飛象耳雲馬頭幾看峨眉月于今西北正烽烟羌笛胡笳聽慘然中宵起坐腸空斷客路思家淚欲連蜀道之難應莫歎長途惟有加餐飯鶺鴒原上正相思勸君休起鄉關恨送陳明府應召之京冶城八月秋風起仙吏驅車入帝里白叟黃童擁道周攀轅臥轍情無已一官閩海幾年餘漢室循良更孰如魯恭政簡能馴雉羊續官清不愛魚聲名久已聞天子璽書召對明光裏滿縣穠桃爛似霞半肩行李清於水新秋乘傳到長安五色花驄獬豸冠㡬多狐䑕爭投竄當道豺狼膽自寒酌君酒與君别冦君難借空嗚咽至尊垂拱問蒼生但道江南民力竭江上答客傷王少文去歳江頭同送客江水茫茫江月白今歳江頭送客歸問君動定空沾衣别去光隂纔一載可憐世事須臾改當日江間折栁人于今枯骨知何在客子聞言雙淚垂君亡不待余歸時訪君不入君華屋日伴孤猿墳上哭七夕曹能始宅上觀妓涼風吹動黃姑渚正值牽牛逢帝女一年佳會阻星河數刻交歡罷機杼主人留客當今宵鳴筝少婦紅羅綃嬌聲宛轉鸞凰曲媚眼低回烏鵲橋引羽流商歌愈緩玉繩漸落明星爛履墜簪遺樂未休鐘沉漏盡愁將旦臨别殷勤贈七襄秋宵雖短此情長燭龍已駕扶桑曉天上人間兩𣺌茫建溪逢㳺宗振與君神交今十載彼此飄零隔湖海擊筑應難逢漸離鼓刀何處尋朱亥余也今年過建溪君方彈鋏居城西客裏相逢發長嘯飄飄吐氣凌虹霓憐君槖中無所有猶解餘錢去沽酒肯將蹤跡落紅塵自許交情同白首世事悠悠嘆二毛燈前相對兩綈袍須臾酒盡東西去江上潮平月正髙同㳺宗振陳伯岑集陳季廸齋中六月溪行苦煩暑日暮維舟向江渚乘興行歌訪故人科頭跣足花間語花間相對忘主賔驩呼無異平生親今朝潦倒齋頭客明日飄零江海人西甌道中寄答伯孺病中見送之作故人卧病空皮骨精氣銷忘神恍惚枕上猶於筆硯親題詩送我㳺京闕詩來字字皆悲辛半嗟疾病半嗟貧况兼離别情思惡空令逰子重傷神三疊離歌聲太苦幾度哀吟淚如雨君方貧病類相如我也飄零同主父行色匆匆一夢間無由賦别六溪灣空流萬里窮交淚未識經春衰病顔一别山川成隔越懷人長對天邊月于今枚叔更何人能向君前談七發西湖飛來峰歌我生性愛㳺名山黃冠布褐常躋攀一丘一壑稍險怪往往大嘯開心顔此峯幽邃稱竒絶何處飛來忘歳月自是神靈運化工誰將鬼斧施剞劂山形突兀又玲瓏懸厓隂洞遙相通紅泉滴瀝歸深澗碧磴岧嶤接太空森羅青壁如屏障窱䆗縈紆非一狀岩下時喧萬壑聲石間盡刻諸天像翠色遥飛九里松白雲長出兩髙峯冷泉露下澄清溜靈隱風髙送暮鐘我到山中歇還陟駭目驚心勞應接竒蹟應誇天下無仙都自與塵凡别洞門吟眺欲斜暉坐破蒼苔未忍歸幾片寒雲生杖屨半林㣲月照僧衣殷勤記取歸時路日暮雲深不知處由來造化妬神竒只恐飛來又飛去靈隱寺尋耶溪上人浮玉山中曾把臂風景依稀如隔世常歎空門無定蹤此生何處求眞諦秋風一棹過錢塘聞説吾師在上方扶杖入山急相訪靈隱寺中松隱堂方鞋破衲出相見怪我年來華髪變相逢不作世間言指㸃前山雲幾片半榻跏趺雙樹邊笑談隱隱生雲烟論交共結三生約出世同叅一指禪新詩别後多如此總是禪機非綺語勝地何須論虎溪髙風不用推支許須臾殘照下雷峰送客松關第幾重悠悠此别何時遇愁聽雲堂薄暮鐘飲黃白仲娑羅館兼柬屠緯眞使君主人避客棲空谷長日柴門稀剥啄我來欲證大因縁袖中片刺煩童僕倉皇倒屣出相迎青眼相看無世情狂來叱咤千夫廢醉後雄談四座驚吾曹本是𤣥都客當日同因酒過謫行滿何須戀世縁功成依舊歸仙籍色相由來非我身凡夫誰識有眞人片時結搆成爐鼎一粒𤣥珠守谷神仙師授我還丹秘逢人豈肯輕開示能將神氣返虚空自有靈光照天地黃白仲屠緯眞蹔時蹤跡落紅塵何時打得虚空碎同出青天駕鶴輪吳門尋沈從先不遇當年踏徧吳門路十日尋君不知處年來蹤跡雖相聞隣人又道移家去閶闔城中多路岐異鄉客子那能知東尋西訪竟不得惟有殘月相追隨幾廻欲向朱門問知君不與朱門近欲向紅塵問故人知君寄跡非紅塵行盡朱門兼白屋夜深空作窮途哭出城昏黒迷歸舟滿天風露江干宿七夕詞遙天萬里銀河碧雙星却笑孤眠客玉露金風半夜寒羅襦繡幕千山隔天上人間共此宵天孫飜近美人遥應知樓上蛾眉女妬殺空中烏鵲橋題畫馬扇面贈陳幼謙真龍産自于闐國促腕髙蹄稱汗血顧影驕嘶赤電生過都歴塊紅塵滅此物何年入漢家畨酋作貢過流沙天閑不羨乘黃選内廐寜論白鼻騧扇頭一見生驚詫貌出權竒更髙價已識雄姿勝渥洼况看妙手驚曹霸吁嗟此馬今豈無安知櫪下非神駒九方不作孫陽死世上于今只按圖孝友堂慈竹歌為張穉通賦主人家在苕溪曲不種竒花種脩竹客來看竹問何名主人竹下吞聲哭自言此竹生質竒不産終南非嶰谷物性能同慈母心龍孫愛䕶知寒燠誰移此竹種庭階老母當年手自栽已看翠色凌萱草自有清隂覆緑苔老母辭堂今幾載此竹青青猶未改黃土年來上板輿紅塵久已生萊綵可憐母逝竹空存見竹還思慈母恩主人一語一嗚咽座客聞之皆斷魂從今品竹修新譜不獨湘江有淚痕題顧長卿小影郎君年少稱髙格髪未勝冠纔覆額同誇秀骨邁凡兒已有雄文驚座客此日重披舊畫圖神情雖是容華殊揮毫寫照方童稚轉眼相逢成壯夫悠悠嵗月催人老人生顔色難長好休將青鬢度年華自致雲霄須及早分得黃金臺送屠田叔轉運使赴京燕山日落悲風起百尺髙臺留故址滿地狐蹤丘隴間千金馬骨荆榛裏至今行客説燕昭愛士髙風久寂寥侵堦碧草空留色翳土黃金已盡銷我家定鼎都燕薊正是黃金臺上地萬里星槎上漢來諸侯露冕朝天至臺前賢士集如雲拄笏彈冠謁聖君陽氣自生吹黍谷英雄豈説樂將軍屠君擁傳辭閩海自有髙才輕郭隗休歎鹽車上太行何須弔古登寒壘至尊側席正求才太室明堂日日開白璧虞卿先拜賜黃金寜用築空臺題劉松年溪閣納涼小景誰家亭館臨溪渚四面蒼崖夾平楚樹色溪聲白晝寒行天赤日無炎暑賓主相看禮數忘筆牀茗椀對罏香圖中清福難消受願借虚亭半日涼題髙漫士晚閣溪雲圖主人愛溪還愛雲去年走謁武夷君九曲溪流太清泚千峰雲氣何氤氲幔亭得預曾孫宴歸帶白雲千萬片天風倐忽下蓬瀛吹散長空成組練漫士何年寫此圖一溪雲氣長模糊恍疑接筍峰前見還記天㳺頂上居一别溪頭峰六六經年不舉看雲目願學宗生作臥逰畫圖一見心能足題春山積雨圖元章不作房山死誰寫雲山縑素裏耳畔如聞滴瀝聲眼中似見嵐烟起濃雲朦􅀈樹無根澗水奔流野色昏竟日風霾渾失晝行人何處辨孤村畫圖如此雖堪惜莫貯囊中珍十襲只恐時時風雨來生綃一幅淋漓濕送閔夀卿隱武夷世人逰武夷往往思卜宅一出清溪謝白雲山靈無計留雙屐始信人間事可哀幔亭佳宴不重開浮生只愛紅塵老人世難逃白髪催憐君棄家經幾載服食還丹顔未改已識仙都註有名尚疑遺蜕函猶在自入閩天誓不還因縁合在武夷山獨攜一杖千峰裏閒放孤舟九曲間此山元是神仙窟接筍天㳺雙崒嵂玉女粧殘峰頂霞金雞呌落灘頭月君今築室此中居永絶塵縁與世疎回視形骸同糞土能將神氣返空虚我也行年三十幾半生蹤跡多城市入藥空燒九轉紅著書枉識關門紫海外徒聞更九州此身期伴赤松逰何時重預曾孫宴同醉仙人十二樓送俞本之山人還金昌滿徑黃花桑落酒送客關門折衰栁渉世空懷失路悲干時自乏譚天口片刺侯門不得通桂薪玉粒哭途窮半年逆旅貂裘敝一劍飄然馬首東勸君休下楊朱淚客裏秋風易憔悴伏枕愁為越國吟吹簫歸向吳門醉此日諸侯厭布衣可憐窮逹世情非君歸莫嘆行裝薄多少空囊人未歸憶昔行題友人小像少年攜手同行樂我甫勝冠君總角歳月悠悠去不還眼前風景猶如昨此日看君新畫圖神情雖是顔容殊所嗟童稚尚如此莫怪故人成老夫我也半生甘落魄君亦胡為戀丘壑髙舉猶懷鴻鵠心待時且作龍蛇屈舊事經今二十秋披圖空感昔時逰與君相見且飲酒莫遣青銅催白頭都門送吳允兆還吳興燕山三月楊栁新别酒一杯送故人故人仗劍意慷慨仰天大笑辭平津我唱驪駒君駐馬送君半是窮交者暮角淒涼起驛樓春雲慘淡生原野酒闌歌罷馬頻嘶千里征途望霅溪獨有王孫歸未得天涯空歎草萋萋出都門答别鄧汝髙貟外十年三上長安道闕下獻書俱不報拂袖還山别故人風塵滿目傷懷抱長安裘馬多輕肥先達何人憐布衣惟君慷慨念貧賤交情如此今人稀淒涼舊事那堪數半榻孤燈寒夜雨載酒曽同醉錦溪看山猶記眠芳墅轉盼光隂十載餘憐余蹤跡仍樵漁空文何以干明主儒術由來生計疎余也今年三十幾依然落魄歸田里白首何妨老故園紅塵從此辭燕市拔劍哀歌日易昏垂楊未折已銷魂人生離别足感歎窮達悠悠何必論途中感遇效同谷七歌吾生本是疎狂客幾㢠落魄長安陌棄置應慙骨相屯壯年自失干時策日驅羸馬口㣲吟仰天大笑乾坤窄嗚呼一歌兮歌慨慷燕山六月飛嚴霜二歌歸舟歸舟黃河曲揮汗如漿苦炎燠水淺舟膠不得行逢人恥作窮途哭髙堂慈母念子深倚閭此際枯愁目嗚呼二歌兮歌慘切仗劍指天天為裂三歌有弟有弟俱牛衣家徒四壁常苦饑燕閩相去道路逺别來一載音書稀知汝日夜望我歸夢魂常遶天涯飛嗚呼三歌兮歌已短一領征衣淚痕滿四歌有姊已老有妹貧平生惟此骨肉親知余流落兼苦辛家庭悵望應傷神廿年蹤跡半道路平生壯志成灰塵嗚呼四歌兮歌轉澁猿狖聲哀山鬼泣五歌老妻半世空糟糠少婦席未煖君牀男年十五女七歳去年别我俱恓惶丈夫成名既不早胡然久居天一方嗚呼五歌兮歌愈急朱顔燈下流黃濕六歌有朋有朋多窮交平生風誼如同胞揚雲拓落衆所棄數子不敢輕相嘲此日飄零勿復道與君矢志甘衡茅嗚呼六歌兮歌且緩伐木聲殘腸欲斷七歌擾攘烽烟何太急四海紛紛飛羽檄但見縱橫戎馬多何處哀鳴鴻雁集書生徒抱杞人憂中宵起舞空悲泣嗚呼七歌兮歌已終黃昏曠野凄寒風彭城行彭城半遶黃河水楚宫歳久生荆杞殺氣清秋暗戰塲愁雲白日低殘壘楚漢當年幾戰争喑啞叱咤悲風生楚兵一夕盡歸漢帳前健兒皆楚聲烏騅不逝虞姬死垓下歌聲成變徴百二關河屬漢家八千子弟徒為爾覇圗百戰總成灰弔古還勞過客哀千載沐猴成一笑年深戲馬留空臺黃河日夜東流去荒城寥落悲狐兎世事興亡一瞬間英雄枯骨餘丘墓休將楚漢論雌雄此地曽聞唱大風試向咸陽城上望離離衰草滿新豐黃節婦復明歌黃氏母夫亡守志多辛楚血淚洒黃泉淚枯雙目瞽母目瞽兒心苦朝夕吮眸眸未愈母子精誠良可哀一朝忽爾雙眸開母目開父目瞑老淚依然滴孤枕分得九疑山送屠田叔守辰州楚都山水稱竒險突出髙峰青九㸃天外巫黔路𣺌漫峰隂谿澗流深淺峰峰相間色參差無數青螺鏡裏窺變幻烟霞看莫辨滿天雲雨望堪疑重華當日巡南服駐蹕蒼梧窮地軸一夕龍髯上鼎湖數聲鸞吹傳空谷鸞吹龍髯去不還湘江帝子慘朱顔愁眉久鎖鋒前黛血淚長留竹上斑山色含顰望巡狩時時似聽簫韶奏飛瀑寒流到處竒丹崖朱洞天然秀瀟湘烟月洞庭雲逺岫聨綿一帶分鷓鴣夜呌黃陵廟狐兎秋悲虞帝墳古蹟荒涼不堪語果有啼烟兼嘯雨使君剖竹向荆門正近瀟湘洞庭浦有時行部擁雙旌定弔娥皇與女英風前好薦瓊芳把月下如聞環珮聲九疑峰影何重疊峰下褰帷勞應接懷古寜辭駐一麾搜竒不惜停雙屐揺揺桂櫂楚江濆嫋嫋秋風木葉聞遺我不須搴杜若騷成只待寄湘君題盛行之畫梅巻盛君畫梅太竒絶老榦如龍更如鐵筆底幽魂冷不徹滿紙枯株三丈雪六月披圖身欲僵一堂坐客皆聞香就中先輩多評章佳者長沙之李東陽華亭張駿當時此物果誰有楊公成玉揚州守公也珍之若瓊玖自謂此圖傳不朽子孫棄之同敝帚百年竟落他人手峽水林君偶得之不惟愛梅兼愛詩猶記當初兵火時居民鼠竄家流離書籍圖畫焚無遺此圖藏之髙樹枝倭奴雖黠那能知淫雨沾濕寒風吹鬼神呵䕶無損虧吁嗟此圖亦已竒付與妙手重裝池千秋萬歳無離披千秋萬歳無離披題薛晦叔小像誰將縑素開生面神骨如氷目如電童烏文藻自堪誇洗馬風流今再見畫史揮毫未入神十分纔得㡬分真有時鶴氅行㣲雪人比丹青更出塵題陳仕卿蕉雨亭虚亭四面芭蕉緑疎雨瀟瀟聽斷續幾㸃啼殘屋上鳩數聲滴破隍中鹿洗盡紅塵翠色寒美人含淚倚朱闌題詩好趂初晴後醉墨淋漓濕未乾題朱竹根如赭虬髯葉如丹鳳尾有時截作釣鰲竿珊瑚亂拂桃花水有時擲杖化為龍白日青天赤鱗起能將紅霧變蒼烟産在朱明幾洞天須臾絳節生彤管只向松間滴露研陳伯孺兄弟水明樓春宵聽雨歌我家有齋名緑玉齋前種得千竿竹君家亦有水明樓半畝方塘山影流君頻訪我鰲山麓我每尋君溪水曲與君來往十年餘到此樓中幾廻宿今春買棹來相尋峽江風起波濤深樓中賓主黯相對四山隂翳生淫霖簷前坐聽聲聲雨聊把琴書供笑語燭盡猶然興未闌詩成自覺心相許瀟瀟風雨莫深愁百尺樓中且蹔留憑君貌出巴山夜一幅丹青當卧逰霞林樵隱為梁逸人賦山中一道明霞起照得林巒色俱紫初疑晴彩結為帷還訝餘光散成綺林間彷彿見髙標白日青天掛絳綃梁君霞外神仙客時向山中稱隱樵斧柯來往壺公谷伐得晴霞成幾束曉起常依洞裏行夜深祇傍岩邊宿擔頭挑得赤城歸却似桃花片片飛斫來自足山家業服處眞成隱者衣殷紅滿目看如絢朝暮隂晴千萬變此物由來髙可飡願向深林求一片美人買鐵馬歌和幼孺瑶宫僊子遺環珮百結流蘇向空墜半天亂逐片雲飛無數琅玕一時碎趙璧隋珠半已殘重將彩線串團圞良工持向街頭賣臨風忽聽聲珊珊珊珊送入妖嬌耳玉笋提攜心暗喜探得青蚨出錦囊買來挂在雕簷底一陣㣲風一陣聲美人含笑聞琮琤飄揚祇益春心動淒切翻令午夢驚銅壺夜静催銀箭留得檀郎宿深院却愛隣姬睡乍酣玎璫莫向空中戰題陳伯孺效漫士山水小景龍門待詔髙廷禮興到揮毫寫山水黯淡峰巒朦􅀈雲一生學得南宫體三絶聲名重昔時畫成題詠墨淋漓總縁人品壓流輩以茲并重無聲詩流傳歳久蟲魚蝕半尺氷綃難論值龍門去後墨池乾畫史誰能繼其跡陳子灣溪我輩人應疑待詔是前身一時詞翰推雙美㸃染雲山更有神滿目烟霞濃復淡複嶺重岡連斷岸偏于米老得風神難與龍門辨眞贗歳月驚看忽十年燈前隱隱生雲烟詩成戲筆題其上留作人間寳墨傳題馬逺山水幽人野性耽空谷一簇葵花數竿竹磐石􅋂﨑出澗阿流泉湍激交林麓清宵露坐月光遲稚子支笻背後隨林下水邊無俗物既堪圖畫又堪詩漫亭集巻三
