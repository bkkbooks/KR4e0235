body:
  text: 幔亭集目録别集類五明卷一古樂府卷二五言古詩卷三七言古詩卷四五言聲詩卷五五言律詩卷六五言律詩卷七七言律詩卷八七言律詩卷九七言律詩卷十五言排律卷十一五言絶句回環讀四十首卷十二六言絶句卷十三七言絶句卷十四七言絶句卷十五詩餘臣等謹案幔亭詩集十五卷明徐熥撰熥字惟和閩縣人萬厯戊子舉人熥負才淹蹇肆力詩章圭臬唐人而不為決裂餖飣之習卷首有張獻翼序稱其調匪偏長體必兼擅力返古則盡滌時趨所以推許者甚至又謝肇浙謂其才情聲調足以伯仲髙季迪微憾古體不及朱彛尊靜志居詩話亦謂其七言絶原本王江寧多情至語詳閲是集固非盡出標榜當明季詩道冗雜之時亦可謂蟬蛻穢濁者矣閩中詩人自林鴻王䝉諸人以後即推鄭繼之為冠熥生平喜稱繼之而卒年僅三十九與繼之正同亦一異也集為其弟􅎾所鐫􅎾字興公亦以淹貫見稱所撰有筆精榕隂新檢諸書俱别著録云乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀幔亭集原序詩豈易言哉求其成一家言良不易易況備諸體稱大家乎蓋工近體者或弱于古風長七言者或短于五字即王孟二氏盛唐名家一以清婉稱近體一以風骨雄古風且各擅所長況其他乎豫友徐惟和氏永寧令名父之子也授𤣥肖諸童烏屬草方之文考少即抵掌而談秦漢奮力以挽風騷非晉魏之音絶口不談非六籍之書屏目不視蓋病乎世之決裂以為體餖飣以為詞故音非朱絃詞非黃絹寧棄去不屑就也弱冠嘗循例計偕登臺展驥都人欽遲朝列虛左詩歌本之古選興寄備乎開元彬彬然名家矣每停橈見過輒下榻信宿凡三視豫詩初見之已無杜德機矣再見之其善者機耶别去三易寒暑乃出㡢亭集二帙豫執簡嘆曰其衡氣機矣夫當其興寄于山川發憤於嵗月周爰于驅馳宣情於羇旅由樂府而逮五七言古由近體而至五七言絶調匪偏長體必兼善力追古則盡滌時趨可謂頭頭是道重重發光矣又一字之工聞竒而傾耳片言之巧覩縟而躍心紙價騰湧于都門簫譜浸淫于禁掖雕章綺合藻思羅開行且上書鳯鳴解褐鴻漸探其襟抱將扶搖宇內豈區區搶榆所可控而笑哉閩中一時諸子昆弟咸追述大雅取裁風人作者響臻同好景附真足馳騁海內而惟和則獨步當時矣豫嵗方遲暮筆硯都燒徒有輟翰毁草烏能述匠心之源究作者之概乎因不愛其敝帚而答其請之意長洲張獻翼序
