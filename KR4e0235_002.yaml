body:
  text: 幔亭集卷二明徐熥撰五言古詩擬古把袂登河梁秋風慘行色去去天一涯此心長惻惻酒殽紛錯陳哽咽不能食思君有夢魂從君無羽翼浮雲方西馳羲輪忽已匿微款俱未伸相持空太息會面未有期功名當努力落日不回照頽波無西流人生處世間倐忽如蜉蝣百年傷局促其憂乃千秋一朝時命盡悲風起松楸纍纍丘土中誰辨王與侯貴亦不必喜賤亦不必憂聖賢多微言達者聃與周斗酒相娛樂虛名安足謀閨房何淒清思君意如搗追恨當别時光景太草草愁款積胸臆恍惚不能道别君未須臾依然結懷抱安得回君車與君再傾倒徙倚髙樓上西北多浮雲浮雲望不極妾淚徒紛紛丈夫思報國仗劍逺從軍十年遼水上生死不相聞洛陽有異卉灼灼生路傍顔色如朝霞百步聞馨香五陵多逰冶觀者如堵墻竟日歡不足秉燭飛羽觴涼秋降白露氣序回清商嗟哉此異卉倐忽無輝光容華不足恃歡愛靡故常因之感薄俗意緒重慘傷感遇山居絶塵鞅衆慮寡所營長嘯谷聲應撫琴薰風生雲流古洞濕雨過寒潭清年光自代謝草木隨枯榮且盡杯中酒遑圖身後名出門盡秋色策杖登寒山雲來幽徑迷風急衣裳單林深豺虎嘷洞古虬龍蟠路逺人煙絶日昃不得餐蒿藜蔽田野中心自悲酸嚱吁望絶巘始知行路難不如歸林臥長嘯賦猗蘭咏荆軻荆卿一劍客擊築遊燕都許身太子丹生死誓不渝文夫報知已何惜此微軀悲歌度易水慷慨自驅車匕首中銅柱非由劍術疏報秦雖不濟千載仰雄圖薤露日出何杲杲薤露不長保人生在世間豈能長夀考穰穰陌上塵離離墳畔草殤子與彭籛胡然較遲早瞻彼薤露晞感歎傷懷抱詠懷歲序如轉轂一去無還期形容久不逮臨鏡始嘆悲悠悠夢寐間覺寤何其遲處世三十年履厯多險巇世事古猶今此意當自知奈何微脆軀與俗爭奔馳奔馳覺生纍守靜性可怡老莊有明訓役役將何為與陳汝大鼇峰宴集四郊散秋色層臺結夕隂孤磬出叢薄倦鳥投故林殘霞落酒杯微月照衣襟良朋式至止臨風諧賞心既蠟阮生屐復為梁父吟􅀈然發長嘯天外有餘音振衣陟鼇頂石磴何嵬峩松隂如車蓋亭亭山之阿深巖逗秀色古樹垂女蘿醉來窮幽壑勃窣經危坡孤鴻唳天際野鳥當筵歌人生寡良和不飲將如何逰圓峰閣古閣枕溪濱年代已湮沒山勢何嶙峋溪聲無停歇老樹倚雲根寒泉溜山骨我來陟孤岑石徑蒼苔滑朝餐嶺上霞夜潄波心月處處煙景移步步清興發臨風開素襟空山坐超忽東際亭晚眺虛亭蒼翠間煙霞變竒景微鐘起梵音空潭自清影行來竹靄深坐久松風靜𡨕然道心生倐爾塵緣屏吟眺猶未闌殘陽在西嶺擬登天台山晨興理輕䇿捫蘿登嶕嶤荒榛隱煙霧絶巘摩穹霄泉聲灑飛瀑山容建霞標下有百丈潭泠泠喧石橋涼燠異巖壑雨暘變昏朝遐矚發清曠溽暑生涼飈偓佺詎云逺羡門猶可招騁此物外觀聽彼雲中謡微風奏天籟淡雲綴輕綃結根比華岱幽邃同中條髙情豁然暢塵襟亦已消安得遇至人與之同逍遙春泛若耶春風散藻景山水動微暄桂棹泛蘭渚搖搖過前川汀花媚幽壑岸栁垂輕湍環洲屢回復雜樹何繽紛微波生鏡湖疏鐘來雲門揚帆意超忽泝流情孤鶱逆楫芰荷脆隨波蘭芷繁和風駐瑶瑟落日沉金尊山川緬如故疇昔誰能存佳境豈易覿幽懷願無諼懷陳平夫别子雖未久念子意何深攬衣立階除涼風吹素襟殘鐘度微月天籟雜悲吟盈盈一水隔悠悠千里心空山白雲滿六溪何處尋寄題林晉伯别墅夫子且遁世結廬居青門鳴泉瀉懸崖山光當層軒淡淡雲影疏謖謖松聲繁林密失寒燠山深忘朝昏薄田足禾黍幽澗多芳蓀柴門瞰清溪一徑通花源時時命小舟去去過前村愜此丘中賞忘彼朝市喧伊余秉微尚委懷在丘園安得相比鄰長嘯醉山樊登鼓山大頂曉望屴崱峰振衣涉蓁莽樹色逺蔥蘢練瀑空中響峭壁插蒼穹丹崖懸百丈鬼斧鑿鴻濛玄巖閟罔兩我來叩崆洞素心懷孤往蘿蔓刺衣裾煙霞隨屨杖倚石潄清流頓令神骨爽薄暮日漸暝月印蒼苔上忽聞天籟鳴泠泠愜心賞願言脫塵纓不復絓世網贈陳價夫薦夫明珠無連胎竒卉寡並蒂物類有如此無乃造化忌夫何六溪中産君兄與弟意氣傾時流詞華振當世顧盼生雄姿中原敢凌厲探討無倦勤玄心已超詣二陸久不興芳名爾當繼劍浦送顧世卿行行出劍津送君還東吳未能展嬿婉别離在須叟含涕牽君衣相視意踟蹰我無雙飛翼何由與君俱君行登青雲我尚蟠泥途相隔天一方道路阻且迂會面雖有期秖恐容華殊悲風振原野怪鳥爭哀呼送君從此去回首日云晡晚渡淮水孤帆涉淮水天氣苦寒沍積雪明長崖斜陽橫古渡漁燈隔浦來人煙數家聚前途多風塵故山隔雲樹栖栖問去津悠悠嘆行路逺涉猶未窮徘徊日將暮田家雜興春風動郊墟村村事農務桑柘蔭比鄰鶬鶊鳴髙樹訪舊入城稀持饁歸田暮雞犬識井閭牛羊諳村路此中寡所營悠然有真趣憩轉華菴精廬傍人境虛寂無垢氛食施隔林鳥衲挂前山雲池光既澄潔香氣尤氤氲獼猴識戒律狸犬嫌腥葷談深不顧返西嶺將斜曛終當逺城市髙卧辭人羣對月遲王元直不至孤館寂無人寒威滿林樾天長鴈影遲露冷蛩聲歇當尊翠靄深倚杖蒼苔滑故人期不來惆悵花間月春日山居招袁無競晨起倦簪沐便覺日停午梁間燕哺雛竹外鳩呼雨碧蘚盈階除幽花映忩户裁詩招所歡愁心繞煙樹送鄭業師之漢陽春風吹栁枝處處鳴鶗鴂七十四老翁猶作天涯别若比少壯遊此情倍嗚咽貧來褐不完老去頭如雪遊非尚子懷辨豈君卿舌出門靡所甘苦為飢寒迫湘江道路長楚水煙波濶茲行毋滯淫門人望回轍懷陳履吉久居山中聞君居荒村寥寥誰與侣田叟時往還樵夫或共語吟思倚杖時釣憶臨流處髙懷絶世氛間心寄煙渚此别已徂秋涼風滿庭樹懷沈從先與君未傾蓋吳門費相尋十日不能得嗟哉誰知音故人不我棄題書貽空林感此歲月異傷茲年鬢侵寥寥千古意悠悠萬里心花殘吳苑暮月落楓橋隂望君不可見思君空自深答葛震甫閩海與吳門相隔幾千里君雖吳門居又隔洞庭水不知賤子名何由入君耳雲中有片鴻江頭足雙鯉投來皆璚瑶報之愧蘭芷臨風懷美人感歎胡能已慰佘宗漢喪子一官不稱意拂衣逰五湖書空羞咄咄對酒呼烏烏行年已半百有子啼呱呱丈夫恥內顧仗劍遵長途及君還故里歲月已云徂此兒風格異蹀躞稱家駒膝前還復著鯉庭時能趨昨日致書來云君殞其雛知已為痛悼坐客同嗟吁有生本非有無生亦非無達生乃賢者西河非吾徒君今喪子後還如無子初金石有銷鑠况此脆弱軀古人齊彭殤此意良非迂造化誠小兒無為此拘拘哭林遜膚先生先人同時交什九泉下塵遺老獨有君倐然返其真君今歸黃壚不患無所親世上少相識泉下多故人生交有聚散死交千萬春死者足相樂生者徒悲辛喜微師自水西歸開士從何來云自山中歸去住無定迹有如間雲飛隨方皆淨土何處非禪機城市雖紅塵不染靜者衣賦得華林暮雪屏山何逶迤精廬依北郭日暮寒風生曠野同雲作俄看雪片繁漸覺襌衣薄瑶華結珠幡玉屑飄金鐸跏趺雙樹林疑是天花落望月有懷唐宗貞陳彥宗微月入庭除疏松散清影山深嵐翠濃露落衣裳冷當時月下人蹤迹同萍梗對月思所歡此情空耿耿劍浦送康元龍逰吳余自吳門歸君望吳門去來往本無期延津忽相遇一望故山雲一問他鄉路語罷各分離愁心滿煙渚聽陳振狂彈琴因懷劉道子夜坐松桂叢孤琴理殘月流泉澄幽隂微風助清越愁因寄指深興以餘音發悠然山水心懷人向天末南嶼田家緑水蔭柴門蒼山繞茅屋老樹鳴春鳩頽垣眠小犢鵝鴨自成羣兒童戲相逐遊從里社歸稅藉農桑出榮辱非所知飽暖願已足羲皇世代遐此地傳遺俗空山布榖鳴春風散墟落夫妻同荷鉏南畝事東作衡門隱者居斗酒田家樂間惟念子孫老不知城郭安能受一廛鼓腹同耕鑿宿雲窩贈林熙吉吾黨有一士結茅峴山麓庭前羅異卉屋後繞修竹託迹在巖丘結交盡麋鹿水石同弟昆農桑課童僕時為梁父吟間取離騷讀服食慣參苓往來狎綺甪能忘朝市喧不與世情逐誰知錦水濱却有愚公谷朴被時一來同抱孤雲宿懷陳惟秦相思一何深相别一何久條風吹蘼蕪新火鑽榆柳春光漸以闌莫負尊中酒題王玉生山水輞川迹已陳千載寡竒筆王生嗣其徽少負山水癖寸頴幻煙霞尺素生泉石古木蔭溪湄虛亭倚山隙一徑轉危岡兩岸分泉脈淡淡柘林黃蕭蕭楓樹赤巖壑互向背雲隂變朝夕人境信有之願言卜丘宅猛虎行上山采蘼蕪下山采蘼蕪采采猶未巳白日將崦嵫歸來逢猛虎咆哮當路隅倣徨何所之林莽多人居豈無桑間人輕薄同秋胡此身雖可噬此節安可渝甘心飼猛虎矢志同羅敷寄林去疾相聞十餘載相隔三百里君瞻鼇頂雲我夢鯉湖水何以贈所歡因風寄蘭芷酬陳汝大曰余少骯􅗣寢迹山澤間世路罕所營翰墨聊為歡結交二三子氣味芬若蘭道誼互相砥文章時往還所嗟非比鄰别易會良難君其朂諸子令名當自完繼之既以逝大雅聲云殘吾黨嗣遺音矢志回狂瀾旗鼓漸以振逸軌尚可攀景光幸自愛勉旃毋多談寄李惟實嶺南多畸人李君稱俶儻神鋒既俊逸胸懷尤爽朗弱冠奮青雲聲華滿天壤詩宗大厯前文軼班揚上足迹半四方逰道漸以廣傾蓋在都門投分慰心賞敝帚安足珍乃獲千金享易水賦離歌中心發悲愴歸臥空山中猶作真人想貽陳汝翔柯嶼山水竒之子鍾靈祕吾黨推白眉詞壇標赤幟衡門可棲遲丘園還自賁服食采三秀衣裳裁薜荔天倪既已和純白無不備但作襧衡狂不下楊朱淚暌違日以長臨風思把臂酬陳伯孺春日見訪之作豫寧不得意幽居嗟陸沉稚子門外呼有客來相尋論心意已愜握手情何深新詩餘萬言居然正始音談深梅雨歇坐久春鳩吟日暮别我去悵然勞此心五君詠陳汝大汝大長者流涉世嗟不偶玄牝有精詣黃庭能自守混迹居泥途飄然出塵垢作賦餘萬言讀書窮二酉振響主詞盟伊余忝其後非博生前名所志在不朽陳汝翔汝翔好竒古遁迹在柯嶼詞藻何離離才情尤楚楚能追正始音不作齊梁語臭味既已同素心自相許睽乖勞我思山中正延佇陳平夫平夫貌不揚意氣何卓犖恥抱齊門竽甘作荆山璞詩解匡生頤談折充宗角一飲動百巡賢聖分清濁古道信寡諧正音久遼邈努力崇令名典籍有先覺陳伯孺伯孺秉異姿弱冠冨經籍拓落守太玄異同辨堅白作賦已馳名耽竒自成癖丹青發妙賞磊磊生泉石把臂結詞盟微悰永無斁陳幼孺薦夫意氣豪逢人作白眼𡨕心契道詮矢志稽墳典伯仲既齊名君才良不忝大雅久沉淪俯仰知音鮮凌厲向詞壇片語人矜善結志在千秋令名爾當勉赴京道中寄惟起惟揚二弟我行值炎暑倐忽還徂秋眷言念同氣惄然生百憂馳暉不可駐逝水無停流感茲歲月駛悵以道路修悲端起中夜夢寐居林丘林丘渺何許逺在鼇峰麓參差多巗巒蒙籠匝花竹遺蹤追考槃髙吟動淇澳一落塵網中與世相徴逐俯仰思故園悽風滿愁目愁目不可極悵望心魂驚仳離足感嘆况乎骨肉情愁多無定緒路逺難計程危時幽憤積逆旅孱軀輕涼風天際來嚦嚦哀鴻鳴鴻鳴一何哀客心一何苦昨發濲溪濵今宿桐江滸平沙翻驚飈崩崖蕩零雨中宵蚊蚋喧白晝馮夷舞嗟哉行路難含悲望鄉土赴京酬陳汝大見送之作羲輪轉南陸天氣何鬱蒸駕言出江泛婉孌辭良朋握手長太息涕下同沾膺伊余下乘資致逺胡能勝臨觴發麗藻要我以飛騰匪惟繾綣篤徒令感歎增小石無完璞勺水無堅氷既愧明德茂敢期勳業𢎞三復君子言旦夕懷氷兢芳規在往哲努力將憑陵答袁無競乍别已不歡久别情轉惡淒淒零雨濛鬱鬱炎蒸爍遵途憂風波對境懷丘壑濡毫無妙理把酒強為樂遐心寄蘭荃秋隂生杜若緬懷揮袂初風景宛如昨逺道佇徽音髙標憶河朔苕溪送元直南還送客情已悲何當更送汝送汝情已悲何當在逆旅此情各自知臨行復何語握手立斯須相看淚如雨長安書懷孟郊體燭滅方知黑其明同瞽師脈絶方知死安得稱良醫文章屢棄置猶有俗所嗤彈射豈不精所惜覺悟遲得失論工拙勝負分雄雌世無鮑叔牙此意誰能知家山八千里策馬燕風悲中情徒鬱結泠淚空雙垂喪車行歲序當杪冬雞鳴聞巷哭填衢廣栁車載道殘魂木哀哀薤露聲炯炯方相目骨肉有餘悲親朋寡顰蹙當其在世時營營苦不足百年同隙駒一夢同蕉鹿靈爽歸山丘枯髏别華屋城郭不相容棄之邙山麓初夏邀黃仲髙孝廉張孺願太學錢叔達山人張公魯徐仲和秀才及社中諸子集澄瀾閣良辰集羣彥暫謝區中緣駕言出西郭飛觴湖水瀍澄瀾敞髙閣峰隂流綺筵丹嶂互隱伏粉堞相回旋依岸垂栁密出水新荷圓珍禽響叢薄錦鱗沉深淵芳思結瑶草清音鳴朱絃願以桂楫泛同將蘭􅉅搴風和嵐翠燠日落暮景延幽賞既已愜旅懷由茲宣白駒聊可縶奉君終歲年送黃明立北上路逺無倦蹄天長無倦翼千里始停御九萬方一息未騁康莊途終當受銜勒未能摶扶搖安得惜羽翮之子腰裊姿兼負鵾鵬力行將垂青雲非久困槽櫪一去登天間且向南冥適飛騰自有期臨岐免悽惻下第述懷匠石屢不顧定匪明堂材淵客屢不採定匪明月胎十年三棄置中情空自哀傷哉吾道非豈乏干時媒歎彼行役苦畏茲年鬢催進退兩躑躅坐立空徘徊升斗豈吾志結念居南陔逰鉛山觀音洞髙秋出郭門名區訪靈鷲徑路既逶迤林巒錯如繡怪石競瑰琦竒峰自輻輳玲瓏似雕鏤􅚱砑欲爭鬬倚伏形體殊剝蝕膚理皺中有大士巖丹梯轉深竇竅從混沌開屋以穹窿覆諸崖地脈藏一隙天光漏巍巍逼蒼旻隂隂失清晝澄泓嵓罅停琮琤石齒溜寧云蓬島遙應笑華陽陋造化播神竒此理胡能叩低回及崦嵫嵐翠生懷袖桑溪禊飲詩二首春風載柔遵彼長林我有旨酒與子同斟幽懷既愜玄想彌深悠悠逝波實愴我心暮春有餘間出郊騁逰目桑溪激清湍澄泓遞洄洑微暄起川涘輕隂垂灌木羣賢互箕踞浮觴泝溪曲周遭信隄岸斟酌勞童僕石矗防仄傾流駛慮顛覆幽賞豁塵襟餘薌散春服尊罍猶未罄羲輪欲回轂俯仰成古今動靜悟往復誰哉契我心蘭亭有髙躅題陳伯孺畫羣山既蔥蘢諸溪何蜿曲孤亭倚髙岡人家蔭喬木蒼松盤路岐危橋度空谷地僻無冬春山深絶寒燠乘間問友生策蹇勞童僕步步出煙雲悠悠入花竹潺湲滿清聽空翠生巾服間身寄林丘野性諧麋鹿瞻彼城市中風塵空碌碌幔亭集卷二
