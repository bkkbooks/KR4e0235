body:
  text: 幔亭集卷五明徐熥撰五言律詩出塞曲羽檄交馳急橫戈賦逺征五更邊地角雙淚漢臣纓夜月關山影秋風隴水聲何時安絶漠歸去報承明窮冬生朔雪寒色滿交河絶塞人煙少荒城戍角多關山同漢月部落半羌歌欲破胸奴膽君王莫許和陌上桑賤妾是羅敷條桑向路隅捲衣伸玉腕掩袂謝金夫幹弱搖絲籠枝繁罩繡襦蠶飢歸去急五馬枉踟蹰巫山髙宫殿傷蕪沒峰巒入杳𡨕猿聲經峽慘山色近湘青神女魂何處襄王夢已醒朝昏見雲雨猶自想精靈梅花落繁花生絶塞春至幾枝空舞雜梁園雪飄隨庾嶺風妝臺香點砌官閣影辭叢少婦髙樓上含悽曲調中折楊栁别時曽一折羌管不堪聽愁鎖眉同翠嬌回眼共青征途悲雨雪古驛望流星却恨飛空絮隨波化作萍關山月一片關山月悲歡望不同穹廬光照海沙磧影連空輪滿開秦鏡弦斜倚漢弓年年三五夜魂斷玉樓中隴頭水秦川分兩水嗚咽不能休飲馬氷猶凍磨刀血半流東西隨隴坂逺近入邊州萬古聲無盡惟添征戍愁紫騮馬蹀躞橫行意悲鳴戀主身金鞭垂漢月玉勒控邉塵影絶追奔易蹄髙轉戰頻不辭流汗血未可事和親銅雀伎銅臺遺令在玉座主恩非舊曲流哀管餘香散舞衣繐帷空寂寞羅綺失光輝日日西陵望君王歸不歸送人赴安西離亭征馬嘶送子赴安西後會知何日前途方鼓鼙天寒白草瘦沙濶黃雲低所惜同心逺能無心慘悽題方廣巖廨院參禪覔野寺涼月滿空山行到叢林裏溪流隔幾灣老僧擁衲坐孤鶴聞鐘還回首來時路渺茫煙靄間塞上逢故人胡笳聲正喧一騎向秋原偶爾聞鄉語因之傷旅魂停鞭問姓氏掩淚敘寒暄未盡悲歡意沙場日又昏送僧還山深林長閉關歲久欲西還落日人煙少秋風梵磬間錫飛孤鶴外衲過斷雲間應嘆無期别相尋何處山元夕集宗少府宅勝地春光早開尊卜夜歡更深銀燭短風細玉簫寒露氣凝疏幌花隂罩畫欄六街冶逰子香霧撲雕鞍令節逢元夕春光此地偏竹枝逰女唱桂酌主人傳漸覺銀河墜還驚珠斗懸悠然歸路晚萬井散燈煙溪行空山收晚照秋色滿川原砧杵誰家婦雞豚何處村叢林喧怪鳥絶壁挂孤猿白髮髙堂上遙遙正倚門重宿靈源洞懷珠上人重借蒲團宿吾師已度杯煙霞虛白社衣鉢入黃梅猶憶無生偈空餘般若臺靈源今夜月依舊照蒼苔送陳平夫歸六溪送爾出關門潮生野渡喧離心數行鴈愁思一聲猿月暗迷前浦林疏見逺村今宵燈影裏相憶倍銷魂亂後經電白縣有懷故園一夜攙搶落東南乍息兵黃雲依舊壘白骨委孤城八口蠻煙路千家野哭聲故園殘月影偏向馬頭明樵川道中停舟當薄暮古寺報昏鐘茅店斜臨水柴門半倚松雲蘿催暝色霜葉老秋容片月飛清影寒山翠幾重送鄧郡丞擢河東轉運征馬忽聞嘶飛花趂馬蹄一官司斥鹵萬里隔雲泥路入滹沱近城連恆嶽低知君才駐節名已震關西舟次小箬溪遇邵廣文夢弼話别邂逅白雲邊停橈一問玄去沽桑落酒來醉廣文氊月色催更柝霜花壓釣船相逢俱逆旅明日各風煙劍津夜泛夕翠飛丹壑蔥蘢色不分神龍前代化山鬼隔村聞零露清殘月流星入斷雲溪邊髙閣在何處遇雷君度何嶺憶家鄉淚正紛紛猿聲到處聞孤峰遙聳翠怪石自成文憶弟吟春草思親指白雲投繻向關吏何意學終軍塔嶺道中樹老根盤鬱峰竒勢不齊單車穿宿莽雙巘夾清溪古驛喧猿語荒郊印虎蹄王孫歸未得愁見草萋萋仙霞曉發早起肅行役寒威何太嚴防身惟短劍沽酒有長髯故國山河盡愁心日夜添雞聲催出客殘月挂茅簷度西陽嶺絶巘疑無路披蓁霧裏行千尋皆鳥道四壁半猿聲田父扶犁出山僧倚錫迎停驂聊買醉霜月滿孤城舟次龍丘遇尹光祿留飲賦謝黑髮朝參懶聽松枕石眠胸中才八斗門下客三千望氣關常紫揮毫草正玄自慚同侣笑休覔孝廉船西湖立春春色薄城隂東風到武林暖回鄒子律病作越人吟兒女他鄉淚鶯花故國心西湖有狂客相對酒杯深王百谷招飲半偈菴歲晚過吳市飄零念此身投君三指刺醉我百壺春名下無虛士天涯有故人相逢談半偈江上月華新毗陵舟中行行驚歲暮孤棹滯天涯逺岸經橋合寒流抱郭斜何人分竹葉無使寄梅花苦為微名纍蕭蕭兩鬢華南徐除夕倚棹南徐下燕山北望遙客程猶未半殘歲只今宵鄉淚當孤燭愁心逐夜潮髙堂有白髮何意向雲霄揚子江望金山寺才過揚子渡便覺氣蕭森地勢分南北江流自古今浪翻塔影動雲擁寺門隂未慣風波苦空餘涕淚深漂母廟淮水流無盡荒城古廟存何人憐國士老嫗識王孫雖有千金報寧酬一飯恩平生知已意難與世人言任邱道中馬足怯春霜燕山路正長生涯慚小草離緒寄衰楊白骨新邱壠黃沙古戰場平安空有信來往少同鄉李惟實過集客舍擊築過燕市逢君醉濁醪龍門叨御李蟲刻愧投桃嵗月虛長鋏風塵暗大刀可憐燈影裏相對兩青袍出都門懷程五表兄獻策不得意呼童便束裝人皆悲失路我獨喜還鄉拓落嘲玄草驅馳愧緑楊歸尋河朔侣同擘荔枝香遊虎邱寺一棹過蘭若齋心禮法華荒墳深踞虎古木亂栖鴉寶塔凌空逈幽巖逗月斜生公講亭在何處有袈裟同吳之衛馬雲卿飲張幼于曲水草堂兩度過吳市今來得問竒榻從花下設人在竹間窺座客皆黃髮先生自白眉名園依曲水芳宴共題詩諧賞園别顧世卿共醉尊中酒驚看别後顔神龍分劍浦羸馬出陽關園似逰金谷人如行玉山相逢又相别空有淚潺湲午日過江郎山車度蒙茸裏侵衣樹色涼土音聞越客山色見江郎萍梗悲逰子菖蒲憶故鄉龍舟何處競簫鼓斷人腸至家故里經年别今朝慰倚閭關河空阻絶歲月易居諸燕麥埋荒徑鶯花老舊廬莫嫌金已盡還有一囊書行腳僧何年辭故院足迹遍雲天有寺皆投宿逢人便結緣木杯窮歲月錫杖老風煙人境元成幻行藏總是禪旱入秋猶不雨望已絶三農處處憂豺虎村村祭土龍人情皆憫歲天意豈乾封米價騰如此軍儲不罷供上天未悔禍四野正皇皇溪澗水亦涸桔橰何處忙誅求今正急誰敢議開倉苦乏謀生策須求辟榖方嵩山寺贈淨上人古寺門空閉青林紫衲僧風傳齋後磬雨暗座前燈經不念中品禪能參上乘夜深談半偈無愧佛圖澄芝山寺逢遊元封兼懷宗振當年曽一面此夜遇禪居乍見不相識驚看鬢漸疏阿咸元自逹癡叔竟何如别後餘玄草毋忘寄敝廬春興入春才數日春意滿疏林苔補階前色禽傳竹外音山容開曉霽雲氣散輕隂虛室無塵想泠然物外心訪瀚上人遁迹芝山寺長年不出龕行深忘色相客至但和南傳世燈千劫隨身經一函無言即真意禪理豈須談溪行晚眺溪上欲黃昏潮平浪不翻鐘聲雲外寺燈影水邊村荒坂牛羊下前林鳥雀喧桃花最深處莫是武陵源清明客中寄惟起弟迢遞京華路風塵多苦辛可憐三月暮又負一年春故里鶯聲老天涯栁色新孤燈風雨夜憶汝倍傷神同王玉生惟揚弟登劍州明翠閣因懷宗思兼先生髙閣倚崚嶒年來幾度登危欄紫野竹怪石抱枯藤上界空香墜前山翠色凝因思舊逰者望斷白雲層王臺驛古驛枕溪流羣山抱驛樓灘聲寒午夢鶯語動春愁芳草王孫路桃花漁父舟白雲與流水相對共悠悠舟行空山駐夕陽山色更蒼茫隔岸蘋花白滿汀蘆葉黃寒蟬抱樹咽金氣侵衣涼此際溪行者能無思故鄉舟行正暮秋晚眺思悠悠驛路當溪斷漁家傍竹幽山阿全隱寺石罅亂回舟坐聽寒溪水潺湲日夜流秋日同汝翔伯孺惟起集汝大山齋髙齋秋氣清殘暑坐來輕竹外商飈度松間天籟生一杯桑落酒千載薜蘿盟我輩疏狂甚誰當嵇阮名劍浦得幼孺書别君經一年迢遞各雲天彼此有消息全憑書札傳鴈飛九峰外夢到六溪邊把臂知何日開緘空惘然病中遲陳道育不至幽齋啼暮禽扶病自沉吟孤燭當殘夜疏鐘度逺林月窺松隙小雲閉竹房深空有懷人意杳無車馬音贈陳元之刺史先生宗炳流山水臥中逰隱矣能自適淡然何所求紫雲當日夢黃菊此時秋投老六溪上依稀如十洲慰陳振狂失釣艇一夜秋江漲聞君失釣航聲應停欸乃歌忽罷滄浪荻岸空殘月蘆磯但夕陽遡回知所去宛在水中央枯纜何時絶飄然嘆斷蓬豈知漁父枻翻作楚人弓鶴侣今誰載鷗羣舊已空中宵頻起望或有石尤風青錢費幾緡買棹作漁人岸火焚孤纜秋風罷釣綸飄零疑海怪去住聽波臣不返緣何事君其問水濵歲暮懷鄭六初忽忽歲云暮天涯客未還夢回瓜步月人隔秣陵關驛路梅花瘦空齋竹影間何時理歸棹相對説青山夜坐空齋寒似水獨坐倍淒然葉響林間雨風聲竹杪泉應門雙鶴睡照佛一燈懸暝色生蘿徑飛來絶壑煙歲盡范叔寒如此其如復逼年文章能作祟吾道合迍邅吏預催官稅門多索子錢縱然貧到骨不敢怨皇天苦雨淫雨經旬月蓬蒿掩敝廬飢烏藏樹杪行蟻徙階除天意髙難問雲逰迹漸疏山中蓑笠在長日自揮鉏竟日雲隂合千峰雨腳連田禾爛欲死平陸潰成川竹徑坐來惡蕉房聽可憐因之廢櫛沐白日枕書眠九夏苦無雨冬來何太繁𡨕𡨕翻浪急莽莽塞天昏野服霑松翠空墻繡蘚痕山齋幽寂甚愁緒豈堪論約汝大汝翔振狂惟秦在杭藤山看梅藤山梅萬樹冬盡一齊開粉面懷人瘦香魂入夢來翠微將失色玉屑漸成堆昨得花神檄遲君共舉杯梅塢餘殘雪疏枝冷不禁去招梁苑客同作灞橋吟十里花為市千家玉作林愼毋披鶴氅樹裏恐難尋同汝翔在杭看梅先宿蘆中磯雪後尋梅塢蘆中問釣磯榻同陳仲舉詩得謝玄暉朔氣凝青幌寒香動翠微前林春色好折得幾枝歸白龍江上路五里即梅林暫借蘆中宿同諧物外心清霜明竹屋涼月墜花隂姑射仙人夢朝來不可尋蘆中磯曉起喜汝大惟秦至犬吠蓽門前遙驚石榻眠攜來雙竹杖穿破一林煙袖出梅花譜囊添麴米錢歲寒盟不負同醉白雲邊曉起看梅花神催曉夢枕上忽聞馨路指梅林白尊㩦竹葉青蘿衣沾宿露藜杖帶寒星積雪看如絮前村作杳冥秋夜汝大見訪留酌故人當夜至倒屣出相迎坐久詩情發霜寒酒力輕殘更聽漸促微月欲西傾分手柴門寂惟聞天籟聲哭同年黃紹馨孝廉同領鄉書者才名君最先賦成栖鵬日筆絶獲麟年堂有雙黃髮家無二頃田交情盡一哭淚灑寢門前喜林逸民山人再至相見各歡悲風光異昔時如何赤城客又赴白雲期情以重來密詩從别後竒試看雙鬢裏添得幾莖絲春日間居草閣春方暮柳隂日未斜蝸涎分斷壁鶯語共鄰家曲塢藏修竹輕雲覆落花卑栖有至性長此卧煙霞茒屋依青嶂蒲團坐白雲新茶燒竹煮老柏雜香焚壁古苔紋見林深鳥語聞𡨕心忘早晚花外已斜曛一室通幽徑群峰列翠屏空階半夜雨新竹幾行青山果猿爭拾巖扉鶴自扃花間聞剝啄客借太玄經焚香坐翠微山色入荆扉日午鳥啼歇門間人迹稀休糧孤鶴瘦積雨野蔬肥欲識靜中意白雲天際飛宿陳七吸江亭髙談當子夜人世幾今宵共步蘆中月因歌竹外橋孤琴清淡露寒磬落歸潮此地堪栖隱頻來豈用招烏石山贈僧鷲嶺白雲邊茒庵只數椽汚泥皆淨土人境即諸天山現空中色花明定後禪蒲團今已爛趺坐不知年風雨風雨來何驟虛堂白晝隂木催愁破屋巢落不歸禽水入花畦亂雲埋竹塢深殘虹開晚霽飛瀑滿遙岑宿林熙工面壁洞精舍錦溪東依然梵宇同一燈禪榻寂孤磬世緣空花散諸天雨松生萬壑風池光與月色相對意無窮古洞傍巖隂煙蘿一徑深白雲皆幻迹碧草自禪心日午風幡影月明霜磬音已空人我相任是世人尋同林熙吉鄧汝髙遊錦溪竹林一路盡蒼苔濃隂畫不開山依迂澗轉泉逐斷橋來同坐松間石還傾竹下杯隔溪煙磬晚欲别又遲回水西遲陳伯孺不至之子來何暮相思漫倚樓望窮平楚月魂斷錦溪流對酒不成醉看雲何處留幾回沙浦上數盡往來舟送陳十二仲溱歸柯嶼幽居憐君復失意别我向南還落日闕渡春風柯嶼山馬行青草逺人語緑楊間歸去應垂釣溪流第幾灣過白雲寺尋僧到白雲便覺逺塵氛古道少人迹流鶯處處聞泉聲歸澗寂山色過橋分坐聽疏鐘起空林正夕曛送劉季德還嶺南盡此一杯酒送君心黯然魂飛瘴嶺外路指海雲邊春老花隨馬潮平月到船相思當後夜閩粵異風煙送張叔韜博士自永嘉還長溪青氊坐未暖白馬永嘉還夢繞龍湫水門當天姥山悲風起渡口落月傷離顔一望一惆悵思君空閉關懷鄭四琰客邊仗劍干明主壯心殊未休風塵閩海夢煙月薊門逰相憶坐與卧去家春又秋君懷棄繻志當斬樓蘭頭送黃博士典試之楚送汝正秋初河橋栁漸疏忽飛閩海鷁去食武昌魚湖水連官驛湘雲擁使車聖朝方急士早上薦賢書萬里楚天色君行意若何收將和氏璞聽遍郢人歌帆影洞庭盡馬蹄衡嶽多勝逰知有賦莫惜弔湘娥送周喬卿交歡才半載歲晏復離羣馬上程三日囊中錢幾文行藏元似寄世態總如雲莫笑吾貧甚梅花可贈君歌者陳郎戲作姬妝即席調贈梨園推麗質結束作妖姬妙舞風前合清歌雲外遲綵衣裁袖窄翠鈿壓眉低何必悲黃鵠愁多貌不移建溪中秋懷馬季聲諸子對君不能歡鄉心有萬端青天一片月白社幾人看葉落知林瘦溪深覺夜寒南飛見烏鵲何意獨憑欄關門曉發關門何處通路入亂雲中雞唱逐殘月馬蹄隨曉風泉飛秋澗響葉盡暮山空感此封疆異離心誰與同九日集張幼于曲水草堂虛亭來爽氣秋色滿疏籬楚客紉蘭佩吳姬唱竹枝假山遙對户曲水暗通池不負登髙興渾忘故國思寄惟起弟别來音信稀憶汝忽霑衣細雨孤帆逺長天一鴈微魂隨青嶂斷夢與白雲違明歲黃花節知余歸未歸滸墅關逢王百谷才作吳門别重逢在水涯青蚨沽緑酒彩鷁載黃花坐久潮初滿談深日易斜虎邱一片月相送到京華金昌贈錢功父半偈庵頭别春風又幾年相逢猶問姓感舊各茫然爾我形容改江湖夢寐牽此心倍悲喜莫怪太留連雲間旅情一帆辭檇李兩日到雲間江路依松轉柴門映竹關顔隨秋色老夢逐暮潮還忽聽華亭鶴悵然思舊山京口夜泊遲陳大不至落日橫京口停雲更黯然經旬同去住此夕異風煙目斷寒蘆外魂銷短燭前榜歌頻起聽永夜不能眠同彭正休陳子卿逰金山遇張函一孝廉閔壽卿山人恩公若公萬頃江如練中流湧翠微浪翻孤塔影雲戀定僧衣客路同聲少空門聚首稀斜陽各南北惆悵水煙飛同陳子卿過廣陵訪夏玄成吳叔嘉留飲席上分得燈來二字嵗晚天涯客孤舟度廣陵論交疑是夢對酒喜如澠郭靜濤聲逺天寒露氣凝不愁歸路黑江上有漁燈客路逢知己飄零未可哀凍雲依樹合殘月隔花來喜對髙陽侣慚非鄴下才觀濤吾有賦秉燭為君裁酬陸無從率爾見贈之作陸氏機雲後誰當夫子賢賦能工白雪官已薄青氊地僻門如水庭間草似煙蕪城分手處感激贈新篇交河早發京華望不極曉起戒行程馬怯霜橋路雞殘月店聲晨光催斷角暝色破孤城此際栖栖者思鄉無限情河間宵征不盡風塵苦宵行路更難清霜蛩語急斜月馬蹄寒砧搗閨心碎笳吹鄉夢殘驛樓看尚逺何處解征鞍憶故園梅花衰栁長途恨寒梅故國思微霜虛矮屋殘月冷疏籬隴外人難寄林中客到誰藤山歡賞處又是隔年期北地北地非吾土重逰信可哀鴉聲喧白骨馬足起黃埃野曠衰楊栁田荒變草萊江南風物好一望一徘徊至京客途勞役息帝里物華新馬踏交河月鶯傳上苑春曙光開栁陌雲氣戀楓宸應待臨軒日抽毫賦大人辛卯除夜姑蔑舟中客路行無盡終天恨轉深乾坤烏鳥淚風雨狖猿吟爆竹催殘臘梅花憶故林未能委溝壑聊慰北堂心送郭士龍送爾不能歌相看意若何離心寄雲水春夢隔關河草色晴尤媚鶯聲暖漸和梁間懸榻在莫惜數來過送葉廷藎我本倦逰者送君增苦顔潮聲螺女渡歸夢壺公山春色鶯啼外行程鳥道間所嗟璚樹逺何日更追攀病中得王少文詩山樓才信宿偃卧各經旬負此看花約蹉跎欲暮春詩從愁裡答神向夢中親誰復憐同病相思長苦辛哭張隱君先令云亡日君猶慟哭過芝焚方自嘆薤露忽成歌耆舊鄉中少交逰夢裏多因之動淒楚腸斷更如何與惟秦夜話因懷惟起客水西春宵何太短忽忽已三更燈散疏林影蛩傳古砌聲談深塵慮息坐久月華生為憶溪行者應含兩地情寒食日熙吉玉生惟秦振狂伯孺少文集緑玉齋佳節逢寒食孤齋聚德星談應同稷下會可比蘭亭粥煮楊花白尊浮竹葉青春光能有幾取醉莫教醒喜興公弟逰方廣嵓歸犬吠竹間扉逰山客乍歸杖頭嵐翠在衣上水簾飛路入羚羊谷舟停鷗鷺磯慚余多勝具此地却相違石嵩廢寺寺廢久無鐘禪關掩萬峰空廊惟卧虎棄鉢不歸龍墻塌埋殘碣苔深翳古松倘非樵子引那識往來蹤春暮送周喬卿忽驚春已去况復送君歸别意有如此前途花正飛蟬聲風外急山色雨中微後夜看明月相思獨掩扉送林宗大之玉田飛花滿驛亭送子出郊坰馬影雲邊見蟬聲雨後聽沙看兩岸白山到五峰青試向中宵望何人是客星送陳道育下第歸玉融憐汝復棄置歸尋海上山相逢俱落魄何以破愁顔古渡春流外孤城瘴霧間離心當此夜空對白雲間贈隱者東郊稱大隱耕鑿古風存水竹開三徑桃花自一村間心餘白髮生事寄青尊愛爾幽棲處依稀似鹿門贈漁者不作風塵客生涯寄釣綸江湖孤棹逺煙雨一竿貧鼓枻同漁父藏名比富春武陵溪尚在為我問迷津夢夢裏交歡者平生識面稀贈香疑賈女解珮似江妃錦水煙波濶巫山雲雨微蘧然驚醒處清淚滿羅衣江上送惟起弟别意孤帆逺行裝一劍貧何堪哀痛後復際此風塵旅館常懷母長途好愛身江干一杯酒相對總沾巾送髙廣文之蜀金粟臺前别征帆夕照催猿聲巫峽聽馬帳錦城開閩海風塵隔巴流日夜回此鄉多俊彥若箇子雲才蜀道難如此分攜思不窮秋風登劍閣夜月度蠶叢客路憑羸馬離心寄斷鴻講堂聞尚在好去繼文翁贈方伯書風塵初識面尊酒罄交歡人已如玄度才能逼建安青雲名不薄白雪和應難此别何時遇秋宵夢木蘭得舍弟吳中書汝别三旬久家書兩度看帆前江月逈馬首嶺雲殘路逺愁裝薄秋髙怯被寒孤身千里客若箇勸加餐贈性言上人多年坐沃洲此日伴師逰白社間中夢丹楓客裏秋浣衣江月冷扶杖嶺雲流欲證無生訣萍蹤不可留南朝四百寺師在幾招提法以蓮花悟詩將貝葉題遊蹤閩海曲歸興秣陵西相見即相别秋風惜解攜題徐氏池亭名園依北郭避俗此盤桓鶴迹留苔徑鶯聲滿藥欄池添春雨漲樓對暮山寒但得頻投轄相過意未闌桃源何處所此地即仙家林密藏春靄樓虛納晚霞輕風三徑竹微月一庭花晏坐塵心逺寒塘獨聽蛙懷惟起弟逺客憐吾弟離愁有阿兄久無鴻雁信空聽鶺鴒聲嵗月三秋晚寒溫兩地情山齋長寂寞日日計歸程碧山菴逢亮上人清溪帶逺山曲徑入松關客以參禪至僧當乞食還一瓢秋色淡孤磬夕陽間别去仍回首禪房雲氣間送李驛使之官雷陽驅馬將何適微官傍海涯公庭饒蜃氣墟落半蠻家路指羊城入山鄰象郡賖地偏少束帶髙枕咏皇華過挹翠亭精舍祗園近翛然逺市喧山光隔竹少月色傍花繁松影搖虛閣蘿隂翳短垣小舠時可泛倣佛武陵源九日大風雨與黃道晦陳惟秦飲屋後小山九日忽風雨登髙事已非秋聲繁灌木商意薄輕衣衆壑浮青靄千峰失翠微小山培塿甚吟眺亦忘歸得朗公詩却寄真僧雖出世蹤迹尚人羣妙法登壇演名香入定焚樓含孤嶂月衲挂半溪雲千里封題寄新詩過所聞哭林文烈十載神交舊年來倍憶君每疑音問濶誰謂死生分識面真無日浮生總似雲難將知己淚一灑故人墳相違三百里消息太茫然對月思玄度披圖憶輞川訃來當此日死去自何年墓木今成拱才歌薤露篇得寧夏消息叛卒雄心舊元戎血刃新中原多戍壘邊郡半征塵時事何旁午吾生實不辰願聞烽火息老作太平人亂離猶未定百姓夜虛驚官府勾丁壯鄉閭練甲兵笳聲吹隴水殺氣暗邊城不識書生輩何人敢請纓至日對客葭管灰初動殘花滿故籬誰知開徑日正是閉關時短晷閨中線生涯鏡裏絲相逢聊一醉莫問歲華馳渡峴江訪林熙吉江路當殘雪斜陽滿客衣林疏村店出浪急釣船稀逺嶼臨流斷罡風到岸微炊煙看漸近何處是漁磯青山兩岸濶一葉度空江呌雁雲中獨浮鷗浪裏雙霜花飄野渡水氣拍船窗漁唱來前浦隨風自有腔旗山勾漏洞溪山何逶邐數里入鴻濛斜日猿聲外殘雲鳥道中亂峰諸洞隱萬竹一泉通趺坐松間石塵心覺盡空丹成不記年古洞白雲邊衆水爭趨壑孤峰欲接天路危逢亂石山盡見平田日暮休歸去還期遇葛仙葛仙何處去勾漏訪遺蹤陟巘齊攀竹聽泉獨倚松石牀荒蘚合丹竈薄雲封轉入深林外前山又一重仙都在人境一步一嵓巒怪石各有態修篁難計竿松煙燒處暖蘿磴坐來寒别去仍回首餘生幾度看瀨下晚泛一水平如鏡西風晚度時茅茨燃鬼火榛莽翳神祠潮勢衝溪盡峰形過瀨竒山川勞應接進艇不嫌遲登岸蘭若知何處躋攀尚數程逢沙愁瀨淺登岸得舟輕古石莓苔色空林猿鳥聲除將樵採者更有幾人行山行修竹夾籃輿嵐光欲染裾小橋流水急古路凍雲疏村屋乘冬結山田隔嵗鋤空林聞犬吠不異武陵居放船孤舟回亂石流水響潺湲漁網蒹葭外人煙竹柏間斷雲迷晚渚殘照下秋山逺寺昏鐘起樵歌出谷還贈潮上人真僧住洞天苦行已多年説法苔衣上安禪瀑布邊瓢餐千澗月衲挂半林煙夜靜諸緣息跏趺久不眠贈波上人隨師居淨土禮佛向空門夜半磬猶擊旬中髮幾髠蒲團同鶴睡貝葉借猿翻壁挂袈裟濕因過雪裏村别方廣巖靈境探應遍言尋舊路歸殷勤記嵓石惆悵别林扉出洞寺全隱下山泉漸微行行頻矯首人世到來稀春日曉起山色猶含暝柴門逐曉開流星墜髙栁濕霧隱殘梅出谷鶯聲冷巢林鶴夢回無緣獨吟眺春意滿莓苔送鄭承武之東魯送君當此去匹馬向東阿夜淚燈前盡春愁夢裏多亂雲過泗水斜日下黃河雖有逺逰興能無思薜蘿惜别意何長鶯聲滿夕陽殘碑問鄒嶧遺殿弔靈光下馬多新店逢人少故鄉歸期須及早莫待寄衣裳晚至石竹山尋真當薄暮暝色滿松關絶壁猿聲斷遙空鶴影還雲邊春草路天際夕陽山應識仙都近鐘聲杳靄間月夜度石梁登摘星臺四野蒼煙暝千峰夕照催踏茲明月影獨上摘星臺山自鴻濛剖人從鳥道來石梁稱險絶不用説天台贈岩上人昔住毗盧殿今居石竹山春雲禪衲暖夜月梵鐘間香積供狙飯禪房倩鶴關平生愛空寂相對欲忘還石竺山遲陳道育不至正苦經年别終違數里程談應虛玉麈夢已斷瑶笙報客空勞鶴懷人獨聽鶯一燈松影裏吟卧若為情讀顧道行先生碑刻使者登攀處春風又幾年詩留孤嶂裏人老五湖邊屐齒埋荒蘚碑稜隱斷煙摩崖愜幽賞惆悵隔山川東郊晚行出郭髙舂後郊原起夕陰山山曳殘雨步步響新禽老樹莓苔厚空林紫翠深招提何處所雲際有鐘音湧泉廢寺古寺荒涼久淒然感廢興殘灰六十載破衲兩三僧黠鼠據香積妖狐吹佛燈黃金重布地不識有誰能淨室已丘墟荆榛久未除空山樵子路前代梵王居石柱頺殘後金身煨燼餘披雲尋故址一步一躊躇喝水岩贈瓢菴頭陀何年此卓錫鐘磬度昏朝瀑水引歸鉢茅菴結似瓢躡雲雙草屫坐月一團焦隔寺有禪侣相尋不憚遙靈源洞懷振狂在杭南郭人何處東山屐已非春風憶苕水夜月夢蘆磯以我招尋慣如君同調稀摩挲舊題刻空見白雲飛擬送僧歸日本逺指扶桑外龍宫是紺園慈航尋海舶晨磬待朝暾已悟西方教漸通中國言懸知無佛處師去定稱尊遙天迷去住但看指南車重譯同歸舶陽侯護法書颶風心自定海怪呪堪除此去無禪侣應尋絶島居歸程兼晝夜天水共微茫但指日出處此中吾故鄉皈依多獦獠供養有夷王遙想珠龕下常焚異國香别去上星槎滄溟道路賖夷音宜呪唄左袵自袈裟演法從天竺傳燈到海涯不知千劫裏何劫到中華病僧苦厄那能度醫王亦抱疴苔侵雙屐濕塵翳一瓢多錫杖頻扶手金剛為伏魔跏趺在禪榻或恐是維摩聞鐘苦夜長形影自淒涼懴悔除前障呻吟檢古方坐非同面壁卧豈倦津梁氣運有時盡千花塔裏藏集鄭氏烏石别墅衆山環曲徑亂竹掩衡門塔影雲中寺人煙郭外村新蟬喧白晝歸鳥報黃昏此地清幽甚依稀似習園雖是居城市却無城市喧僧歸殘雨寺樵度隔雲村花落鳥聲歇草多螢火繁斜陽人散後留鶴守柴門法雲寺對月空界雲隂斂祗園月色澄光生初動磬影送未歸僧入水悟禪意照林疑佛燈更闌縱吟眺衣上露華凝挽陳太學龍駕南巡日何人批逆鱗誰知伏闕者却是布衣臣抗疏青雲薄憂時白髮新至今遺廟在蘋藻自千春欲回江漢輦痛哭叩重閽死諫孤臣節生還聖主恩青山藏疏草白日照忠魂寂寞荒墳上西風啼暮猿樹下禪僧跏趺依古樹偃息對峰隂草屩莓苔濕麻衣煙靄深猿啼知定性葉落見禪心明日隨緣去逰蹤何處尋老樹不知年無言息樹邊著頭多雀穢遍體有蝸涎木葉寒時佩花裀定後眠月中行客過疑是野狐禪過鄭吏部墓荒墳不計年過客淚潸然朽骨藏於此吟魂何處邊野狐啼暮雨石馬卧秋煙安得斯人起重令大雅傳西郭冢纍纍經過下馬誰先生一抔土詞客百年悲藤護將崩石苔封未斷碑應知靈爽在歎我不同時贈史使君風流史使君三載竹符分吏舍積青草公庭生白雲山城有絃誦瘴海無妖氛父老關門送不持錢一文一麾初出守三十已専城露冕諸侯貴攀轅百姓情俸貧難養鶴庭靜但聞鶯試看長溪水惟君能共清贈黃生懋政憐君湖海客寄迹少年場音律周公瑾丹青顧長康俠常彈短劍貧不厭空囊名姓應難問多於酒肆藏過鄭君大白雲莊何處辨山家輕雲處處遮亂峰圍拱木一徑入梅花草榻依林設柴門逐水斜主人無所事杯酒送年華晚泊七里灘寒雲生近浦落日滿前汀旅夢驚潮破漁歌過瀨停一竿秋水碧孤棹晚山青向夕推篷望中天見客星山中古廟山深香火微廟宇冷斜暉壁古龍蛇暗厨荒鼠雀飢歲時村婦拜水旱土人祈簫鼓田間過知為祭賽歸一路人煙絶空山見古壇鼎存周款識像塑漢衣冠鳥迹殘碑篆虬枝老樹蟠可憐年代久風雨廟門寒古廟白雲邊神粧尚儼然靈應山鬼託龕任野狐眠開創知何代銷沉不計年居民流竄盡纍嵗斷香煙元直秀才觀微上人過宿風流看許掾定慧得支公白社當年結清言此夕同亂蛩吟竹塢一犬吠花叢相對殘燈下能令塵慮空送瀚上人逰越師行無定蹤此去路千重投宿月中寺經過雪裏峰間身臨水衲禪意隔潮鐘明歲西湖上相尋九里松雖云遊浙水未必浙中逰遇客皆為侣逢山便可留獨行半風雪一别幾春秋所惜談詩夜從今少惠休真僧欲度世豈肯倦津梁白足他山月緇衣滿路霜一燈傳異代六祖是同鄉此去逢行腳新詩好寄將得談比部寄先永寧書感而賦答淒風生敝廬忽枉故人書不復知存沒猶然問起居一緘千里外雙淚幾年餘孔李通家舊毋令魚雁疏送危博士之官馬平茫茫江水濶相送片帆孤炎海川途逺蠻天氣候殊瘴煙發青草雲樹黯蒼梧想到談經日三鱣墜有無送陸畫師還錢塘客懷當暮冬去矣不從容草屩千峰雪柴門九里松貧惟安豹隱老任笑龍鍾為問經行處雲山貌幾重峬山看梅過曾文表墓一路盡氤氲看花倍憶君白楊知己淚宿草故人墳樹影含殘照猿聲哭暮雲淒涼身後事地下可能聞送楊太學之金陵勞歌動别筵酒散各雲天折栁當春暮看花正少年鶯聲孤店月草色六朝煙無限懷人意金陵何處邊故黎平太守袁公挽歌永别城中路新成郭外墳旐題前太守書失右將軍廣栁驅殘月甘棠翳暮雲應知千載後不朽是遺文誰知五馬客竟作九原人出郭有魂氣還家惟影神墓中難待曉地下不行春斯世無同調悲歌淚滿巾白馬出關門愁聞鼓吹喧山靈收正氣月色引歸魂貴至二千石書餘幾萬言翩翩丹旐過猶訝轉朱轓赤紱人何處青山骨可藏鄉鄰悲道路父老泣蠻方圖史虛東壁松楸冷北邙明君思起草猶問祕書郎林伯儀自金陵還莆過訪話别為客經淮楚歸途訪索居雲山一騎逺煙栁六朝疏問路知鄉近還家及歲除陸生裝薄甚惟有一囊書癸巳除夕又見韶華換空為老大悲齒添新歲厯酒祭一年詩流落憂前路歡娛憶少時生憎簫管惡苦向隔鄰吹送鄧汝髙進士還朝獻歲赴王程全家向北平斷氷淮口渡殘雪薊門城煙栁迷征蓋風花引使旌長安春色好莫起故園情栁色催離况椒花戀别筵夢繁人去後春到客行先挂席河通楚驅車路向燕相思明月夜惆悵隔山川逰通谷洞小徑斜通谷躋攀及晚晴草荒尋鳥道磴險作蛇行暮色千峰合春流一鏡平石間舊題刻半是紫苔生登烏石山絶巘分青靄髙臺接絳霄鐘聲多近寺墨迹半前朝徑小疑藏洞山窮忽遇橋憑欄時縱目滄海望中遙同微師至面壁洞竹徑雲隂亂松門夜色虛佛多同客禮洞半借僧居幡動風來後鐘殘月上初何須别栖隱此地即吾廬題惟揚弟法雲寺書舍誰知菩薩界亦有子雲居厨趂僧炊後膏分佛照餘窗窺施食鳥笥竄蠧經魚方衲時相叩秖應來借書絶粒僧苦行凡心絶休糧道氣清齋惟供弟子食不乞王城已覺形骸幻能令香味輕雲逰經處處不用載瓢行送顔廷愈將軍料兵海壇山少年初建節走馬向孤城蜃氣雲中市狼煙海上營曉霜明雪戟夜月捲霓旌幕府防秋急看君獨請纓同微公元直興公弟至鼓山看山俗慮清况復與僧行徑密草交色林回鳥換聲披雲孤衲重挂月一瓢輕不用憂迷路燈光見化城鼓山寺空門有夙因歲歲往來頻方丈墨猶濕祇園花又新佛應憐熟客山但借間人不分居城市紅塵老此身靈源洞與微公賦洞藏青嶂裏路出白雲層苔色侵禪榻松隂暗佛燈樹撑危石墜藤束古崖崩不用尋僧語同逰自有僧趙用拙招逰白雲洞迷路而返却寄古洞知何處山僧路亦迷行來千嶂外猶隔數峰西徑險猿難度林深鳥自啼漁郎真夢境浪説武陵溪喜果慧禪師見訪多年居古洞偶爾到王城老益禪心定貧諳世諦輕空猶嫌有相火久斷無明再拜求真偈流傳度衆生贈趙用拙居士留髮不披緇行藏衆所疑慧因聞道早壯悔出家遲果以今生滿僧應夙世為懸知他日遇改却舊鬚眉問伯孺病時事已如此看君轉自愁不堪燃桂苦况抱采薪憂藥以何錢買糧應幾日休妻兒皮骨在相向淚交流贈張少府戀越終辭楚幽栖似鹿門煙霞長作侶車馬不聞喧世事惟髙枕生涯只灌園自耽泉石趣豈是學桃源黑髮棄軒冕歸耕南畝田不飛雲外舄時挂杖頭錢野性耽丘壑幽居逺市㕓中峰髙隱處長抱白雲眠幔亭集卷五
