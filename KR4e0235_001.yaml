body:
  text: 幔亭集巻一明徐熥撰古樂府飛龍篇海上三神山中為僊人居金樓髙崔嵬玉堂結綺疏朝乗飛龍去翱翔登鼎湖騁風周八極飄飄凌紫虚安期同遨逰八公相為徒看日扶桑巔采藥崑崙區桑田有變遷人世多榮枯安得乞靈藥蜕此凡濁軀一朝生毛羽白日昇天衢秋風辭秋風搖落兮草木變衰白雲繚繞兮鴻鴈聲悲蘭為佩兮芙蓉為裳彼君子兮天一方鼓桂櫂兮度橫塘明星爛兮露為霜歌聲沸兮夜未央誓與君兮永不忘人生歡㑹兮安可常悲愁歌我之生兮在深宫嗟薄命兮事逺戎烏孫老兮語不通征塵起兮多悲風望故土兮心忡忡羡黃鵠兮淚無窮戰城南戰城南死城北枯骨纍纍棄路側為我謂烏逰魂不歸臭腐將焉用飼汝安足悲隂雲漠漠寒雨瀟瀟黃昏古城下新鬼聲號咷陽九厄戰城南空褁革七尺㣲軀我不惜老死蓬蒿竟何益願為忠臣忠臣誠可為茫茫穹廬掩骼為誰落葉哀蟬曲西風兮吹襟蟬聲兮滿林古砌静而葉落淒然感乎予心憶美人於閨房兮方歛袂而沉吟野田黃雀行朝來歩野田田中有黃雀翩翩飛且鳴飲啄亦自若何期俠少年遽爾加矰繳置之樊籠中縶以黃金絡㣲物有至性安能事束縛悲鳴念故羣所志在林薄感此宗廟犧嘆彼華亭鶴何如辭網羅髙翔在寥廓飲馬長城窟行飲馬長城窟水深沒馬腹朝發祈連山暮宿太原谷男兒事格鬬安能諱殺戮昨日新戰敗死者什五六殘血吹腥風屍骸路相續身死自不悲所痛在骨肉嗟哉杞梁妻哀哀城下哭銅雀妓日暮西陵望但見蒿與萊悲風起四野歌舞有餘哀漳河流不返繐帳空塵埃荒臺久寂寞雄圖安在哉羽林郎昔有羽林郎持㦸出未央揮鞭過酒肆招搖都市傍酒家女二八顔色耀春芳黃金為條脱白玉為耳璫越羅裁中裙齊紈製下裳服飾既璀璨膏沐尤馨香不意冶逰子停驂登我堂銀鞍耀紅日韎韐何輝煌提壺索美酒岸幘據胡床金刀膾鮮鯉烈火炮羔羊酒盡出門去嬋媛結𠂻腸已去復再返解贈紫羅囊君心一何苦君情一何長婦人貴逺别持此非所當還君紫羅囊妾非青樓倡車遙遙車輪何遙遙出門不顧返輪豈不能廻君心自難輓聽此轔轔聲一聲一以逺看此兩行轍能令歡愛斷如何馭者手不肯須㬰緩敢望君心回但願車輪爛門有車馬客行門有車馬客來從故鄉陌乍見雖可懽道舊反不懌試問舊親賔存亡異疇昔别時諸兒童于今皆半百今時諸壯夫多非故相識舊人居新墳新人居舊宅里社既荒凉市朝多變易纍纍丘壠間鬱鬱生松栢離别纔幾時光隂如此廹静言思故鄉含情淚沾臆白馬篇誰家冶逰子捐軀事戎行白馬黃金羈驅馳赴朔方兠鍪既焜燿寶劍生光芒良弓懸韎韐激矢藏縹囊仰天射鳬雁俯身射豺狼膂力已絶世捷黠誰能當邊風方慘冽壯士臨風僵躍馬入重圍生擒左賢王丈夫思報國安肯思故鄉裹屍誠所願毋然悲死傷君馬黃君馬黃臣馬赤君馬馳驅臣馬辟易君馬登天閑臣馬伏槽櫪二馬同行一馬太息臨髙臺臨髙臺望故鄉下有流水流湯湯羣草委腓萬木黃翩翩南雁來廻翔攬衣起徬徨美人不見兮斷我𠂻腸怨歌行當時匣中銅于今翳塵土當時篋中絲于今無寸縷磨鏡休使光繰絲休使長鏡光驚貌換絲長嫌緒亂對鏡與治絲兩者俱腸斷江南弄氷肌皓魄紅羅襦鬱金裙帶懸流蘇蓮舟蕩漾臨澄湖臨澄湖連臂歌歡不來將奈何龍笛曲于闐玉管流哀音餘音寥亮水龍吟調繁指弱憂思深憂思深涕汍瀾懷逺道催清顔採蓮曲蘭舟容與過橫塘步搖驚起雙鴛鴦羅裙帶濕生濃香生濃香紅汗滴坐中流奏龍笛逰女曲羅衣半褪飄金縷約束纎腰五雜組日暮採芳臨洛浦臨洛浦鮮明珠望交甫心踟蹰朝雲曲朝雲日日陽臺上晻曖迷茫開綺帳襄王一去勞相望勞相望夢難醒湘水緑湘山青鳳笙曲纎指按節玉參差櫻唇緩吸聲遲遲吹儂無限心中悲心中悲望逺情何時吹雙鳳鳴春日白紵曲辛夷半落桃花開金羈寶瑟上春臺佳人倦倚闌干曲兩兩黃鶯飛相逐夏日白紵曲緑池風來菡萏香臨流照影見妍妝隔花忽聽郎歌調自取齊紈障巧笑秋日白紵曲庭槐初落秋氣深月中玉腕𢷬清碪東家倡婦恣行樂酒闌更説羅衣薄冬日白紵曲玉肌起粟寒相侵金壺美酒對君斟麝蘭香氣羅衾滿夜長轉覺氍毹煖烏栖曲髙樓四面栽楊栁白馬驪珂蹔回首玉壺美酒任君沽妾身十五已當壚㣲滅銀燈隔重幔宛轉嬌聲恣啼喚不辭今夕盡風流只愁明日見君羞帳中弱態含嬌嫵一夜為雲更為雨汝南雞啼天未明與君還盡片時情月銜半嶺燈將滅羅衫掩淚送君别入門獨自剔殘燈尋思無限夜來情塞上曲將軍出北平匈奴爭遁走皷振天地昏令出風雷吼邊霜裂旌旗塞月寒刁斗繫俘受降城屯兵井陘口歸來見至尊自獻單于首白頭吟貌如雨中花節似霜中栢貌改節不移别君意悽惻一解妾心如女蘿君情如飛絮蘿生空纒綿絮飛何處去二解嫁君當紅顔辭君當白首請君看鏡中雙鬢何如舊三解死樹難再榮死灰難再熱寄語新懽人莫遣頭如雪四解含悲下中堂此情空脉脉君心能再回白頭應再黒五解𢷬衣篇皎月入房帷凉風吹衣襟逰子逺行役少婦鳴清碪良夜既以永懷人益以深孤鴻唳天際促織吟堂隂余亦别家久涕泣不能禁妾薄命南國有佳人容華世莫比嫁與東隣兒願言結生死良人輕别離匆匆辭故里朝醉閶闔門暮宿長安市新愛移平生恩情付流水欲促逺人歸裁書寄雙鯉遺之同心結兼以合歡被人匪金石堅容顔何足恃天涯君不歸河清難再俟有所思徙倚向花叢羅衣濕清露烏鵲隠茂林寒蟬抱髙樹焚香理素琴聊以抒心愫美人期不來中宵淚如注月色滿花隂花隂空竚立何以贈所驩悲歌聊當泣啾啾階蛩吟喔喔隣雞急幽會杳無期空令長太息幔亭集卷一
