body:
  text: 幔亭集卷九明徐熥撰七言律詩丙申元日得惟起弟越中書聞王玉生客苕消息因柬錢叔達清尊何意醉流霞覽鏡空驚鬢易華階下蓂開新歲葉隴頭梅寄隔年花人逢老去常懷舊客到春來定憶家此日交遊多失路豈君蹤跡獨天涯送翁兆震太史冊封周藩事竣還朝暫綴鵷班馬首東桃花色借錦袍紅鞭揮上苑三眠柳圭捧深宫半葉桐飛蓋兔園歌夜雪鳴珂燕市動春風漢家金匱資良史好奏諸儒白虎通送張宗道之金陵兼懷諸舊游茫茫烟水片帆輕學得陶朱變姓名芳草樓臺歌子夜梨花村店過清明莫愁湖送當年槳瓜步江流六代聲欲作封題還自懶知君今去石頭城屠田叔使君枉過兼惠藏書賦謝藝苑相聞十載餘應知名下定無虛不拘世路尋常禮還贈人間未有書草澤敢當髙士榻蓬門終礙使君車自慚巴曲非同調空枉干旄問索居送陳汝翔客建溪書林垂老江湖作校書春風長日掩衡廬經收壞壁驅殘蠧字出名山辨魯魚著述未忘𤣥晏癖往來多是鄴侯居不須二酉藏遺草九曲仙都當石渠寄題郭張虛香雪齊髙齊遙散白氤氲歷亂梅花到處聞一笛殘魂千樹雪半窗疏影滿林雲寒生姑射仙人夢香借孤山處士墳何物江南堪寄逺年年春色倍思君鄭邦衡以書見貽兼惠玉章詩扇賦此答贈相憐不必舊相歡忽枉裁書問考槃投贈一雙皆楚璧留題五字有齊紈琴尊幾日同花竹魂夢中宵到木蘭年少聲名君籍甚淺才何敢作衙官花朝社集送佘宗漢明府之南康訪楊使君滿路流鶯送客軺匡廬山色望中遙朱門何處堪糊口白髮逢人反折腰月下歌聲虛竹徑天涯離恨記花朝知君此去經彭澤陶令髙風未寂寥送了空禪師歸長干寺是日為觀音大士初度尋聲疑自普陀來又贈楊枝海上回緇衲折蘆初地去白衣成果普門開數千里路看飛錫五十三參送善財他日懷師勞逺夢棲霞蘭若雨花臺分得要離塜送陳伯孺之姑蘇漆燈明滅半無光斷碣凋殘字幾行黃土一抔封馬鬛紫苔三寸鏽魚腸月中似聽英魂泣地下難埋俠骨香况與伯鸞丘壠近煩君并為薦椒漿再送陳伯孺兼柬在杭尊前酒盡即他鄉豈為分携始斷腸失路客身輕似葉倚門親鬢白於霜歸裝不望中人産內顧先營百日糧未必綈袍能解贈臨行還囑寄衣裳天涯休用歎窮愁得稱閒心是浪游湖上翠蛾三竺寺月中青雀百花洲囊無重載身何纍交有深知刺易投貧賤依人君莫愧布衣誰不謁諸侯送陳振狂游玉華酒酣璚液唱游仙萬樹桃花引去船路繞潺湲千澗水巖開混沌五更天雲根白積峰頭雪松火青飛洞裡烟采藥倘逢秦代客莫言人世是何年懷吳元瀚總是飄零未定身不知吳楚與燕秦逺天夜雨孤舟冷古道秋風一劔貧到處南冠羞對客誰家西第肯留賔薄游只恐無歸計跡落江湖又幾春贈薛君佐秀才年少詞華舊有聲髙標應比玉壺清一春草向池中夢五色花從筆裡生座滿烟霞揮麈尾匣騰風雨泣龍精青雲自是君家業傲世休耽白社名寒食日陳汝大園亭看海棠寒食東風到舞筵海棠開遍艷陽天銀罌杏酪香同飽畫架榴裙血並鮮帶雨花神嬌欲泣怯寒妃子醉無眠夜深莫更移燈看今日山厨未有煙春日同叔達汝大惟秦幼孺粹夫能始興公集無競南郊水亭布榖聲中醉倚欄夕陽山色隔簾看青團柳葉春烟薄白散梨花暮雨寒燕壘泥香芳徑晚魚梁痕淺小池乾只因地僻稀來往門外低枝欲礙冠病中試鼓山寺僧所惠新茶偃卧山窗日正長老僧分贈茗盈筐燒殘榾柮偏多味沸出松濤更覺香火候已周開鼎器病魔初伏有旗槍隔林况聽鶯聲好移向荼䕷架下嘗鍾山寺訪張孺願留酌話舊客中尊酒暫淹留共對禪燈憶舊遊此日聽鶯蕭寺雨當年騎馬秣陵秋風塵未肯容衰鬢歲月何堪老敝裘獨有劔鋒銷不盡君家神物是吳鈎邀黃仲髙張孺願錢叔達張公魯陳汝大陳汝翔陳惟秦王玉生陳幼孺王粹夫顔廷愈曹能始興公弟雨中集萬歲寺即席送徐仲和歸錢唐共酌醍醐送客還晚風吹雨暗禪關緑波春草長途别白社蓮花半日閒家望雷峰烟外塔夢回天竺月中山淨瓶分得楊枝贈垂柳臨岐不用攀送黃仲髙之漳州送君南去瘴雲邊遙望征途路一千五月楓亭扶荔雨幾村茅店刺桐烟土音未辨難聞曲海錯常供不費錢少婦當壚堪買醉時時停䇿酒家眠送曹二進士之金溪弔周明府千里分襟悵别離西州雙淚數年悲途中磨鏡同徐稚匣裡亡琴痛子期楚璞謾云增價早隋珠猶悔報恩遲九原未必無遺恨不見看花上苑時賦得廣陵濤送客之維揚萬馬聲喧不暫停滿天風浪晝冥冥遙連鐵甕千層白微露金焦兩㸃青吳楚山河分一水齊梁烟月付中泠傷心莫作蕪城賦好辨江干瘞鶴銘同屠田叔張孺願錢叔達張公魯及社中諸子集陳正夫水亭分得文字習池花木翠氤氲忽枉髙軒過使君囊裡詩籖拈五字尊前樂府演雙文杯傾竹葉春頻醉燭燼蘭膏夜已分地主獨留髠送客猶餘絲管夢中聞不寐感懷杜宇啼殘漏正長滿林斜月到匡牀浮生寤寐皆成夢舊事悲歡總可傷知己未亡琴廢軫雄心猶在劔銷芒枕前二十餘年淚半在他鄉半故鄉聞伯孺由吳興入姑蘇遙有此寄一劔飄零渡五湖半年蹤跡遍三吳苕溪日暮愁心逺笠澤天長客夢孤舊隱雲深寒薜荔他鄉春盡變蘼蕪滿船載得烏程酒曽酹要離墓上無再懷伯孺登樓一望意凄凄目極遙空白練低匹馬烟花吳苑曲孤舟風雨太湖西愁中芳草迷三徑别後垂楊暗六溪千里懷人多感慨每看南鴈憶封題柬程子暉求友空歌伐木聲逢君真見古人情跡因避世青山近心為憂時白髮生倚杖暮雲花徑逺捲簾春雨荔隂清除將問道尋師外那得龎公肯入城七夕鄧汝髙民部招集玉皇閣同佘宗漢謝修之明府鄧道鳴閫帥錢叔達王粹夫山人陳汝大康元龍袁無競秀才陳幼孺孝亷興公舍弟賦分得五歌髙閣開尊對薜蘿風吹零露下庭柯三秋白帝司權早一夕紅妝乞巧多夜杼暫停機上錦凉衣初試篋中羅少微歷歷干天象不獨雙星夜渡河鄧道鳴閫帥招集鄰霄臺送鄧汝髙計部還朝三疊驪歌繞翠微凉風初動葉初飛尊傾大將葡萄酒淚濕窮交薜荔衣自信青山盟尚在空憐白社客全稀清泠臺上頻回首目斷燕雲一鴈歸八月十四日夜招張孺願錢叔達謝修之陳汝大王玉生袁無競集平逺臺觀萬歲神光二塔燈分得八庚良夜髙臺露氣清遙空靈籟送秋聲桂枝先自輪中滿蓮炬還從鏡裡生隱隱七層標舍利雙雙百寶放光明龍膏燭與蟾蜍影同向人天照化城送張孺願還四明津亭歌罷酒杯空目極遙天送斷鴻馬上夕陽孤店柳渡頭殘月半林楓瘴雲漠漠辭閩北鄉樹重重辨甬東此日蓴鱸歸計得思家張翰怯秋風送黃仲髙還四明江頭尊酒别離難滿目疏林落葉丹家望剡川湖一曲車驅閩嶺路千盤關門曉色雞聲早曠野秋聲鴈影寒今夜夢君何處所半天殘月蓼花灘寄鄧德咸明府一代風流墨綬郎幾年為政似庚桑居官共號神明宰判事多成急就章灘送九龍來廨宇庭留雙鶴守琴牀春光莫羡河陽暖六月還飛白簡霜送陳振狂之汀州秋色將殘樹影稀故人西去鴈南飛滿林楓葉栟櫚寺兩岸蘆花鐵石磯霜冷戍樓喧暮柝月明村舍搗寒衣九龍溪上灘聲急千里羈魂一夜歸與吳元瀚話舊久客還家嘆敝裘對君猶自起離愁數莖白髮尊前淚九曲青山夢裡遊松徑夕陽秋繫馬竹房疏雨午啼鳩明朝又作匆匆别目斷西風獨倚樓張叔麟别駕招集鍾山客舍席上聽伎共限冷香二字白苧歌殘欲斷腸相逢誰是有心郎羅幃巫峽聲聲雨玉杵藍橋夜夜霜燭淚半灰金剪冷花魂初散寶叉香紅顔自昔多憔悴豈學愁眉别樣粧送鄧道鳴參戎東粵樓船橫海發閩關新擁髙牙五嶺間月滿柳營秋校獵火飛藤峽夜征蠻雙龍斬水妖精泣萬馬嘶風部曲閒名在羅浮峰四百功成何用勒燕山贈林敷毅公子年少懸書向國門家聲猶說紫薇垣登壇久已推牛耳授簡曽看擅兔園擁篲諸侯虛左席操觚詞客結中原功名不用垂鐘鼎白首江湖亦主恩送張參戎鎮秦川鐵衣曽典羽林兵又握銅符海上行此日八蠻傳露布同時諸將拜霓旌臂開鵲血弓流影腰泣龍魂劔有聲見說轅門容揖客可能前筯借書生送長樂令郁文叔謝病還晉陵棄官應遂白雲心行李空携單父琴病骨豈堪長負弩黑頭偏乞早投簪家當楊柳茶烟細門比柴桑柳色陰除却簿書勞半載一生清福總山林贈張太醫年少曽將肘後探髙名今已似蘇耽石烹夜月松烟細藥洗春泉橘井甘函裡難經翻九九洞中爐火轉三三功成他日生毛羽看駕雲車白鹿參題芳草王孫卷為羅生挽所知聨璧當年舊有聲千秋埋玉怨難平邯鄲久作炊粱夢都市猶傳擲果名腸斷山陽燈下笛魂銷緱嶺月中笙萋萋滿目王孫草歲歲春風墓上生丙申除夕莫問殘冬厯一行且將生計寄絲簧燒燈客丐宜春帖對鏡人凝綵勝妝衰鬢又添新歲感童心猶記少年場擁爐坐聽蓮花漏待進山厨柏葉觴丁酉元日歲月悠悠獨自知屠蘇飲較衆人遲一年苦樂俱陳迹昨日呻吟即舊詩才盡敢云心似錦顔衰猶幸鬢無絲春風不厭衡門冷吹遍繁花雪萬枝送彭興祖游燕都亭新柳折為鞭又别閩南北向燕馬首一星邊地火鶯聲三月御河烟吳儂枕上紅樓曲趙女壚頭緑酒錢此日離情君莫忘落花風雨寺門前分得胭脂井送陳淳夫太學之金陵胭脂零落井痕荒水面桃花照艷妝碧甃一泓沉寶珥紅泉千㸃滴銀牀金函半染鉛華色絲綆猶牽珠翠香莫問故宫生死地轆轤容易轉愁腸送陳志𤣥還中都一片離心雙淚垂人歸偏在送春時雞聲殘月郵亭火馬首疏烟酒店旗江北瓊花孤館夢淮南叢桂故園思東風吹遍無情柳滿路青青拂面絲送黃君甫還劍津故園歸去獨揚舲躑躅花殘落逺汀鸚武春銜杯裡月蛟龍宵睨劍頭星灘回巨浪千層白門對髙峰九㸃青莫道盈盈分一水相思魂斷幾長亭分得宫花一萬樹送曹能始進士赴闕芳菲叢裡拜楓宸鈴索聲中雨露新香霧有時分太極穠華隨處拂勾陳重重緑染宫袍色片片紅酣御輦塵不似曲江騎馬日杏林惟探一枝春分得季子裘送錢叔達歸吳興旅邸淹留歷幾春黑貂無復到來新蒙茸莫問千金腋襤褸翻疑百結鶉失路易沾函谷雨還家猶染洛陽塵布衣落魄慙妻嫂應悔當年浪入秦題黃伯寵秀才歐冶山房疏松影裡草𤣥亭屋後羣峰列翠屏殘雨小塘萍散緑微風幽徑竹搖青觴尋曲水流三月劍拔寒潭洗七星寂寂衡門無客到林鶯啼午夢初醒夏日邀屠田叔使君佘宗漢明府閔壽卿柳陳父王獻子錢叔達吳元瀚諸山人顔廷愈都護興公舍弟避暑平逺堂分得一先韻借得琳宫結淨緣數聲鐘磬出諸天龍江潮滿千溪合雉堞雲開萬井連瀑布亂飛丹嶂雨山衣同歷翠微烟莫言座上無絲竹花外啼鶯柳外蟬壽車郡公銅虎分來向海濵玉皇香案記前身採將瑶草三山秀種得甘棠一郡春天上紫鸞扶絳節雲中白鹿駕朱輪壽筵不用蟠桃薦丹荔氷盤色正新題周朝寀轉運三代榮封冊出宰河陽舊有聲司農今復借雙旌轉輸歲向三邊急斥鹵烟從萬竈生紫禁絲綸榮馬鬛熙朝冠蓋擅羊城一門雨露皆君寵不獨雲霄兩弟兄閩王審知墓下作玉輦何年去不回霸圖千古總成灰秋深兔穴依寒壠歲久魚燈暗夜臺故國關河甌越在遺民蘋藻鼎湖哀蓮花峰下黃昏月猶見三郎白馬來送林志尹謁選之京時豫將入燕數聲南鴈呌秋烟路指交河北到天雞送邉城霜後角馬驚沙磧雪中鞭貧來逺道親雄劍老去長安索俸錢我已藏名燕市久相尋休向酒壚前送閔壽卿從武夷還金山兼隱華陽洞歷遍清溪九曲深麻衣隨意住雲林隂符一卷蛟龍護秋笛