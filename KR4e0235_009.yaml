子虛垂虹夜泊懷陳幼孺吳江殘露冷丹楓萬里還家嘆轉蓬世路升沉同塞馬鄉書寥落怨邉鴻舟移晚渡三更月橋跨秋波百丈虹猶憶當年分别處征衣憔悴泣西風姑蘇懷鄭翰卿十年蹤跡遍天涯散盡黃金滿狹斜莊舄豈能忘越國莫愁原自屬盧家孤鶯白嶽啼衰柳匹馬青樓過落花日暮思君心獨逺片帆江上阻蒹葭送張叔韜令羅浮瓊海曽乘博望槎惠陽為政又携家琴牀半落姑仙雪印匣全封葛令砂輸稅山農冠箬葉趂墟蠻女賣梅花官閒好作羅浮長四百峰中早放衙秋日訪徐茂吳司理青鬢投簪二十年菟裘髙築虎林偏胸吞雲夢全無楚屋貯華陽小有天楊柳影侵遊寺屐竹枝歌送泛湖船錢唐江上潮如馬定賦觀濤第幾篇西湖秋夜寄紫玉侍兒他鄉流落怨歸期天外秋風鴈去遲枕上雨聲燈下淚湖心山色鏡中眉難將雙楫迎桃葉愁聽孤舟唱竹枝遙憶瑣窗腸斷處殘更哀角夢回時錢唐感舊吳山殘黛晚烟低滿目桃花路又迷夜夜淚痕悲角枕年年幽恨閉香閨分枝菡萏難連理隔水鴛鴦暫並栖司馬琴心今漸老斷腸明月小樓西七里灘懷惟秦桐江風冷露華漙舟過嚴陵七里灘秋晚鴈聲楓外老夜深漁火蓼邉殘月明古渡波千頃雲暗髙峰路幾盤遙憶故人滄海上白頭猶自守綸竿過武夷訪閔壽卿蘧廬一宿而别兼柬渾然道人江仲魚秀才蘧廬髙結傍巖巒翠壁千重路幾灣霞色全飛丹竈火溪聲長繞白雲關風塵已作經年别烟水聊分一夜閒唱罷金雞天欲曉漁郎蹤跡又人間聞屠田叔轉運擢守辰州寄贈新駕朱輪驛路賒甘棠初種郡庭花三苖納欵沅陵地五馬行春楚水涯酉室名山探緑字辰溪深洞覔丹砂桃川正屬提封內試問秦人尚幾家送陳汝翔遊惠州馬蹄隨處認桄榔千里孤身入瘴鄉嶺路春聲啼翡翠蠻村秋色變蕉黃朝雲香骨纍纍土夜月花神淡淡妝莫向異方思故國夏初先得荔枝嘗為屠田叔悼亡姬渺渺凌波去絶蹤每看遺挂恨重重魂同睡蝶招難返血比啼鵑拭更濃黃土有情封玉骨青銅無計鑄花容君行正近髙唐路腸斷巫陽第幾峰一别妝樓閉寢門梨花風雨泣黃昏蚌枯滄海珠無淚魚葬青山玉不溫金谷尚傳三斛價羅幃空負十年恩春來忍看孤飛燕恐是嬌姬戀主魂自題小像平生非俠亦非儒半世游閒七尺軀却為疏狂因偃蹇未忘柔曼轉清癯違時傲骨貧猶長對客詩腸老漸枯五字吟成心獨苦不知身後得傳無展卷徒為老大悲形容將槁鬢將絲有時憤世空饒舌何處談詩不解頥足為無車行路健心因多纍記書遲自知瘦骨宜貧賤莫怨人間只相皮寄懷李惟順贊府巖邑蕭條早閉關翠屏髙映訟庭間官同潘縣栽花至客到龍門御李還衙聽孤鶯聲共放吏兼雙鶴影俱閒琴牀一曲停流水又對青娥畫逺山林子真久客臨汀聞余歸自長安貽書慰藉感而賦答經年離思杳難裁望斷江南雪後梅錦字忽傳孤鴈至明珠驚向九龍來雄心已耗劉蕡第死骨誰收郭隗臺總為窮愁才易盡豈堪重問筆花開送屠使君至芋江是夕留飲驛亭以梨園佐觴使君首倡依韻奉答追歡三載别今朝對酒離魂黯欲消楚國行春迎露冕郵亭卜夜駐星軺殘雞唱斷風生柝萬馬聲寒月送潮暫歇梨園留刻燭莫教紅蠟一時燒囦關再别屠使君次來韻使君才藻似枚臯立得詞壇赤幟髙薄俸半因開社費閒心多為著書勞年來淮桂歌招隱此去湘蘭賦反騷五馬驂驔人獨逺楚天遙望首空搔萬里沅陵楚水隈一麾今出越王臺當筵客盡留詩别卧轍人多掩淚回津泛神龍悲劍去峰過回鴈望書裁九疑漸近三山逺何處登臨屐再陪崇德令孫先生挽詩語溪為政號神君黑髮俄修地下文逺道野僧歌薤露寒宵山鬼哭松雲斗間久失郎官宿郭外新添令尹墳忽聽悲風生壠樹猶疑長嘯半空聞雲陽葛隱君雙壽詩句容元說葛洪家配得仙姬蕚緑華幾度化龍陂上竹尋常喂鶴鼎中砂笙吹緱嶺聲聲月衣剪茅山片片霞待到丹成同拔宅遙空雙駕紫鸞車戊戌除夕獨對殘燈暗自驚世途誰復念虛名索錢有虜詩難退祀竈無靈術未精半壁圖書先代業四鄰歌管少年情二毛豈必緣衰老只恐窮愁白易生辦得椒盤槖已虛殘年衣褐歎全無先人墨綬空亷吏賤子青衫只腐儒自祭詩神斟柏葉欲驅窮鬼挂桃符燈前不改貧家樂堂上慈顔膝下雛己亥元日開遍梅花臘盡歸聲聲爆竹啓山扉去年愁苦將誰告今歲平安向佛祈三徑烟霞吾獨老六街風雨客來稀朱門通刺慵隨例自古閒身是布衣燈燭燒殘見曙光傷情多為惜年芳無田更切三時望有閏翻添一月忙已分狂歌惟草澤喜占春夢在池塘生憎稚子吹蘆管落盡梅花樹樹香同幼孺惟起由瓊河泛舟至義溪寒風微雨共揚舲無數漁歌竹外聽浦口小洲懸半月海門孤塔湧羅星洪濤斂勢奔歸峽衆水分流散入汀三十六灣溪路轉一灣山色一重青送林道魯就婚之楚婦翁王獻父時為吉藩左相二月春風咏摽梅征衣還見錦初裁舟經劍浦乘龍去路入衡陽捧鴈來卺合賢王新賜醴鏡開神女舊妝臺兔園正授枚生簡年少誰當作賦才山居漫興學晚唐野服黃冠絶世情小齊無客罷逢迎蜂窠衙靜如山縣蟻穴泥深似土城雨久芭蕉心半捲春遲楊柳眼初生只緣編得花屏好每日沿階幾度行送朝宗上人還金山天涯行腳偶相逢又向空門憶舊松千里月嘶春澗馬半江雲起曉堂龍臨流獨浣歸山衲禮佛重鳴到寺鐘聞說慈航堪度世幾時禪榻待周顒送陳道育之官漢陽萬里傳經入楚鄉新鶯初囀柳絲長氊存子敬官非冷輿御潘郎母可將山色千重看大别江流九泒過潯陽座間定有三鱣墜地近嘉魚對武昌贈呼允齡將軍黃金橫帶氣如虹儒雅還看郤縠同魚鳥陳開雲變黑鯨鯢血濺海生紅肘懸幕府新雕印手掛天山舊賜弓注就隂符刁斗急夜深燈照柳營中錢連江尊人雙壽詩宿應郎官接上台嵗星還傍婺星開丹燒勾漏霞干片酒進麻姑露一杯琪草祗從階下長蟠桃都向縣中栽承家自有關門尹日日真人紫氣來送蘇明府擢南計曹雞舌新含入舊都幾時閩海更還珠中牟理邑方馴雉南部趨朝好聽烏百里歌猶傳蔽芾一官清不愧萊蕪度支若上籌邉䇿願賜江南一半租送張宗道之白下春風頻聽白門鴉匹馬驕嘶踏杏花匣貯豐城埋後劍帆開博望泛時槎梁間玳瑁尋盧女井角胭脂弔麗華夜泊秦淮重買醉隔江依舊月籠沙金山持心上人以造塔募緣入閩喜而有贈錫杖年來遍五湖津梁隨處度凡夫寶沉漢水思龎藴金布祗園問給孤七級月中光舍利諸天雲裡湧浮圖當時玉帶今何所猶自逢人說大蘇上楊叔向參知清朝騷雅見遺音愛士常懷倒屣心太史文章髙倚馬右軍書法得來禽家饒美竹堪為箭㸑有焦桐解辨琴行部時時過劍水匣中風雨作龍吟贈陸延平髙卧東山嵗月深南來五馬又駸駸民淳市賣雷生劍官久囊空陸賈金頻見弓旌求草澤常看車駕舍棠隂玉華有石還堪載不愧君家舊鬱林延津逢許然明還武林詩以送之相逢同是客中身雙劍延津合有神滿樹流鶯啼去路千山羸馬送歸人梨關月冷他鄉夢柳浪烟深故里春訂得西湖湖上約六橋何處問垂綸送陳二表兄重遊髙州兼柬諸舊好燈前愁賦渭城歌瘴雨蠻烟萬里歌市得好香沉水貴劈來新荔火山多古祠重拜髙凉洗遺殿還尋粵尉陀往事悠悠三十載舊遊雙鬢幾人皤送陳惟秦客恩州客枕愁聽五嶺猿瘴江何處不消魂羊城月送春潮上蜆水風催夜渡喧茉莉賣錢香滿市芭蕉成布緑連村明知此去蠻鄉惡無奈飄零别故園樹樹桐花夾路開思鄉還上粵王臺裹鹽峒客投墟去沽酒蠻姬泛艇來市肆盡傳雞骨卜垣墻多雜蠣房灰送君解說炎方俗二十年前此地回送邵武李太守擢憲滇南昆明池水靜無波擁傳新從僰道過開府定能寬漢法采詩曽不廢蠻歌趂墟滇客龍名市納欵夷王象渡河他日勒功留片碣㸃蒼如黛石嵯峨約陳伯孺仁王寺結夏效長慶詩寄灣溪老友看今年結夏擇香壇約翻蓮藏日三卷願飽花齊午一餐經月應酬拋竹素暫時功課借蒲團更貪兩物堪消暑栲栳隂濃荔子丹約薛晦叔仁王寺結夏詩以代柬古寺幽偏少四鄰樹隂蒼翠石嶙峋暫拋火宅塵中纍同結香壇世外因下界難尋消暑地平交誰是得閒身寄詩已約灣溪叟清賞於君又一人夏日園居和興公韻荒園四面緑隂齊菜甲縱橫剩幾畦絡架瓜藤青不斷亞簷柳葉翠難低石堪清聽敲靈壁茶可消煩煮建溪坐對博山香漸滅數聲歸鳥過窗西一條卭杖繞疏籬正是閒行得句時縛帚竹尋將槁葉插瓶花愛半開枝多情乳燕梁間壘無意蜘蛛屋角絲樹影臨窗遮欲盡晝長真與睡相宜蔡景明參知重遊晉安過訪山居話舊時先永寧歿已九載尚辱垂弔感而賦此垂老閒遊出瘴鄉居停仍喜近山房昔年圖畫蟲生卷故主園林燕在梁眼底更誰為舊雨鬢邊無處不新霜感君猶有山河意追念先人拜影堂趙仁甫别駕解官歸自䕫府招同陳履吉陳平夫陳振狂集侣雲堂草堂新築白雲間招得荷衣客往還北海芳尊傾魯酒西窗殘燭話巴山林花乍落三開徑園柳初成五映關蓮社正稀泉石侣愛君青鬢肯投閒送善上人募建水月庵托鉢他鄉度有情逢人稽首乞題名行行水際袈裟影處處空中剪尺聲募化不辭孤錫逺因緣休謂一錢輕憑師悟取西來意水自澄清月自明施仲宣司理招同鄧汝髙督學飲烏石山分得虛字道山千尺本仙居上有孤亭接太虛坐倚松篁頻却蓋行過巖岫久停車洞疑大酉鴻濛外石似天丁斧鑿餘不是能忘軒冕貴豈容蹤跡混樵漁過黃印坤廣文故居重過閭巷景蕭然蔓草疏花感昔年白社猶懸髙士榻青山新築廣文阡墨池久涸苔生硯𤣥室長扃土翳氊唯有寒塘如半月緑波依舊繞門前贈林子實山人破帽鶉衣過此生放歌村落負薪行何人能識醉中趣獨我許留身後名老去未容狂態減貧來彌覺俗緣輕茅茨委巷逢迎少經歲不聞車馬聲幔亭集卷九
