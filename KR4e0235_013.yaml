body:
  text: 幔亭集卷十三明徐熥撰七言絶句登揚州城樓淮水微茫逺接天隋宫秋草自芊芊當時歌舞人何在落日空山聞斷蟬錢唐别友日落津亭一别君數聲猿呌不堪聞明朝回首錢唐路惟有秋山隔暮雲江上送客片帆遙向洞庭遊湖水茫茫一色秋别後思君腸欲斷不堪重倚夕陽樓蘇小小墓疏林落葉亂孤村芳草萋萋滿墓門惆悵美人今不見寒鴉棲盡又黃昏春日懷舊落花寂寂柳依依日暮空山獨掩扉雙燕不知人去逺年年猶繞畫梁飛彭城懷古雲龍山下鳥爭啼戲馬臺前日欲西莫謂楚宫今寂寞五陵芳草正萋萋聽角思歸白草黃榆不見春十年遼海困征塵夜來正有還鄉夢殘角一聲愁殺人野店逢故人野店鶯啼柳自垂故人相見不勝悲明朝又作沅湘别江海悠悠無盡時淮陰夜泊淮陰城下暫停舟明月無情水自流漢代王孫今不見惟餘春草滿汀洲客中贈别吳姬把酒唱離歌一片愁心奈别何莫怪相看頻下淚江南春色已無多武林與子卿宿别渺渺疏鐘月下聞天涯相見復離羣秋風一夜孤帆逺遙隔吳山幾片雲丹陽遇陳十八丹陽渡口遇同鄉欲語匆匆怨夕陽君返江南我江北雲山千疊斷人腸送人遊秣陵送君西去秣陵遊萬里寒江日夜流酒散離亭人已逺亂山殘雪一孤舟感舊一别心知萬里遙孤燈空對可憐宵因思十五年前事月色簫聲共寂寥東原别歌者周郎縹眇尊前一曲歌相逢其奈别離何數聲殘角霜天曉馬首無情幽怨多過黃逸人幽居行到山中日已昏一聲寒犬出孤村青苔滿地無人迹風落殘花閉洞門靈巖菴懷珠上人踏遍煙霞萬壑深洞門空鎖薜蘿陰一從瓢笠過南海十載遊蹤無處尋曽同老衲共安禪回首春風已十年此日重經香火地佛燈無焰竈無煙客中送人之粵西客路相逢各斷腸明朝身在瘴雲鄉荒原野店無人住古木蕭蕭空夕陽軍城早秋落日荒城起暮笳蕭條秋色滿黃沙一聲塞鴈西風裡十萬征人盡憶家金陵懷古一自東南王氣消秣陵秋色冷蕭蕭如今宫殿生禾黍無復繁華似六朝訪羽人不遇千峰萬壑羽人家鐘磬無聲日已斜閉却洞門春寂寂晚風吹落紫藤花湖上晚望半天夜月漏初稀渺渺澄波浸翠微一道香風何處起隔溪遊女採蓮歸秋夜聞笛殘月微微玉漏深一聲長笛起秋陰天涯多少懷歸客獨對西風思不禁東莊晚眺舊遊風景易蹉跎古路松陰翳薜蘿樵唱盡歸門巷寂蕭蕭殘柳夕陽多贈少年天涯相見正新秋滿目西風共倚樓月下按筝歌一曲聲聲都作小涼州宫怨金鎖重封院宇深鑾輿消息總沉沉君王何處看歌舞負却長門夜夜心遙聞玉輦過昭陽歌吹聲中欲斷腸一閉深宫經十載夢魂無自識君王冬日到山家十里青山古木平半溪殘雪夕陽明小橋流水門深閉但聽雲中雞犬聲送人貶崖州瘴雨蠻煙道路長憐君何事此投荒他時縱有相思夢萬里風波正渺茫酒家贈别十載分携無定蹤誰知此日酒家逢五更酒醒東西去又隔雲山千萬重交河道中蕭條殘柳不勝秋滿目山川對戍樓今日獨經征戰地黃沙漠漠使人愁漢宫春曉詞長信宫中玉漏微緑楊枝上乳鴉飛忽聽銀鑰開金鎖殘月樓頭照舞衣枕上頻聞女伴催任教初日上妝臺玉肌應共東風軟正夢昭陽侍寢來宿霧霏微御柳青水晶簾捲見殘星傳言禁漏聲休促昨夜君王酒未醒鶯聲睍睆出花枝腸斷流蘇夢覺時一派管絃何處起遙知别院拜昭儀送老僧行盡天涯與海涯間雲孤鶴伴袈裟歸看手種門前樹開遍春風幾度花二月晦日送人之安南杜宇聲中夕照斜長途征馬踏殘花春光今日歸何處莫是隨君到海涯驅車萬里向蠻天人去春歸總可憐同是别離君更速君行猶在曉鐘前寒食郊行傷少文春風羸馬出郊坰忽憶心知涕淚零最是無情墳上草年年寒食自青青送人出塞黃塵漠漠暗征衣楊柳青青折漸稀試問玉門關外路幾人西去幾人歸七夕聞砧天上雙星正渡河人間砧杵晚來多閨房若待秋風冷絶塞寒威可奈何長門怨芳草何時輦路通長門花鳥自春風總緣薄命難承寵不是相如賦未工金谷園聞説佳人此墜樓青山長在水長流明珠已與珊瑚碎尚有香魂夜出遊青塜誤殺嬋娟是畫圖千年孤塜長蘼蕪春風似亦憐芳質不遣窮陰草色枯楊白花楊花如雪葉如絲無奈東風一夜吹飄落不知何處所年年腸斷暮春時宫人斜春雨春風粉黛銷誰憐黃土葬妖嬌墓門幸與諸陵近夜夜香魂不寂寥紅葉怨紅葉詩成暗自愁御溝泉咽不堪流願將一掬相思淚添得潺湲出御溝薛濤墳玉壘山髙錦水流黃泉何處覔青樓墳頭種得桃千樹花落花開怨未休溫泉宫羯鼓聲中酒未醒華清浴罷轉娉婷可憐萬古溫泉水難洗漁陽戰血腥馬嵬驛蛾眉宛轉倍堪憐永别君恩赴九泉千載馬嵬山下路傷心最是佛堂前宫詞忽聽昭陽歌吹聲倚欄無語不勝情青青長信宫前草盡是鑾輿去後生古意郎自傷心妾斷腸夢中逢妾妾逢郎一聲砧杵一聲恨别意長如秋夜長郵亭殘花征途微雨動春寒片片飛花馬上殘試問亭前來往客幾人花在故園看聽舊宫人歌一從紅葉御溝流别却深宫幾度秋莫向尊前歌舊曲哀聲容易使人愁擬九日客中登髙獨對青山酒一尊他鄉秋色易消魂可憐舉目關河異惟有黃花似故園客中嵗月易蹉跎此日登臨共醉歌莫以天涯生感慨他鄉時少故鄉多黃花空向客邉開愁聽尊前白鴈哀縱使登髙也無益青山不是望鄉臺滿徑寒花緑酒前客中愁緒轉凄然也知故國山長在只恨登髙是隔年訪陳平夫箬坡别業澗水瀠洄緑樹稠白雲長鎖洞門幽此中自與塵凡隔一任桃花引釣舟長安感懷一領征衣半淚痕思家何日不消魂桃花落盡鶯聲老猶自飄零客薊門過陳薦夫幽居柴門寂寂晝常關猿鳥聲中鶴夢間欲識武陵溪上路桃花無數水潺湲秋怨梧桐葉落正新秋如水君恩别處流獨倚朱欄過夜半一聲歌管六宫愁送人從軍秋風一夜别家山萬里從戎幾日還此去正當離亂後斷腸多在穆陵關酒店逢李大偶向新豐市裡過故人尊酒共悲歌十年别淚知多少不道相逢淚更多隴西行一别家山萬里長多年白骨委沙場遊魂已逐邊塵散空有髙臺築望鄉仗劍封侯事已非閨中少婦葬征衣玉門關內多邊馬縱有遊魂不敢歸楚宫怨黃土埋香翠黛銷楚妃魂逐楚雲飄愁多自殞如花貌豈為君王愛細腰吳宫怨髙臺日日翠華臨何事顰眉更捧心本是苧蘿山下女吳中恩淺越中深秦宫怨宫中無復望車塵已分阿房老此身縱使君王得相見也應不愛白頭人漢宫怨寵幸當年不省憂六宫那許近宸旒一從廢入長門裡始解宫中失寵愁魏宫怨一夜東風殺氣銷起憑妝閣思無聊銅臺自有如花貌何必江東大小喬晉宫怨恩寵由來有淺深至尊行幸豈無心蛾眉不解君心巧空聽羊車竹外音齊宫怨遙見潘妃綽約來六宫紅粉一時回隔花聽得君王笑知是金蓮步步開梁宫怨深宫長日閉蒼苔恩寵于今念已灰莫望他生更相見君王行滿不輪回隋宫怨江南江北翠旗遙夜夜深宫鎖寂寥何處龍舟試歌舞秦淮明月廣陵潮唐宫怨一曲霓裳舞未休月光如水上簾鈎夢回忽聽笙歌沸猶是華清夜打毬下邳阻風邉風颯颯捲黃沙白浪連天湧作花野店無人門盡閉夕陽衰柳帶寒鴉彭城元夕懷故園諸友故國春宵正可憐九衢燈火吐春煙舊遊已共晨星散月色遙知似去年馬上姬紅粉青娥白苧衣一鞭柳外踏青歸中裙妬殺桃花馬九陌香塵撲面飛窈窕佳人跨繡鞍香風吹動緑雲鬟最憐二月長堤柳一路青青送玉顔别劉少已馮希吕都門慷慨别同歡劍氣沖霄馬上看一自荆卿歌變徴蕭蕭易水至今寒鄚城感舊匹馬還家春正深路傍楊柳盡成隂當壚少女今何處門鎖寒煙不可尋進香詞貌似桃花鬢似雲銷金抹額石榴裙一派管絃齊上馬手持香瓣禮元君月夜鶯花三月出燕關千里家鄉幾日還今夜月明天似水夢魂先到武夷山懷平夫雪花飛盡柳花飛目斷南天鴈影稀月落屋梁人不見空餘清夢繞漁磯劍浦懷宗思兼先生劍氣沖霄水亂流故人曽共木蘭舟年來老病如宗炳畫裡青山卧裡遊過陳山人隱居茆齋斜瞰武陵溪萬樹桃花兩岸齊間倚杖藜看乳燕薜蘿衣上落香泥竹枝詞美人門對錢塘江水透蘇堤月透窗莫怨裴航仙夢晚種來玉杵未成雙妾住西湖舊狹邪孤山深處是郎家郎若重來須細認湖邉新種碧桃花楊柳堤邉去採蓮柳枝低拂采蓮船分付兒童休浪折留待郎來作馬鞭忽聽樓頭鼓亂敲模糊月色上花梢郎今去住無消息暗擲金錢卜一爻送鄭翰卿遊燕慷慨辭家事北遊黃沙萬里使人愁市中擊築悲歌日為覔荆卿舊酒樓大夢山前片月孤送君走馬入燕都黃金臺上生秋草猶有當年駿骨無六溪夜泛暮潮初漲月痕低一葉蘭舟過六溪唱罷滄浪天漸曉青山無數鷓鴣啼烏石山訪虛公飛錫何年住此山長松修竹掩禪關斜陽影裡暮鐘發三十六峰煙靄間春日郊行春風初動暮雲平十里芳郊信馬行山色蒼蒼溪水緑杏花村裡鷓鴣聲西湖八景仙橋柳色迎仙橋畔萬條絲淡蕩春風二月時知是踏青歸去晚幾多遊女唱楊枝大夢松聲澄湖瀠繞越王城十里湖光似鏡平怪得寒濤何處起前山無數亂松聲古堞斜陽百尺髙樓接女墻猶傳閩越舊封疆可憐霸業歸何處惟有寒鴉帶夕陽水晶初月孤山深處水晶宫畫舸歸來信晚風欵乃歌殘天似水一痕新月上湖東荷亭晚唱虛亭遙跨水中央五里荷花十里香度曲女郎齊拍手一聲驚散兩鴛鴦西禪曉鐘湖上邀賔卜夜歡勝遊休問夜漫漫天雞呌罷晨星落猶聽鐘聲出寺殘湖心春雨滉漾平湖影碧空千重樹色盡朦朧春光何處尤堪賞多是梨花暮雨中澄瀾曙鶯子與風流天下聞創來髙閣欲凌雲曉鶯不道年華變猶自聲聲喚使君青樓俠氣贈李姬阿嬌俠氣滿紅樓不肯輕身事貴遊昨日五陵公子過青衣傳語未梳頭文章元不屬蛾眉紅粉誰知唱麗詞袖裡雲箋裁五色客來題出斷腸詩玉貌元同蘇小娟清謳一闋最堪憐歌聲未斷尊中罄猶卸金叉當酒錢緑雲慵理黛痕銷時把金簪竹上敲但得黃金能買賦何須珠翠鬬妖嬈寄題朗公寶函樓一瓢一鉢一經函幡影燈光對佛龕百尺樓中皆淨土蓮花千葉坐瞿曇重過面壁洞訪熙工躡屐重過積翠臺當時屐齒半蒼苔桑麻雞犬還如舊洞口桃花幾度開宫詞翡翠衾寒曉漏遲博山香燼夜何其起來試揭珠簾看月在梨花第一枝莫怨鑾輿寵幸稀九重天子正宵衣雲和一曲間清晝乳燕簾前作對飛對月答鄧汝髙共對秋山月影寒尊前莫惜盡餘歡不知故國秋山月能得尊前幾度看春日懷王少文去歲逢君花下飲間庭花落正紛紛于今又是花時節但見花開不見君訪程子暉草閣秋深露氣寒白龍江上暮雲殘輕舟泛入桃源裡兩岸芙蓉一釣竿元夕懷李伯實往事傷心倍可憐故人今夜渺雲天燈光月色鞦韆影已隔春風二十年送李子行太守謫茶陵一官何事又投荒楚峽猿聲幾斷腸正是長沙遷謫地不堪夜雨度瀟湘不為相逢歎陸沉總緣離别易傷心孤臣命似湘雲薄聖主恩同漢水深楚江遙望隔天涯盛世南遷道路賒滿目春光無限淚清明風雨馬頭花春雨瀟瀟春草微片帆遙逐楚雲飛此行若過湘江路莫弔三閭弔二妃寄黃白仲家在西湖第幾峰白雲無數水重重鳥啼花落春光暮同聽南屏寺裡鐘與瀚公宿緑玉齋幾年蹤迹各西東一點禪燈此夕同對坐空山天籟寂滿林花雨月明中金山别閔齡古寺鐘殘暮靄收人煙起處見瓜洲長江渺渺愁無盡况上秦淮萬里舟芋江驛樓送張四之白下春風吹柳萬條斜此去金陵驛路賒不必相思當後夜片帆開處即天涯懷謝在杭司理一片愁心兩地分三年人隔五湖雲從來未識苕溪路只是思君不夢君仙宗寺古寺荒涼蔓草生青山回合暮雲平當年遺迹俱塵土惟有流泉是舊聲自鼓山歷鳯池尋白雲洞不得誤抵山麓而歸口占寄趙用拙居士岧嶤徑路杳難分猿鳥哀呼日半曛莫謂洞門今咫尺不知猶隔幾重雲桃花流水自潺湲曉起尋君日暮還不是漁郎迷去路斷無蹤迹在人間湧泉寺懷融上人憶昔團焦住化城蕭蕭風雨佛燈明于今重借雲房宿無復當年禪誦聲與陳惟秦鄭震卿宿老禪菴古寺鐘殘夜已分三人同卧一牀雲他時此地聞鐘夜未必連牀又是君哭王少文秀才王郎本是大羅仙暫謫人間二十年一夜緱山仍控鶴滿天風露冷嬋娟去年春暮禁煙寒把酒看花共倚欄此日花開君不見黃壚相隔路漫漫齠齔能詩便有聲筆花長向夢中生如今玉樹埋黃土誰繼風流竹下盟素箋如練墨如雲年少臨池獨有君舊日蘭亭今寂寞不堪開篋見遺文長吉當年賦玉樓憐君猶少七春秋傷心處處生悲感何必山陽始淚流綿綿幽恨幾時銷金屋無緣貯阿嬌虛度春光二十載看花不及詠桃天猿鳥聲中晝掩扉竹陰依舊故人非思君忘却幽明隔猶怪音書近日稀一别黃泉路杳𡨕愁雲空鎖草玄亭即今風雨羅山夜猿鳥哀呼不可聽魂魄悠悠到夜臺應知塵世不重來從今緑玉齋前路一任春風長碧苔記得孤齋晚眺時倚欄連袂共題詩山中每到斜陽後便覺傷心雙淚垂遊仙詞壽陳汝大半生蹤迹寄煙霞煉就丹壚九轉砂鶴背鸞笙明月夜一聲吹過碧桃花山自蒼蒼海自流難將甲子記春秋羣真歲歲稱觴日但見黃花滿洞幽年少曽窺寶笈文青山長禮紫陽君洞門盡日無煙火自掃松花吸白雲琪花瑶草滿松關猿鳥聲中鶴夢間欲識武陵溪上路白雲無數水潺湲代鄭翰卿閨人秋日寄逺良人何事滯京華日醉青樓不顧家獨宿空閨今幾載又驚秋色上蘋花梧桐葉落火西流君住長安又一秋莫向邉庭思仗劒書生從古幾封侯苧蘿村越國荒村説苧蘿曽聞此地幻嬌娥浣紗遺迹知何處滿目悠悠空緑波七夕觀妓玉露凋瀼片月明人間天上此時情紅樓不似銀河隔一任鄰雞報曉聲感事莫嘆吾家似磬懸資生猶有賣文錢不知萬落千村裡多少人家絶火煙訪黃道晦桑麻雞犬自成村溪口雲深絶洞門有客遲回空日暮不知何路到花源口占戲贈道晦家難相尋已十秋半居城市半林丘此身已是空門客只欠披緇物外遊送林伯溥還金陵落魄江湖歲月更相憐何必是平生送君忽起并州感衰柳秋風白下情秋夜即事秋宵殘雨上窗紗一點流螢照暮花覔得輕羅穿竹徑已隨風葉過鄰家贈潘郎白晳修眉紫綺裘春風挾彈美遨遊幾多紅粉羞顔色果匿懷中不敢投小箬溪懷邵夢弼當年此地共揚舲一入泉臺竟不醒墓上白楊今老大江頭古木自青青送張叔韜之官昌化一官南北總君恩只為風波易斷魂吉了啼春山路寂五更煙雨過蠻村五嶺梅開歲欲殘朱崖南去路漫漫莫言炎海無氷雪一領青氊六月寒官冷携家乏俸錢獨將桃葉海雲邉玉顔未慣蠻天苦同醉檳榔辟瘴煙留别曹能始驛樓相别不勝悲握手殷勤問後期何處壚頭同一醉冷風殘雪薊門時一别青山謝薜蘿故人今夜隔關河客中無限相思淚才到思君淚更多西去長安路渺漫天涯蹤迹覔來難我今到處題名姓待汝經過到處看夢中忘却已分離只解歡娛不解悲半夜蓬窗驚覺後始知相别已多時與王生對酌共是飄零客裡身壚頭沽酒莫辭頻他時去住分南北歸路同舟是别人過昭慶寺幡幢髙拂六橋煙坐久無僧可問禪一寺袈裟三百衆寺門都趂賣經錢湖上書所見二八妖姬淺淡妝獨搖蘭槳水中央湖光勝似華清水不染人間粉黛香戲呈朗公西風半夜起松陵萬里孤舟一點燈莫為離家腸易斷無家猶有少年僧禦兒舟中别朗公月下談深睡去遲滿身涼露夜何其雞聲未斷鐘聲起又是江頭欲别時夜泊即事夜靜停舟傍水湄隔舟人語許多時起來試倚篷窗聽盡是思鄉怨别離松陵夜泛一片輕帆挂月明微茫何處辨孤城已看燈火星星近猶隔西風數里程滸墅關懷王百谷楓橋西下夕陽斜重到關門問酒家記得當年分别處一船秋色載黃花楓橋夜泊夢鄧汝髙進士燕吳遙望隔天涯魂去魂來只自知夢裡頓忘裘馬貴相逢猶似布衣時舟中對酒懷陳子卿橫塘煙雨不勝愁滿目山川憶舊遊今夜一杯三白酒猶疑同醉太湖舟夜雨客路逢秋夢易醒空江煙雨晚冥冥數聲夜半孤篷外不似髙齋竹裡聽懷任夫天涯雖自嘆離羣不用題書更寄君日日同遊有諸弟一回書寄一回聞朝天宫贈沈道士回廊九曲隱星壇霞珮螭衣偃月冠唱徹步虛詞一闋白雲滿地磬聲寒桃葉渡訪張幼于淮水東邉楊柳新白頭猶醉曲中春尊前試看紅妝女誰是當年勸酒人青溪逢吳叔嘉投贈廣陵雲樹秣陵煙兩地飄零共幾年老母七旬家十口資生惟有賣書錢尋汪堯卿不遇落葉蒼苔滿徑幽懷人空對秣陵秋秦淮渡口無蹤迹一日看花十四樓鷲峰寺逢趙用拙白雲洞裡覔無蹤何意青溪得再逢無却是真逢是幻欲將真幻問南宗苕川尋錢叔達不遇時叔達在閩我客苕川君客閩天涯同是未歸身應知兩地相尋處俱閉間門不見人夜坐懷玉生冷衾如水室如氷未盡更籌欲盡燈回首舊遊多感慨雙雙騎馬戲金陵疏林明月照匡牀一點孤燈淚萬行夜半頓忘人已别詩成猶自問王郎吳興感懷呈在杭客中何事太凄然不得歸閩未到燕囊槖漸空遊漸倦故人離别又殘年咏燕燕子嬌飛羽翼齊呢喃時向小窗西只因舊壘營初定縱有雕梁不敢棲過錢功父懸磬室一室依然似磬懸傳家負郭舊無田鸊鵜劍售鸘裘典只有藏書不賣錢再尋王太古不遇梅花影裡訪幽棲門掩寒塘水滿堤兩度相尋不相見一帆風雨出梁溪渡江一葉扁舟逐浪飛罡風吹浪上征衣他時縱有南歸夢夢見濤聲不敢歸交河道中路入交河日半曛北征車馬各紛紛如何一片黃沙地能勝青山與白雲黃沙漠漠馬驂驔北地春光久自諳不用褰帷縱遊目斷無山色似江南旅店感舊壁上題名八九春重來疑是夢中身幾回欲覔題名處忘却誰家是主人燕南道中懷君大熙吉熙工玉生諸子蕭蕭羸馬向天涯一片黃塵滿面沙記得去年春雪裡白雲莊上看梅花咏道傍柳一片東風一度新生來不見上林春莫言此物無情甚送盡天涯落魄人新城阻雨寂寞孤村獨掩門幾家燈火近黃昏一般寒食梨花雨此地聽來更斷魂東阿道中馬上青山夕照明看山應動故鄉情雖然不及江南好猶勝平原曠野行陽谷馬上戲作呈幼孺萬樹垂楊送客行春風三月未聞鶯上林此日方千囀不向歸人喚一聲過東平城北元故丞相墓誰家翁仲卧荒墳聞是先朝舊相君三百年中來往客幾人下馬看碑文汶上感舊汶水匆匆唱渭城春風一别數年情知君本是飄零客未必重逢在此生同幼孺馬上見桃花寂寂山家半掩門却憐春色滿荒園同行不覺旗亭逺看盡桃花又一村宿界河驛夢從許靈長索書蘭亭記折柳都門路遂分故人回首隔煙雲不知此别千餘里猶乞蘭亭學右軍過薛君故城髙臺傾盡曲池平此地猶傳薛故城珠履三千俱寂寞行人空動雍門琴挂劍臺公子當年然諾深千金寶劍挂空林應知十字碑題後泉路相逢無愧心亞父冢亞父孤墳蔓草荒行人何用歎興亡漢家多少功臣骨若箇能歸葬故鄉彭城感舊落盡天桃萬樹花傷心重問舊琵琶平康門巷多相似不記垂楊第幾家戲馬臺今改為昭烈廟英雄千載説喑啞此地曽經戲五花只有荒臺留不得依然香火屬劉家廣陵别陸無從客路相逢嘆二毛片帆南下月輪髙他年一枕揚州夢滿樹璚花萬頃濤舟抵京口作舟過金焦日未斜回看瓜步即天涯故鄉雖隔三千里得到江南似到家丹陽舟中與幼孺對月時余南還幼孺將客苕川共倚孤篷月似霜夜深風露滿胡牀應知此月重圓夜君在他鄉我故鄉懷平夫客裡思君路渺茫回看往事更凄涼十年夜半羅山雨若不銷魂也斷腸懷惟秦江上春風吹布袍題詩千里問蓬蒿君還記得當年事竹下焚香讀楚騷題落日孤舟扇面送幼孺古木蒼蒼落照收誰人獨自泛中流燈前不敢披圖看恐是松陵别後舟夾浦橋感舊寄謝在杭夾浦橋西芳草新當時此地共迷津年來買遍松陵棹猶是江邉失路人重集諧賞園憶歌者陳情龍陽窈窕勝蛾眉埋玉空山是幾時重到園中聽歌舞不成歡樂却成悲陳郎丰度似何郎長袖蹁躚韻繞梁此日重來君不見舞裙歌扇總凄涼八尺湖夜泊懷李與熙張子環八尺湖邉月上遲相逢猶記去年時一從落魄長安後三處飄零各不知石門晚泊即事湖上人家帶暮煙日斜維棹小橋邉桑間試問繅絲女此是春蠶第幾眠寄弟春風送客翻愁客客路逢春不當春寄語鶯聲休便老天涯猶有未歸人對鏡前路虛名未可期曉來臨鏡不勝悲無情最是雙青鬢豈待名成始有絲舟中懷幼孺春風並轡出都時江北江南處處隨一自松陵分手後幾多山水不題詩漁梁街逢趙彥宗匹馬相逢嘆路岐匆匆對語不多時知君别去無他想也是尋思遇我詩幔亭集卷十三
