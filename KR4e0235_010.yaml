body:
  text: 幔亭集卷十明徐熥撰五言排律登玉皇閣傑閣開靈境瑶壇接太空層甍青嶂裡飛檻白雲中海上蓬萊島人間太乙宫六鰲峰逶邐五虎勢巃嵸漸與塵寰隔還於帝座通天都低日月地軸隘華嵩逺眺龍臺古回看雉堞雄階生瑶草緑爐伏大丹紅妙訣傳金母髙幡捧玉童驂鸞逢子晉騎鹿揖韓終自識𤣥關妙因知道教崇九仙遺蹟在何必訪崆峒初夏集王氏南園南園開勝地結伴共盤桓曲徑依精舍疏鐘出戒壇山光低古堞樹色隱層巒弱柳垂青沼名花映畫欄浮屠髙七級懸磴折干盤帆影雲中細蟬聲雨後殘侵衣松露濕夾座竹隂寒鈴鐸憑虛聽川原入望看明霞散林際初月掛簷端嘯咏情方洽酣歌夜未䦨此中足幽賞長願接清歡游方廣巖登絶頂二十四韻方廣華嚴地神州一洞天寺藏青嶂裡路繞白雲邊氣候晴兼雨峰巒斷復連樹枝多臃腫蘿磴自盤旋猿嘯聽經石龍生洗鉢泉水簾終古瀉鐘乳半空懸境出塵寰外巖開混沌前金身餘五百世界度三干淨室鄰飛瀑沙彌種石田空門灰幾劫削壁字何年谷有羚羊險山從鳥道緣地偏堪避世境寂可安禪貝葉飄香界曇花落法筵桑門同客饌石榻伴僧眠已得澄心訣渾忘俗纍牽探竒情未已躋險興翩然披莽尋支徑捫蘿到上巔畏途尤􅏭嶫側足更迍邅彳亍聲俱喘蹣跚膝在肩聳身摩斗柄回睇盼雲烟逺水看如帶重岡小似拳祗疑天闕近還聽谷聲傳客有𤣥暉趣僧如支遁賢從兹尋覺路長此奉金仙登石竹山一徑費攀躋羣峰覺盡低千層環碧嶂百級掛丹梯嶺峻天疑近林深路轉迷空中飛鳥絶樹杪亂猿啼跳浪山魈避盤旋羽客栖解衣穿草莽揮手抉虹霓歲久碑無字丹成竈有泥書符尋篆籙煉藥乞刀圭吟眺情俱適徘徊日漸西扶笻下山去月色印前溪登萬歲塔寶塔凌霄逈登攀俯九垓山河天際繞樓閣日邊開幡影依簷落鈴聲拂檻來馬江波浩渺雉堞勢縈回隔嶺留殘照遙空度晚雷炊烟生下土禪誦出香臺僧自山腰住人從樹杪回迷川今日渡劫火往年灰上界疏鐘動孤城斷角催幾思題偈别古壁半蒼苔游榴花洞逶邐羣峰隱紆回一徑偏空山殘照裡古路斷雲邊入壑疑無地穿林覺有天鹿眠松下塢禽噪竹間泉芝草緣岡秀榴花滿洞然莓苔寒細雨桑柘隔孤烟但見山川舊誰知陵谷遷人皆迷漢姓居是避秦年不記來時路因拚世上緣遲回未忍去或恐過神仙己丑除夕志喜一歲盡今夕悲欣異去年梅花送殘臘蓮炬吐芳烟淑氣回蓂莢條風度管絃老親歡膝下稚子戲燈前柏酒山妻進辛盤諸弟傳天倫有真樂喜極不能眠箕踞軒贈郭聖僕大隱不違親幽居少四鄰跏趺依古佛箕踞對時人習懶成迂癖長齊了夙因形骸耽句瘦囊槖積書貧薜荔裁竒服耕桑作外臣柴門多紫氣木榻絶紅塵誼以枌榆篤交於草莽真愧豫貪問字忘却往來頻瓦棺寺看月同吳翁晉梅季豹郭聖僕志若真全二上人分得圓字問偈過諸天松間片月懸光分三世火影滅半林烟雲駛看疑運霜明望更鮮玉繩低下土金鏡照迷川悟景應知幻標枝可喻禪籟兼心共寂輪與果俱圓散彩髙幡外生輝斷磬邊曉鐘催漸落長夜竟忘眠苕溪逢謝長史姊丈携家適至賦此志喜且以為别不謂飄零客能逢骨肉親乍同燈下語猶訝夢中身意緒兼悲喜關河各苦辛音初聞里閈事但話鄉鄰細問兒童長空憐弟妹貧艱危前路甚消息故園真雖得歡携樂其如别淚新明朝又分手兩地共傷神四月晦日邀屠田叔錢叔達陳彥宗陳汝翔王玉生陳惟秦陳幼孺王粹夫陳正夫曹能始林子真興公弟西湖觀競渡分得寒字髙閣俯澄瀾湖光入座看遙空簫管咽夾水綺羅寒笑語連天沸呼聲動地歡揚旌過曲浦撾鼓下驚湍翠袖飄文楫紅標颭畫欄卧波蒼甲偃回棹玉鱗蟠共聽菱歌度渾忘蓂葉殘土風爭不禁禮法醉猶寬藉草情偏洽迷花興未闌日斜遊騎散墜珥滿江干送李德威先生之樵川尋珠上人何以度晨昏蕭然四壁存緇衣憐舊主白髮傍空門業淨依菩薩家貧任子孫餘生拋不顧老淚滴無痕世事空花過愁心落葉繁願將香積供千里勸加餐怨歌行恨極蛾眉蹙情多鴈素沉銀燈孤照影錦薦獨傷心粉褪雙顴玉黃銷半臂金解衣香氣冷攬鏡淚痕深蛩韻鳴殘杼蛛絲網斷琴羅帷明月鑒珠被曉霜侵願託巫山夢為君長抱衾送屠田叔之官沅陵五十韻爵服諸侯列聲華一代先英靈鍾嶽秀詞藻動星躔入幕參軍事含香侍御筵符分京兆貴禮典太常䖍𣙜稅淮陽郡司鹺瘴海邊炎天舟載雪斥鹵竈生烟大隱官如水閒曹吏是仙交遊盟草澤嘯咏狎林泉白屋身能下緇衣好獨偏掄才忘牝牡為政薄鷹鸇豈以官情纍都將世味捐文章時倡和杯斚定留連車騎諳閭巷干旄耀市㕓後生投刺滿多士過門闐不輟分題㑹寧辭倒屣延素心尤愷悌名理太淵𤣥董子帷常下江郎筆更鮮形骸容放浪禮數畏拘攣結社裁詩律鐫書割俸錢考工存舊記情采著新編屈些增吳疏毛詩補鄭箋荔枝詞膾炙海錯譜流傳經施莊嚴寺僧皈大乘禪寄詩懷五嶽留偈榜諸天樂府精宫羽謳吟叶管弦兩童供墨妙十吏捧丹鉛交誼町畦絶談鋒壁壘堅畫圖摹往哲俎豆祀髙賢古道才能爾今人詎有焉使君真嶽嶽公子果翩翩閩部方推重辰州急轉遷悲風寒凛凛逺道思綿綿共欵襟期隔還勞夢寐牽雙旌萬里去五馬一城專問俗朱輪駕行春錦綬懸家元饒竹箭庭只掛蒲鞭眷顧恩三錫勳階祿二千辰砂搜古洞酉室檢殘篇沅水遙通沔峒溪近接滇鷓鴣聞竹浦雞犬覔桃川刀劍民爭賣襜帷帝許褰邏燈嚴夜堞耨火勸春田閩楚程難縮關山阻可憐傷離當此日投分已三年邈矣思良晤凄其念後緣歌聲宣欎欎書札訂惓惓往復虛青簡賡酬散白蓮感知心獨耿惜别淚空漣眠食須珍重功名合勉旃停驂頻悵望何地再周旋仲冬十八日同王玉生陳伯孺幼孺興公弟送屠田叔使君自芋江登舟至囦關時積雨初收川原競爽促膝翻書扣舷覔句香繞筆牀烟籠茶鼎情景清絶偶憶少陵野航恰受兩三人之句因令玉生繪圖共拆杜句為韻各賦一體以紀勝遊余拈得三字擊汰芋江上前峰日半含山容晴亘翠水色淨拖藍帆飽行偏駛舲虛坐正堪榜歌喧浦口漁唱隱溪南鸛鶴追殘照牛羊下夕嵐石棱衝浪瘦楓葉醉霜酣沈水香烟細烹泉茗汁甘雲霞諸子共丘壑衆情耽名理交參伍新詩改再三風波童稚狎港路長年諳身入圖中景人為物外談浣衣臨曲渚洗硯覔深潭清福閒能受𤣥言靜可探杜陵詩句好此境果無慙贈歌姬愛卿十二韻綺席開華館傾城得愛姬苑花輸靚臉宫柳學柔肢薄鬢瓊叉耀單衫寶帶垂嬌喉歌自囀長袖舞偏宜纎月橫蛾翠輕風馥口脂背燈偷賣眼臨鏡故顰眉性慧藏􅍐巧情多度曲遲明璫斜粉頸銀鈿約氷肌舊恨啼難訴新官對可悲暗調通繾綣微拒掩猜疑意洽重逢日魂銷欲别時流蘇空百結未足表相思賦得團扇承落花飛花霞並爛紈扇月同團素影留芳怨餘香戀合歡嬌疑障笑比朱訝掩唇看有意迎風易無聲到地難胭脂紛㸃鏡錦繡剪堆盤魂向輕羅散春從薄面殘班姬方斂恨閨思况將䦨趙仁甫先生以卭竹杖見惠賦此答謝種本傳西域曽聞貢漢宫一枝非嶰谷萬里出蠶叢曳去穿雲際携來到水窮節應虛緑土頭可掛青銅莊叟逍遙外盧敖汗漫中未嘗臨俗客偶爾借鄰翁採藥兼瓢往挑經與錫同靜緣幽徑曲詩興野橋東共步添良友扶顛當小童長房吾自愧君已似壺公幔亭集卷十
