body:
  text: 幔亭集巻七明徐熥撰七言律詩吳城覽古白雲猶繞舊王居獨對西風恨有餘百戰山河歸草莽千年陵寝總丘墟月明茂苑遊麋鹿花暗荒城弔闔廬况是異鄉多病客豈堪唫眺暫躊躇古意一天秋色露華清獨倚妝臺別恨生錦字緘愁過薊水寒衣將淚到遼城夢廻萬里金微路腸斷三更玉篴聲起視明河人不見朔雲邊月總關情塞下曲沙磧風髙敵騎侵將軍新戰賀蘭隂塞霜曉角降王淚漢月秋笳壯士心刀上洗瘢青血冷營前望氣白光沉旄頭未落邊烽急腸斷空閨戍婦碪送人入蜀忽聞天末雁聲悲况是尊前送客時白髮尚懷江海夢青山空負薜蘿期馬經劍閣晴虹斷帆過巴川夜月遲䕫府城頭應弔古寒雲漠漠草離離西湖泛舟夕陽簫鼓起中流十里芙蓉兩岸秋荇帶亂縈青雀舫菱歌低度白鷗洲吳山積翠斜侵郭越女凝妝盡倚樓三竺鐘聲聴漸逺半江微月送歸舟飲王氏南園南園精舍逺塵囂晏坐松隂暑氣消鷲嶺雲光連古堞馬江帆影逐歸潮乍聞金鐸當空斷遙見珠旛隔寺飄日晩寒鴉栖欲盡海風吹月上山椒青樓曲美人家住五陵東溝水門前曲曲通簾影半邀金市月簫聲閒度玉樓風舊飜小扇桃花碧新製單衫杏子紅十二欄干千樹桞不知何處繫青驄送游方僧春風初動雪初晴錫杖今朝出化城萬里雲天孤鶴影滿林烟樹亂鶯聲禪心客路隨流水古院荒山閉月明自是空門無定跡河橋此別漫關情秋夜送客秋至關河木葉乾送君西去路漫漫潮喧古渡猿啼隠露下空江雁影寒數㸃漁燈歸浦逺一聲僧磬出林殘片帆𣺌𣺌知何處後夜相思獨倚欄金山寺別恩上人忽聞鐘韻出林微話別空門思欲飛日暮西風吹客棹夜深凉月夢僧衣蕪城嵗晩蘆花盡𤓰步秋髙木葉稀從此分携各南北更於何處問禪機煬帝行宫滿目繁華一夕空至今行客説離宫垂楊舊見朱旗繞芳草曽經翠輦通商女歌殘花落後妖姬䰟散月明中可憐淮水龍舟戯聴得江南曲未終廢殿荒凉噪暮鴉廣陵潮滿夕陽斜一從鳯輦歸黄土無復龍舟駐翠華春盡冷烟生蔓草夜深明月照璚花當時複道今何處半屬蕪城百姓家雪中登富春山羣山萬壑白嶙峋雪裏移舟問富春諸將漢家依日月故人天上動星辰千年宿草埋鐘鼎七里寒烟䕶釣綸最羨羊裘堪傲世青袍愁染洛陽塵姑蘇懷古秋風吹送木蘭橈無那愁心逐暮潮響屧廊中歌舞散姑蘇臺上鹿麋驕東吳覇氣今俱盡西子香魂不可招半夜烏啼鐘欲動無情明月照楓橋蘭陵道中寄同社木落孤城嵗易闌征途何日到長安匣中寳劍霜花冷客裏金尊竹葉殘兩浙名山方駐馬七閩諸子正登壇忽聞白苧歌聲起欲倩西風寄澤蘭經黄河寄懷陳平夫隔岸驚聞伐木歌櫓聲搖月下黄河六溪晝静枯桐冷三徑春深芳草多滿路繁霜凋客鬢半江寒雨夢漁蓑思君不奈風塵逺夜夜愁心逐逝波易水道中答謝在杭翩翩擊筑共遊燕慷慨行歌易水邊九曲河流看似帶三春楊桞折為鞭詩成馬上無須草酒買壚頭不論錢此去長安應咫尺與君同賦帝京篇清明日飲陳子卿燕南客舍燕市逢君倒接䍦幾迴相樂又相悲天涯踪跡同萍梗客路年華寄桞枝南國詞壇髙赤幟西山爽氣落瑤巵若非暫過梨花院辜負春光總不知下第呈孫子樂省元黑貂裘敝出長安客路春光半已殘燕市桞從歸處折故園花在夢中看處囊壯士猶潛穎落魄王孫未築壇飄泊風塵還自笑十年依舊一儒冠平望舟中同在杭晩眺片㠶湖上正黄昏萬頃湖光浪不飜別後久無千里雁月中同聴一聲猿半汀菱葉爭迎棹滿目蘆花不見村無數漁歌雲外起天涯孤客易銷魂王百谷半偈菴贈順公彼岸由來不易登仲宣樓上遇名僧演成西竺三車法傳得南宗幾佛燈紀臘每栽香國樹題詩常買剡溪藤漫言自昔耽禪説身捨空門愧未能婁江哭王太常敬美先生箕尾騎來厯幾秋招䰟慟哭過西州雲飛澹圃愁無色水到婁江咽不流寳劍此時懸季子明珠何地報隋侯丘山零落空華屋徒抱人琴痛未休哭王太常墓一夜文星落太空中原驚嘆失人龍五湖方遂鴻㝠志千載真成馬鬛封門下幾人歌薤露墓前今日挂芙蓉招魂宋玉吞聲哭欲叩天閽苐九重陳价夫歸自崖州談粤中山水因懷舊遊珠崖彈鋏動經年醉抱黎姬酒肆眠笑語尚存湖海氣衣裳猶帶島夷烟波羅老去甘如蜜蔞葉開時小似錢十載遊蹤俱是夢不堪重聴舊山川送劉司理考績之京北望京華去路賒法星長照使君槎一官佐郡來分竹三載王程正及𤓰匹馬夜嘶燕市月新鸎春囀上林花天朝正待平反䟽父老前途不用遮贈蔡景明叅知托跡江湖二十霜名山遊遍不齎糧斗間能辨龍文氣粉署曾含雞舌香夜月久虚𤣥草宅客星還照紫薇郎山川信美皆吾土何用登樓憶故鄉過邵夢弼廣文山居家傍城南薛老峰衡茅長閉白雲蹤讀書早已過袁豹作賦元堪比士龍座上一盤餐苜蓿匣中三尺掛芙蓉山間忽聴蘇門嘯知隔烟蘿第幾重送趙仁甫司理左遷之京十載功名嘆積薪風波萬里一孤臣江潭此日歌漁父宣室何年問鬼神自是蛾眉終見妬豈知龍性故難馴邇來詞客方多難莫向長安逐酒人哭邵夢弼廣文雲黯烏山舊草亭撫牀慟哭淚交零百年天地收靈氣半夜詞壇隕將星挂壁哀絃今已斷隔隣長笛不堪聴茂陵死後多遺稿剰有殘編著汗青賦就招䰟竟莫還天閽虎豹正當關更無白日能廻照豈有金丹可駐顔死後脩文居地下生前遺墨在人間青門皓首幽栖處桂樹蕭條不忍攀中秋飲西湖澄瀾閣觀妓八月秋風冷芰荷西山爽氣晩來多千重樹色濃於染十里湖光澹似羅白社共酣桑落酒紅裙齊唱竹枝歌今宵若得君平卜知泛星槎入絳河挽吳門沈汝明處士蕭蕭白髮老山林處士星文一夜沉隣舍幾能悲短笛中原誰不嘆亡琴空林猿鶴春無主滿地松楸日易隂墓與要離孤塜近梁鴻髙節尚堪尋齊將軍席上聞歌七載韶華嘆逝波天涯尊酒喜重過春風海上銷兵氣夜月軍中奏雅歌仙子吹笙年正少將軍入幙客偏多㶚亭醉尉應相避敢問今宵漏若何送熊益中孝亷歸豐城征亭尊酒蹔躊躇一曲陽關恨有餘月裏龍精歸劍浦雲邊馬首出匡廬故園春盡鶯聲老驛路天長雁影疎明到長安同獻賦知君才藻逼相如贈黄瞻山先生年少聲華動五侯老來長嘯臥滄洲門無車轍堪羅雀家有圖書可汗牛流水一村韋曲社桃花三月武陵舟知君猿鶴盟猶在好看青山到白頭贈歌者鷪喉宛轉舞蹁躚唱徹凉州苐一篇緱嶺羽衣王子晉漢宫麗質李延年袖當臥處還堪剪錦擲筵間不用纒三過雍門稱絶技可能歌勸上留田沙口夜泊答宗思兼見示薄暮停橈水一灣沽來村酒破愁顔戍樓殘角吹霜落別浦漁舟刺月還幾㸃昏鴉歸木杪數家寒火出林間漫言潘岳猶年少憔悴西風鬢易斑重陽前一日寓寳嚴寺為憐秋色滿禪房回首家山幾斷腸季子黑裘淹嵗月潘郎青鬢怯風霜天涯佳節愁中過上界鐘聲夢裏長飄泊異鄉知已少明朝誰泛菊花觴江郡侯招飲西湖同曾人倩謝在杭分得遊字乞假邀驩露冕遊蹔從湖上駐鳴騶千層粉堞連雲起一帶滄波遶寺流大夢山前春意動澄瀾閣上雨聲收江淹彩筆雄今古敢對青尊共唱酬送黄居約司理英州少年新佩吕䖍刀擁傳東行意氣豪公署遙開瀧水濶法星還傍斗垣髙曲江桞色迎征幰庾嶺梅花照錦袍同聴鹿鳴君已貴可無書札慰蓬蒿己丑除夕迎春同陳振狂過鍾山寺訪曾人倩適瀚上人至同得僧字嶺南才子氣憑陵剡水孤舟興可乗青樹又添堦下臘緇衣同對佛前燈漫誇市上春如錦且醉尊中酒似澠總是空門無去住好將真偈問名僧庚寅元日曾人倩過訪同謝在杭分韻故人騎馬到岩阿同泛椒花醉薜蘿別後青雲俱未達鏡中華髮近如何鷗盟隠去還堪結馬齒年來覺漸多新桞河橋初綻緑明朝且莫賦驪歌鍾山寺送曾人倩歸嶺南曾向東阿酒肆逢重來相見未從容帆飛炎海三秋月門掩青山半夜鐘客路迎人惟桞色貧交贈別只芙蓉遙知他日相思處夢在羅浮四百峯送江太守兵備三吳登車攬轡正秋分臥轍無能借㓂君郭外一錢遮五馬匣中雙劍静三軍霜臺俯瞰婁江水行部遙飛震澤雲自愧淺才甘寂莫誰因羽獵薦雄文送謝伯元之金陵長江𣺌渺片帆開一曲離歌落照催挾妓每過桃葉渡尋僧重上雨花臺芙蓉古岸猶堪采禾黍遺宫盡可哀不必登髙頻弔古六朝王氣已成灰温永叔郡丞以詩見贈賦答南國風流温太真翩翩才藻更誰倫幾年作吏猶分竹何處逢人嘆積薪郡劇不妨三日醒甑空寧厭一官貧使君賦有凌雲氣白練親題寄隠淪聞警西賊寒盟秋犯邊黄塵漠漠暗髙天一從互市通窮塞廿載偷安罷控弦絶域羽書飛幙府連營烽火照甘泉諸公早建安危策四海蒼生正倒懸和議當年計已踈空將嵗幣致穹廬總縁中夏無防禦遂使窮邊得擣虚帷幄運籌賢相國邊陲經畧老尚書吾皇威福齊天地杕杜歌成樂有餘傳聞邊郡苦天驕三輔人心忽動搖寧夏守臣紛告急太平天子始臨朝中原幾䖏憂騎虎北塞何人得射鵰坐看邉庭空漠北漢家新拜霍嫖姚關山邉騎響蕭蕭司馬觀兵日度遼天上黑光久摩盪宫中黄屋太焚燒空揮涕涙憂時變難効涓涘答聖朝安得善言同宋璟冥冥氛祲一時銷經湧泉廢寺約客扶笻到上方白雲空繞舊僧房經臺嵗久蘿隂合香積春深草色荒遺址尚傳唐甲子殘碑猶志宋文章可憐幾度滄桑變惟有猿聲嘯夕陽過大笠僧太虚故居重携竹杖訪禪栖鐘磬無聲鳥亂啼隻履乍逢歸竺國衆香今已指曹溪幻身自昔終於滅住世虚傳得大齊却笑俗情空雨涙悟來應識世人迷贈趙茹霞羽士海國真人茹碧霞廿年雲水寄生涯讀殘紫府三千籙看盡𤣥都十萬花天外瑤笙招白鶴洞中霞佩隠青蛇知君名姓歸仙籍為乞星壇伏火砂吸江亭送林隠之山人還永嘉蕭蕭匹馬萬重山遙指家林雁宕間竹葉難留孤客醉桃花如笑故人顔不將旅食彈長鋏已動歸心憶小蠻歌罷驪駒聲漸遠吸江亭外即陽關客中憶惟起惟揚弟誰憐嵗晩滯征途無那離心滿五湖花外烟霞雙屐冷竹中風雨一燈孤斷猿呌月朝歸峽孤雁啼霜夜入蘆憶汝松窻讀周易莫教三逕易荒蕪再至京師遙控秦關百二重九天宫闕絢芙蓉醉中但擊荆軻筑夢裏驚聞漢闕鐘才子新詞皆吐鳯美人髙髻盡盤龍玉河楊桞絲絲緑染得青袍色尚濃中秋集周光禄花亭觀妓何來珠履滿華堂絃索聲中漏未央狂客風流歌白幘妖姬雲集鬭紅妝月明盡撤千枝燭花鬱爭分百和香莫謂醇醪容易醉主人年少是周郎送蒼峽王廵檢罷官歸鄉越王臺上送將歸逺樹空林帶夕暉蒼峽斷猿雙涙下碧天寒雁一行飛秪愁白髮流年暮不問青山舊業微此別悠悠難再遇思君惟有一沾衣寄吳叔嘉當年嵗晩過江都聞説相如渴未蘇作客生涯雲共薄懷人愁緖月同孤秋風茂苑閒清晝春雨荒城長緑蕪遙想登樓定懷土夢䰟夜夜到勾吳送劉宋卿還家兼訊顧長卿世卿平蕪漠漠白雲閒忍向尊前送客還賦別此時過候館懷人今夜閉空山一年春色啼鶯裏千里歸心去馬間為問姑蘇臺上客幾人飛夢到閩關送陳仲徽之齊省兄都亭對酒起愁聲芳草萋萋感別情一片飛帆揚子渡五更歸夢越王城客途社早初逢燕官舍春深好聴鶯念我征鞍方蹔息不堪江上送君行堤畔流鶯不可聞此行應念鶺鴒羣孤舟夜渡秦淮月匹馬朝衝泰岱雲故國烟花隨夢斷天涯春色隔江分欲知別後相思意惟有登樓對夕曛寄陳子卿萋萋芳草滿汀洲為念王孫獨倚樓易水悲風孤客涙潞河寒雨一歸舟征途入夜勞鄉夢野店逢春憶舊逰獻賦不須嗟未達于今世路總悠悠孫子長居湖上別業却寄西湖水色碧連天湖上幽栖地自偏逺寺鐘聲明月夜隔林樵唱夕陽邊行當花徑常逢鹿坐向檉隂獨聴蟬聞説荒郊少人跡與誰同泛釣魚船送玉生諸子遊方廣巖一葉蘭舟問翠微滿汀楊桞正依依谷當絶壁僧行慣寺隠深溪客到稀半畆暮雲禪榻冷幾畨春雨水簾飛花源自是堪迯世莫學漁郎去便歸送田將軍武薦上司馬侯門才子似君稀鵲印貂裘赴帝畿濟北烟花迎去馬潞河風桞綰征衣津亭春暖千鶯囀上苑秋髙一鶚飛聖主臨軒應召對安邊何策獻彤幃關城三月尚微寒一曲離歌送所驩客舍花飛春漠漠長安天逺路漫漫舟移楚水晴烟斷馬過燕山夕照殘獨愛終軍最年少請纓還擬繋樓蘭游宗謙山人見過春殘花落雨濛濛十載襟期此日同一榻獨懸青嶂裏數杯長醉白雲中已聞嘯似蘇門逺還羨談如稷下雄明發河橋應折桞白頭為客任西東清明日感懷此心如夢復如癡荏苒春光欲暮時啼比杜鵑先有血愁同楊桞更多絲林花開遍誰為主社燕重來亦似悲寒食已過非禁火閉門猶自絶晨炊送妓入道厭居綺陌慕丹丘斷却塵縁學道流夜静有神遊紫府月明無夢到青樓六時古洞春風滿十二巫山暮雨休一曲雲璈聲縹緲依稀猶帶小凉州愁把芳年老狹邪欲尋鉛汞洗鉛華西園公子求遺珮南嶽夫人贈紫霞翠袖正宜過碧海朱顔偏可餌丹砂玉聲已奏僊家樂不向江心抱琵琶題郭士龍隠居壺公山色白雲齊一室蕭然隠者栖短屐每尋芳草路輕舟時泛木蘭谿春深緑酒聞鶯語晝靜𤣥經落燕泥欲覓武陵何處所桃花干樹使人迷林方伯先生七十初度是日為吕純陽誕辰共傳薇省即蓬壺白髮中朝老大夫申甫何年曾降嶽仙翁此日正懸弧一杯瓊液承金掌九轉丹砂在玉爐莫是貞元前進士托生塵世住𤣥都送人還九江送君西去路漫漫二月東風擁去鞍彭蠡驚濤雲外聴匡廬飛瀑月中看天涯草色今猶短驛路楊花尚未殘不用臨岐倍惆悵一尊還共醉長安讀禮感懷相見黄泉未有期每思往事涙交頤蠧生殘篋長留粉蛛匿空房亂結絲花徑尚看扶杖處檉隂猶記納凉時綿綿此恨應無盡忍讀風人陟岵詩何事當年便絶裾誤人應是薦賢書九天無處閽堪叩三釜如今願已虚却恨別離同夢寐還驚日月易居諸從今不起雲霄念長向花間御板輿素車白馬出燕關風急雲寒雪滿山當日已拚成死孝此身何敢望生還忍看堂上遺容在無復花前舞袖斑丹旐翩翩人不見撫牀空有涙潺湲哭向靈幃喚不醒可憐從此隔幽冥雙鳬影絶人何處五桞隂濃戸自扃藉草祗今稀酒伴種花誰復課園丁廻思二十年前事日日窻前教一經送興公弟之吳為先人乞銘銜哀送汝出江關滿路悲風損別顔此日素車驅白馬幾時黄絹勒青山夢廻草色離腸斷身着麻衣血涙斑憐我雙眸枯欲盡不堪分手更潺湲叮嚀數語涙千行此去關山路𣺌茫三伏炎蒸過劍浦一江風雨度錢塘魂隨逺嶼孤鴻斷目極遙天匹練長當念倚門雙白髮莫將行色滯他鄉送王玉生遊吳幾樹蟬聲亂夕暉送君無奈涙沾衣花間此日人傷別竹裏從今客到稀吳苑山川行處徧横塘烟雨望中微登樓王粲多鄉思目斷秋風一雁歸寄王百谷三載吳門兩見君別來相憶倍殷勤夢廻半偈菴前月望斷姑蘇臺上雲赤牘此時憑雁足黄庭何日換鵝羣先人墓所豐碑在應賴邯鄲絶代文送王大遊吳兼訊舍弟瀟瀟風雨滿征途一片輕帆過闔閭路指蛇門懷伍相劍藏魚腹弔專諸砧敲八月寒聲早葉下三江樹影疎若到吳閶憑問訊天涯遊子近何如送陳子卿歸墨潭精舍送君歸詠卜居篇精舍平臨絶澗前翠壁倒懸潭似墨蒼林遙望樹如烟月移竹色當虚牖風落松花滿釣船聞説漢庭方羽獵未應寂寞老揚𤣥雨夜登玉皇閣鼇頂秋深起夜凉飄飄雲氣黯虚堂丹燒九轉成金母閣聳千尋禮玉皇燈影乍沉孤嶂雨磬聲微度半林霜古壇坐久天花落不覺餘香滿石牀中秋同惟秦震卿集汝大草堂看月因懷惟起客吳西風蕭瑟葉初黄入夜行歌過草堂金粟散時天似水玉繩低處月如霜尊前竹色浮秋靄檻外松隂度晩凉遙望南飛有烏鵲應憐游子滯他鄉逢慶良上人東林結社已多年忽汎慈航到海邊自是真空能出世誰知綺語不妨禪洗瓢曲澗搖寒月卓錫深山破暝烟幾度相從談勝果無諸城外即諸天送良上人還金陵靜海寺楓葉蕭蕭露氣凝不堪江畔送名僧浮杯忍作無期別説法誰叅最上乗滿路凄風聞寳磬一天殘月夢金陵懸知錫杖重來處傳得南宗幾佛燈王百谷為先永寧表墓寄此答謝西風吹雁出菰蘆尺素銜來字字珠倚馬萬言推繡虎臯魚雙涙感啼烏通家敢謂同文舉名筆何縁借董狐片石空山垂不朽千秋應得免樵蘇送王生之臨卭省州守叔父獻甫西北胡笳不斷吹送君南浦淚如絲荆門樹影雲中盡巫峽猿聲月下悲客路裝輕懷匕首驛樓燈現望峨眉天涯何處能相憶孤館殘更夢覺時驅車萬里向殊方極目卭崍路渺茫官舍烟雲隣越巂人家風土雜夷羌綺琴曲裏挑新寡鼙鼓聲中憶故鄉丙穴由來魚不乏八行書札莫相忘讀禮日謝在杭拜官湖州便道還家見訪賦贈當時同聴鹿鳴歌此日雲霄與薜蘿鷄骨支來天上泣馬蹄驚向巷中過經年聚散蹤無定一見悲歡涙更多天上星辰催執法相思又隔五湖波後感懷家難相尋最可憐麻衣如雪淚如泉慈雛返哺嗟無日熊膽和丸憶昔年總為易凋萱草色却教重廢蓼莪篇杯棬尚在人何處不待持來已慘然滿目悲風起白楊幽明相隔路茫茫繐帷塵暗靈何在寳婺星沉夜不光忽爾無心呼阿母猶然有夢禮醫王板輿此日難重御一到花間一斷腸纔入庭幃便愴情遺容猶在不聞聲蜀魂未化啼尤切精衛空填恨豈平懷似陸郎徒有橘孝慚考叔竟無羮可憐神理年來盡已向塵中厭久生一夕音容背北堂人間那得返魂香百年渾似枝頭露雙鬢難留鏡裏霜爻象謾勞推季主刀圭空復藉韓康此身不但如荼苦血涙千行更萬行哭李惟實孝亷寒雲慘淡日黄昏壯士長銜萬古寃易水當年歌變徴湘潭此日賦招魂妖狐夜半啼原野山鬼秋深哭墓門明嵗素車過五嶺為君抆涙薦芳蓀少年俠客擅詞華埋玉空山事可嗟自是關門多虎豹總縁嵗序在龍蛇詩餘長吉囊中草夢絶文通筆裏花十載交情惟一哭西風吹淚到天涯曾同擊筑醉燕都意氣翩翩似狗屠良友忽傳成死別故人猶未束生芻秦廷慟哭知多少梁獄投書果有無我在苦中情更苦傷君那禁涙模糊重泉冥漠隔知音從此交期夢裏尋颯颯悲風天外急離離芳草墓前深千秋獨抱亡琴痛萬里空懷許劍心杯酒他年澆白骨北邙松栢恐成林寄劉季徳故人蹤跡久相違何事猶然一布衣九鯉烟霞歸草屫五羊山水寄金徽竹期王子重來看花向劉郎別後飛千里停雲情不淺秋風莫遣鴈鴻稀寄許靈長年來何處寄行蹤聞在吳山第一峯古洞烟霞生薜荔寒窻風雨泣芙蓉萬家燈影千村月半夜歌聲滿寺鐘幾度思君勞夢寐錢唐江上水重重寄曠上人瓢笠何年住化城閉關跏坐夢魂清雙雙月下浮屠影夜夜雲間斷磬聲悟徹空花諸相滅翻殘貝葉一燈明幾時結得東林社共證菩提了此生鄧汝髙進士轉餉遼東便道過家見訪喜贈才華籍籍賦長楊裘馬翩翩出建章遼海軍儲憑轉餉漢廷郎署待含香笑談不帶雲霄氣名姓新依日月光獨有故人憔悴甚豈堪相對問行藏送在杭司理湖州少年擁傳暫還家捧檄新乗上漢槎地接洞庭多橘柚郡稱澤國半桑麻省刑網好開三面判事才能出五花手折衰楊從此別夢魂飛不到天涯長安躍馬主恩新詞客今為執法臣苕水共看初帶印滄波由此罷垂綸寛同漢室于廷尉情似樊川杜舍人何處公餘堪引眺三江烟雨五湖春曾將才藻擅詞壇此日新彈貢禹冠早嵗共稱賢宅相少年初拜漢郎官霅溪水響褰帷聴顧渚山髙拄笏看自是法曹關象緯霜威先已逼人寒爭傳詞賦是𤣥暉捧得除書晝錦歸属吏共迎新緑綬世家猶説舊烏衣征亭霜冷孤鴻斷驛路天長駟馬飛君去已陪鵷鷺侣不才空守釣魚磯寄答沈從先海國秋髙一鴈輕題書千里見交情鹿門君已逃踪跡鶴市誰能識姓名𤣥草謾憂瓿上覆彩花長向筆中生淺才何敢當皇甫欲序三都愧未成得胡御長詩却寄蹤跡年來混酒徒獨留名姓滿江湖卜居已傍三天竺處世猶悲五石瓠刻石好辭傳幼婦閉門髙論著潜夫胷中莫是波斯國寄得瑤函字字珠哭周所諧開緘忽報故人亡雙涙如傾幾斷腸掛劍未能同季子知音何處覔周郎到來已嘆交驩淺死去空憐別恨長多少遺編猶在篋一回吟咏一凄凉當年風雨出芝山行李蕭然夜度關自謂千秋同藝苑何期此夕謝人間幾時客作鳴驢弔何日人能化鶴還一掬木蘭溪上淚溪聲應共淚潺湲百年交誼隔泉扃遙對西風淚自零欲以遺文託行世敢將良友負幽冥朱弦既斷誰同調隣篴重吹豈可聴不道精靈沉已久夜來猶望少微星生來長咏四愁詩死後凄凉更可悲二頃久無塵滿甑一家雖在命如絲人亡正及黄花節客弔空違宿草期未撫靈牀先哽咽難將遺囑問孤兒戯柬謝使君緑衣紅袖兩相宜况值還家得意時夜夜琴心調鳯曲雙雙屐齒伴蛾眉月明古渡尋桃葉露冷空江唱竹枝不俟五湖携粉黛今朝先已載西施贈佘宗漢明府青鬢郎官早息機抛將墨綬變荷衣一裘已傍壺山隠雙舄寧從帝里飛飲似公榮常得醉遊同禽慶久忘歸年來門巷清如水惟有寒鷗伴釣磯翩翩辭賦似西京四壁蕭然類馬卿山水到時皆屐跡江湖何處不詩名閒來桞向門前種老去花猶筆裏生嵗晏齎糧過九鯉與君長嘯結鷗盟送李廷曄令東莞兼柬鄧香山初從北闕佩鳴珂擁傳遙從五嶺過官饌自今多海錯童謠强半是黎歌廣州舊甓尋陶侃粤國荒臺弔尉陀只恐簿書能俗客一封那肯問漁蓑新懸墨綬赴炎方道過家林束別裝海邑三秋椰子熟公庭六月荔枝香臺中謁帝飛雙舄郡裏尋僊問五羊莫向天涯思故國一時冠蓋半同鄉送丁亨文進士司理召陵新將詞賦獻承明萬里分符佐楚荆道上竹深妃子廟郡中花暗白公城山連五嶺重重翠水接三湘曲曲清此去王程君莫緩幾多人吏待持平洞庭湖上片帆輕萬頃微茫接太清楚甸峰巒天際杳巫山雲雨夢中生霜侵逺渚鱘千尺月照寒蘆雁一聲白露漸零衣漸冷遙知宋玉不勝情鄧汝髙雨中載酒見訪分得園字甘將蹤跡老丘園忽聴軒車到蓽門籬下一尊殘菊色林間雙屐舊苔痕暝烟踈雨山山暗落木寒泉處處喧今日主人翻作客不須送客獨留髠侯君右來自永嘉喜贈西園公子舊知名負劍長歌海上行何日寢丘酬楚相誰人虚席重侯生賦成白雪驕彤管衣帶朱霞戀赤城聞説臨卭方貴客莫因殘嵗急歸程贈黄道晦隠君鷄犬聲中隠者居桃花流水繞庭除芝苓服久容顔古草莽交深世態疎千頃滄江移艇釣一犂春雨帶經鋤有時喚渡過城市不是脩琴即借書白首幽栖只一區恥將名姓世人呼讀書借得村中社嵗勝看將壁上圖地僻絶來髙士駕家貧先辦縣官租山厨不問炊烟少猶向桑間飯餓夫問黄道晦病久訝扁舟不出溪聞君抱病意悽悽空山日晩陽烏促古砌天隂絡緯啼夜冷誰人同襆被地偏何處得刀圭一從消渴文園後門外蓬蒿與榻齊方廣巖欲覔精廬問化機蒼蒼鳥道客游稀上方雲起暮山冷半嶺日斜殘雪飛古樹猿驚樵子過寒林厖吠野僧歸路迷疊嶂不知處但聴磬聲來翠微宿華嚴閣萬仞巖中隠化城倚欄遙望暮雲平斷橋殘雪寒山影絶磴凄風晩磬聲坐對水簾塵慮逺眠當石榻夢魂清因兹悟得西來意欲向空門了此生巖中曉望早起看山露氣濃𤣥巖古院有雲封微風入室度清梵斜月挂林聞曙鐘猿帶曉聲過碧嶂鶴留殘夢出青松倚闌但聴水簾響失却翠微千萬重重游錦溪懷鄧汝髙進士斷橋流水自潺湲與客重來憶所驩當日共看溪上竹于今偏握省中蘭雲生萬壑孤笻濕雪滿千山兩屐寒住散不須增感慨一尊林下且盤桓壬辰除夕人事悠悠嵗月徂堂前空對一燈孤哀來瘦骨全如鶴聴得啼聲半是烏酹酒幾廻悲伏臘稱觴明日罷屠蘇春風不散終天恨斷盡柔腸涙欲枯癸巳元日嫋嫋東風處處吹蕭條門巷自堪悲獨斟栢葉愁如縷閒對菱花鬢有絲三十虚名歸馬齒半生薄命怨蛾眉寒梅不管人無賴開遍南枝與北枝迎春日風流太守駕朱輪五馬驕嘶九陌塵椒實共拚今日醉梅花先報一年春嬌鶯乍囀聲猶澁綵燕初裁色更新市井繁華簫鼓沸停鞭齊看玉樓人春日懷舊千山萬水夢魂遙簫鼓聲中憶阿嬌半夜朱樓巫峽雨幾行紅涙浙江潮青鸞錦字終難寄司馬琴心不再挑一別西湖成隔嵗春風春雨長蘭苕寄陸無從江北江南一水分尺書無計寄殷勤蕪城草色愁中遠揚子濤聲夢裏聞二十四橋孤嶂月五千里路萬山雲相思何處堪惆悵幾樹璚花對夕曛寄夏𤣥成故人別後忽經年聞道衡門尚草𤣥隋苑花明髙士宅廣陵濤滿孝亷船一雙屐齒春雲外兩地離心夕照邊夜夜江南夢江北蕪城風雨桞塘烟過鄭惠州墓三尺孤墳倚翠微行人到此涙沾衣羅浮四百魂何在華表千年鶴未歸塵世功名悲薤露空山松栢冷斜暉每逢寒食倍惆悵風落殘花滿路飛丘墓凄凄鎖斷烟墓前春草自芊芊空林猿鳥寒雲外古路牛羊夕照邊骨閉重泉悲永夜櫬歸南海自何年經過再拜薦蘋藻宰木蕭森啼杜鵑送趙仁甫令梁山桃花零亂桞如絲正是河橋賦別時衣帶江州司馬涙帆過湘水舜妃祠鳬飛雙舄看應逺猿呌三聲聴漸悲䕫府孤城縱臨眺陽臺雲雨望中疑送人游吳楚津亭垂桞緑烟絲萬里關山匹馬遲去國正當春盡後登樓多在日斜時楚江草長悲鸚鵡吳苑花深走鹿麋説別何須共惆悵秋風搖落是歸期淘江舟中送張博士之官鎮海淘江此夜暫同舟千里清漳君去遊春雨滿庭肥苜蓿青山一路響鈎輈雲開蜃結空中市晝靜鱣飛海上樓自是官閒堪坐嘯刺桐花下日淹留過常思嶺憩福海菴次韻白雲深處梵王家回望千層鳥道賒滿室空香薰貝葉一聲殘磬落松花聴經野鹿羣依草出定山僧獨施茶禮罷瞿曇留偈別寒鴉影裏夕陽斜紫雲洞石燈虚閣影沉沉萬壑松風起夕隂斷壁只餘蒼蘚合洞門長鎖紫雲深一聲鐵篴破殘夢半夜石鐘清道心跨鯉僊人何處去琪花瑤草不堪尋淘江訪林徳鳯茂才一榻茅茨倚翠微暫將生計託漁磯門當瀨水潮常早路遶方山客到稀窻外竹聲喧午枕庭前花片㸃春衣與君相見即相別月落江頭未忍歸宿鼓山寺方丈維摩丈室絶塵氛坐對珠龕演梵文松際窺人孤嶂月山中留客半牀雲疎鐘出寺過林隠怪鳥啼春徹夜聞真性由來愛空寂名香親向殿前焚孤峯天畔削芙蓉入夜遙看紫翠重一片禪心千澗水五更塵夢數聲鐘雲生净土龍歸鉢露冷空壇鶴唳松借宿僧寮經幾載蒼苔埋却舊遊蹤重遊喝水巖古洞盤旋紫翠間洞門常借白雲關虚瓢掛樹老僧隠昬磬出林飛鳥還路到窮時尤􅏭嶫泉經喝後不潺湲當年舊社成陳迹春雨春花㸃地斑半山小憩呈惟秦千層鳥道一笻扶三月東風響鷓鴣花發幽巖紅躑躅雲生絶壁翠模糊七閩形勝山河壯萬頃滄溟島嶼孤徐福求仙空入海誰知此地即仙都落花春光九十似飛蓬㸃徑殘英片片紅逐水幾看過澗壑因風時得入簾櫳杜鵑有恨啼新涙蛺蝶無心戀舊叢獨有香魂飛不散明年仍發故枝中佳人無計可留春每見紛飛祗自顰總為韶華能起恨亦縁衰謝易傷神輕狂已逐泥中絮流落空沾馬後塵莫惜花前頻載酒浮生能得幾花辰一畨風雨一畨憐却笑東皇浪有權才見芳英明苑上忽驚飛片落堦前倦遊公子辭金谷醉舞佳人卸翠鈿惆悵春光容易度不堪憑檻聴啼鵑乍見清池映曉妝驚看池面貼殘芳武陵谿上春風暗杜曲園中夜雨狂緑葉成隂空自媚紅英落盡尚餘香含情最恨東君惡不向人間理斷腸桞千絲萬縷鬭妖嬈和雨和烟陌上飄夜夜篴聲關塞路年年杯酒㶚陵橋隋堤㳺女輸濃黛楚國佳人鬭細腰只恐章臺春易老幾回攀折恨蕭條白桃花春風吹遍武陵源幻出瑤枝樹樹繁色似何郎初傅粉嬌同妃子乍承恩開當桞絮渾無迹落向苔裀覺有痕獨愛羽衣花下客玉笙聲斷月黄昏桃花片一夜天孫剪絳綃滿林紅雨亂蕭蕭武陵溪上香魂散露井風前艷質銷粉黛凋殘留半靨胭脂零落帶餘嬌崔郎腸斷尋春處人面花容兩寂寥花影斜陽影裏月明中一種葳蕤幻兩叢零露滴時還蕩漾輕雲遮處更朦朧風吹頻覺嬌無力天暝方知色是空忽訝落英飛滿徑幾廻持帚誤呼童芳英灼灼葉蓁蓁倒影雕欄態更新忽遇燈光成幻境倩將月色為傳神分明鏡裏看珠翠彷彿帷中見玉人世界隂晴元不定可憐生滅總非真水中花影一枝濃艷俯滄浪彷彿還疑鏡裏妝波面波心飛蛺蝶樹頭樹尾宿鴛鴦浮萍㸃綴偏生色流沫潺湲豈有香借問嬌姿誰得似洛神方在水中央夕陽羲馭難留忽已西東山猶帶一痕低能催古寺踈鐘起漸聴孤城畫角齊影入蘆汀羣鴈落光銜茅屋亂雞栖此時誰是銷魂者戍婦閨中最慘悽白鴈蹁躚刷羽度衡陽遙望還疑縞素妝起處蘆花飄岸渚低時殘雪㸃瀟湘帶來逺塞千山月呌落深林半夜霜影入薄雲看不見湖光漠漠楚天長白燕呢喃長日畫梁中素質氷肌迥不同玉剪飛時遙可辨寳釵化去竟成空梁園夢遶梨花月隋苑聲殘桞絮風莫戀烏衣歸舊國藏身合在水晶宫弓誰挽烏號五石强由來猿臂可穿楊蛇疑杯裏終難釋鳥盡林中便已藏開處流星過絶塞掛時殘月在扶桑世間得失原無定尼父當年笑楚王萍有葉無根不用栽還疑水面長蒼苔遊魚吹浪重重亂彩鷁衝波兩兩開却得微風依岸泊不容明月入池來忽然一夜添新雨蹤跡飄零信可哀蝶傅粉嬌姿五色衣由來生性愛芳菲夜深栩栩夢中化日午雙雙花底飛偷得餘香過別院帶將春色入簾幃只愁荏苒韶光暮飄泊知從何處歸元夕氷燈燈燭熒熒照夜闌分明影裏見琅玕雙雙羅襪凌波濕朶朶金蓮出水寒新製恍疑來貝闕髙懸只合在瑤壇為言火樹休相逼只恐清輝一夕殘虞美人草青草香魂是翠蛾托根元屬楚山河年年野燒咸陽火夜夜啼螿玉帳歌恨血清霜凝處滿涙痕殘雨滴時多漢宫亦有如花貌誰向春風化碧莎病美人長伴流蘇與合歡腰肢瘦盡黛眉殘漸看衣帶愁中緩却恨春光枕上闌夢去何心遊楚峽起來無力歩邯鄲一從玉指纎纎困挂壁秦箏久不彈老農容貌衰癯兩鬢華難將生計事汚邪手栽禾黍知多少眼見田園屬幾家時課兒孫勤耨穫閒從隣叟話桑麻昨朝扶杖過春社還祝甌窶欲滿車老醫曾將奇術冠青囊八十年前遇長桑臂在不知經幾折眼花何用檢諸方有劑可令千人活無藥能銷兩鬢霜橘老杏殘筋力盡定應死去作醫王題王太史家藏孫都䕶墨菊西園公子費隃麋貌得寒花色更奇𤣥品合栽陶令宅幽姿宜傍右軍池青烟落處渾無辨白露凝時却易知籬下幾人能識取秪疑佳種出松滋水簾潺潺千㸃響淙淙一片氷綃掛碧空日射恍疑金絡索月明如坐水晶宫神龍噴處珠盈貫玉女來時佩馭風十二闌干遙騁望萬重山色總朦朧壽林天懋母黄太夫人百斛璚漿滿玉壺壽筵猶進大官厨堂前賔客皆鵷侣膝下郎君是鳯雛重見封章傳内使又看書信寄麻姑傍人莫問千秋筭五嶽長存海不枯仙衣初剪紫霞綃鏡裏霜鬟尚未凋賢媛正宜參八座殊恩今已錫三朝吹從𤣥鶴空中度書寄青鸞海上遙多少翟公門下客紛紛猶進白雲謠幔亭集巻七
