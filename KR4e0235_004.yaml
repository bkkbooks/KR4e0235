body:
  text: 幔亭集巻四明徐熥撰五言聲詩咏古鏡青銅留美質𤣥錫出良工剥蝕殉秦塚悲歡照漢宫挂壁菱花豔藏匣桂輪空佳人時拂拭莫使素塵蒙咏百花畫帳羅帷圖百卉晏寢自生香不羨雕欄艷猶如金谷芳嬌枝沾暮雨弱榦耐秋霜更有雙連理夜發合歡牀咏薰爐範金呈麗飾長向蘭閨爇籠袖玉肌温薰牀珠被熱永夜焰常燃殘更芬不滅佳人夢乍醒枕畔添香屑咏美人晝眠金釵斜欲溜玉枕倦相依瞢騰含媚眼展轉皺羅衣汗沾香粉膩幔隔黛痕㣲夢只縈閨閣不逐楚雲飛咏美人理髪犀梳流半月蟬鬢亂濃雲釵梁缷巧飾膏沐散餘芬埀肩遮寳珥委地拂羅裙新作盤龍結含笑問夫君咏美人觀畫國色看如畫丹青疑是眞誰能分麗質各欲競丰神江濱有兩艷下蔡見雙身只恐朱顔謝不及巻中人題畫鶴在隂胎化質縑素寫珍禽差池出𤣥圃淒切逐瑤琴凝霜時振羽警露有餘音乘軒雖竊寵終銜恩遇深題畫鹿畫圖呈瑞應靈物著天休浮江同濯濯呼侣各呦呦青莎騰或倚豐草伏還㳺蒼𤣥幾變色遐算踰千秋賦得欲笑翻成泣悲欣無定態啼笑一時并粉痕歡眼注鉛水嫵容生兩犀方奮齒雙筯忽吞聲誰云射雉樂翻作泣鮫情七夕咏牛女銀河低綵幔珠箔捲針樓星丸彈靈鵲雲錦幙牽牛歡憎今夕促淚續去年流何當延兎影長將鳳駕留美人篇戲贈陳叅軍蘭夢方徴吉傾城得細君纎看眉上月濃愛鬢邊雲聽琴猜斷索織錦辨廻文共誇新婦好真可配叅軍和陳叅軍送客未還閨中有望别雖無百里情亦似三秋薰香虚侍寢看月怯登樓心慵朝鏡掩望切晚妝留知君南浦淚不獨送人流為屠田叔太守新姬催妝燈光滿九衢弦筦待名姝羞嗔夫婿促嬌倩侍兒扶鬒濃耀寳飾珮響按羅襦含顰疑有態歛色看成都欲泣聲先顫將行步復須梁驚棲玳瑁枕怯索珊瑚除釵勞屢喚近帳費低呼情通呈臉暈語澁静唇朱蘭膏薰戺闥香氣郁流蘇展轉動金釧綽約見氷膚使君今有婦五馬不踟蹰幔亭集卷四
